function ParameterPrecisionTable({ study, design }) {
  const { update } = useContext(StudyContext);
  const defaultN = study.assignment?.sampleSize || 300;
  const [N, setN] = useState(defaultN);
  // SE target is persisted on the study so Step 6 can use the same threshold to compute
  // its minimum allowed sample size. Default = 0.10 (rulebook).
  const seTarget = (typeof study.precisionTarget === 'number' && study.precisionTarget > 0) ? study.precisionTarget : 0.10;
  const setSETarget = (v) => {
    const clamped = Math.max(0.01, Number(v) || 0.10);
    update({ precisionTarget: clamped });
  };
  const [open, setOpen] = useState(true);

  // Re-default N when assignment sample size changes
  useEffect(() => { setN(study.assignment?.sampleSize || 300); }, [study.assignment?.sampleSize]);

  // Use Bayesian-regularized precision (priorVar = 2.0 → adds (1/2)·I to the info matrix).
  // This matches the HB sampler's default prior on β and produces finite SEs even for
  // designs that would be singular under pure OLS Fisher info.
  const result = useMemo(() => computeParameterPrecision(study, design, N, DEFAULTS.hb.priorVar), [study, design, N]);
  if (!result) return null;

  // Color buckets relative to the user's threshold so colors mean "vs. your target"
  // rather than the hardcoded 0.10/0.20 cutoffs. Worse-than-2x-target is red.
  const seClass = (se) => {
    if (se < seTarget) return 'text-emerald-700 bg-emerald-50';
    if (se < 2 * seTarget) return 'text-amber-800 bg-amber-50';
    return 'text-red-700 bg-red-50';
  };

  // For a given level k with predicted variance V_kk:
  //   SE_k(N) = sqrt(versions · V_kk / N)   ⇒   N_required(SE_target) = versions · V_kk / SE_target²
  // We compute this per level and attach it to each param so both the per-level table
  // and the rollup can use it.
  const minNForTarget = (V_kk) => Math.ceil(result.versions * V_kk / (seTarget * seTarget));
  result.params.forEach(p => { p.minNForTarget = minNForTarget(p.V_kk); });
  // Sample size needed so EVERY level meets the target = max over levels
  const recommendedN = Math.max(...result.params.map(p => p.minNForTarget));

  // Group by attribute for layout
  const grouped = {};
  result.params.forEach(p => { (grouped[p.attrIdx] = grouped[p.attrIdx] || []).push(p); });
  const groupKeys = Object.keys(grouped).sort((a, b) => Number(a) - Number(b));

  // Quick summary line: bucketed against the user's chosen SE target
  const counts = {
    green: result.params.filter(p => p.se < seTarget).length,
    amber: result.params.filter(p => p.se >= seTarget && p.se < 2 * seTarget).length,
    red:   result.params.filter(p => p.se >= 2 * seTarget).length
  };
  const allGreen = counts.amber === 0 && counts.red === 0;
  const total = result.params.length;

  return (
    <div className="mb-6 bg-white border border-slate-200 rounded-xl card-shadow">
      <button onClick={() => setOpen(!open)} className="w-full px-5 py-3 flex items-center gap-3 text-left">
        <div className="w-8 h-8 rounded-full bg-slate-100 text-slate-700 text-xs font-semibold flex items-center justify-center">SE</div>
        <div className="flex-1">
          <div className="font-semibold text-slate-900">Parameter precision (predicted)</div>
          <div className="text-xs text-slate-500">
            Predicted standard errors per attribute level under this design at N={N}.
            {' '}<span className="text-emerald-700">{counts.green} well</span> / <span className="text-amber-700">{counts.amber} borderline</span> / <span className="text-red-700">{counts.red} weakly</span> identified.
          </div>
        </div>
        <span className="text-slate-400 text-lg">{open ? '▾' : '▸'}</span>
      </button>
      {open && (
        <div className="px-5 pb-5 border-t border-slate-100 pt-4">
          <div className="flex items-end gap-3 mb-4 flex-wrap">
            <NumberInput label="Sample size N" value={N} min={1} onChange={v => setN(Math.max(1, Number(v) || 1))} className="w-40" />
            <NumberInput
              label="SE target (good enough cutoff)"
              value={seTarget}
              min={0.01}
              step={0.01}
              onChange={v => setSETarget(Math.max(0.01, Number(v) || 0.10))}
              className="w-44"
            />
            <div className="text-xs text-slate-500 max-w-md">
              SEs scale as 1/√N — try different N to see how precision changes.
              {result.versions > 1 && <span> Multiplied by √{result.versions} to reflect that each respondent only sees 1/{result.versions} of the master design.</span>}
              {result.regularization?.type === 'bayesian' && (
                <span className="block mt-1 text-slate-400">
                  Bayesian-regularized (prior variance = {result.regularization.priorVar}). Matches the HB sampler's default prior on β.
                </span>
              )}
            </div>
          </div>

          {/* Sample-size sufficiency banner — the one sentence that answers
              "is my sample size good enough at this design?" */}
          <div className={`mb-4 px-4 py-3 rounded-lg border ${allGreen ? 'bg-emerald-50 border-emerald-200' : (counts.red > 0 ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200')}`}>
            <div className={`text-sm font-medium ${allGreen ? 'text-emerald-900' : (counts.red > 0 ? 'text-red-900' : 'text-amber-900')}`}>
              {allGreen ? (
                <>✓ Sample size sufficient at N = {N}. All {total} parameters meet SE &lt; {seTarget.toFixed(2)}.</>
              ) : (
                <>
                  {counts.red > 0 && <>⚠ {counts.red} level{counts.red === 1 ? '' : 's'} weakly identified (SE ≥ {(2 * seTarget).toFixed(2)}). </>}
                  {counts.amber > 0 && <>{counts.amber} level{counts.amber === 1 ? '' : 's'} borderline (SE {seTarget.toFixed(2)}–{(2 * seTarget).toFixed(2)}). </>}
                  {counts.green > 0 && <>{counts.green} of {total} levels meet your target.</>}
                </>
              )}
            </div>
            {!allGreen && (
              <div className="text-xs mt-1 text-slate-700">
                To bring <em>every</em> level under SE &lt; {seTarget.toFixed(2)}, you'd need <b>N ≈ {recommendedN.toLocaleString()}</b>
                {recommendedN > N && <> ({(recommendedN / N).toFixed(1)}× your current N = {N}).</>}
                {' '}Alternatively, lower the SE target or accept that some levels will be less precisely estimated.
                <button
                  type="button"
                  onClick={() => setN(recommendedN)}
                  className="ml-2 text-blue-600 hover:text-blue-800 underline-offset-2 hover:underline"
                >Apply recommended N</button>
              </div>
            )}
          </div>
          {/* Attribute-level summary: one row per attribute, rolled up across its non-reference levels.
              This is the Sawtooth-style design-stage view: each row shows the worst- and average-case
              SE within the attribute, so a single glance tells you "is this attribute well-identified
              as a whole?" The detailed per-level (pairwise) table follows below for diagnostics. */}
          <div className="mb-4">
            <div className="text-xs font-semibold text-slate-700 mb-2">Attribute-level summary</div>
            <div className="overflow-x-auto scroll-thin">
              <table className="w-full text-xs">
                <thead className="bg-slate-50">
                  <tr className="text-slate-600">
                    <th className="text-left p-2 font-medium">Attribute</th>
                    <th className="text-right p-2 font-medium" title="Estimated params for this attribute = levels − 1 (reference dropped).">Params</th>
                    <th className="text-right p-2 font-medium" title="Average SE across this attribute's non-reference levels.">Mean SE</th>
                    <th className="text-right p-2 font-medium" title="Largest SE across this attribute's levels — the weakest-identified level.">Worst SE</th>
                    <th className="text-right p-2 font-medium" title="Sample size needed so every level in this attribute meets your SE target.">Min N for target</th>
                    <th className="text-left p-2 font-medium">Quality</th>
                  </tr>
                </thead>
                <tbody>
                  {groupKeys.map((gk) => {
                    const group = grouped[gk];
                    const mean = arr => arr.reduce((s, v) => s + v, 0) / Math.max(1, arr.length);
                    const ses = group.map(p => p.se);
                    const meanSE = mean(ses);
                    const worstSE = Math.max(...ses);
                    const maxMinN = Math.max(...group.map(p => p.minNForTarget));
                    const qualityClass = worstSE < seTarget ? 'text-emerald-700 bg-emerald-50'
                      : worstSE < 2 * seTarget ? 'text-amber-800 bg-amber-50'
                      : 'text-red-700 bg-red-50';
                    const qualityLabel = worstSE < seTarget ? 'Well identified'
                      : worstSE < 2 * seTarget ? 'Borderline'
                      : 'Weakly identified';
                    return (
                      <tr key={`sum-${gk}`} className="border-t border-slate-100">
                        <td className="p-2 text-slate-900 font-medium">{group[0].attrName}</td>
                        <td className="p-2 text-right tabular text-slate-700">{group.length}</td>
                        <td className="p-2 text-right tabular text-slate-800">{meanSE.toFixed(3)}</td>
                        <td className={`p-2 text-right tabular font-medium ${qualityClass.split(' ')[0]}`}>{worstSE.toFixed(3)}</td>
                        <td className={`p-2 text-right tabular ${maxMinN > N ? 'text-red-700 font-medium' : 'text-slate-700'}`}>{maxMinN.toLocaleString()}</td>
                        <td className="p-2"><span className={`text-[10px] px-1.5 py-0.5 rounded ${qualityClass}`}>{qualityLabel}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="mt-2 text-[10px] text-slate-500">
              Worst-level color drives the row's quality tag. <b>Min N for target</b> is the sample size needed so every level in this attribute meets the SE target — if it's larger than your current N, at least one level in this attribute isn't yet well-identified.
            </div>
          </div>

          <div className="text-xs font-semibold text-slate-700 mb-2 mt-5">Detailed per-level breakdown (vs. reference)</div>
          <div className="overflow-x-auto scroll-thin">
            <table className="w-full text-xs">
              <thead className="bg-slate-50">
                <tr className="text-slate-600">
                  <th className="text-left p-2 font-medium">Attribute</th>
                  <th className="text-left p-2 font-medium">Level</th>
                  <th className="text-right p-2 font-medium">SE @ N={N}</th>
                  <th className="text-right p-2 font-medium">95% CI half-width</th>
                  <th className="text-right p-2 font-medium" title="Sample size needed so this level's SE is below the target.">Min N for SE&lt;{seTarget.toFixed(2)}</th>
                  <th className="text-right p-2 font-medium" title="Each parameter's SE divided by the geometric mean of all SEs in this design.">SE ratio</th>
                </tr>
              </thead>
              <tbody>
                {groupKeys.map((gk, gi) => {
                  const group = grouped[gk];
                  // The estimated rows (K-1 per attribute) followed by a reference row so all K
                  // levels are visible. Reference has no coefficient (constrained to 0) so SE / CI
                  // / Min N are all em-dash. This matches Sawtooth-style "all levels shown" output
                  // while preserving the dummy-coded methodology.
                  const refLevelName = group[0].refLevelName;
                  const rows = group.map((p, i) => (
                    <tr key={`${gk}-${i}`} className={`border-t ${i === 0 ? 'border-slate-300' : 'border-slate-100'}`}>
                      <td className="p-2 text-slate-800 font-medium">{i === 0 ? p.attrName : ''}</td>
                      <td className="p-2 text-slate-700">{p.levelName}</td>
                      <td className={`p-2 text-right tabular font-medium ${seClass(p.se)}`}>{p.se.toFixed(3)}</td>
                      <td className="p-2 text-right tabular text-slate-700">±{p.ci95.toFixed(3)}</td>
                      <td className={`p-2 text-right tabular ${p.minNForTarget > N ? 'text-red-700 font-medium' : 'text-emerald-700'}`}>{p.minNForTarget.toLocaleString()}</td>
                      <td className={`p-2 text-right tabular ${p.seRatio > 1.3 ? 'text-amber-700 font-medium' : 'text-slate-600'}`}>{p.seRatio.toFixed(2)}</td>
                    </tr>
                  ));
                  rows.push(
                    <tr key={`${gk}-ref`} className="border-t border-slate-100 bg-slate-50/50">
                      <td className="p-2 text-slate-400 font-medium">{group.length === 0 ? group[0].attrName : ''}</td>
                      <td className="p-2 text-slate-500">
                        {refLevelName}
                        <span className="ml-2 text-[10px] uppercase tracking-wide text-slate-400 bg-slate-200 px-1.5 py-0.5 rounded">ref</span>
                      </td>
                      <td className="p-2 text-right tabular text-slate-300">—</td>
                      <td className="p-2 text-right tabular text-slate-300">—</td>
                      <td className="p-2 text-right tabular text-slate-300">—</td>
                      <td className="p-2 text-right tabular text-slate-300">—</td>
                    </tr>
                  );
                  return rows;
                })}
              </tbody>
            </table>
          </div>
          <div className="mt-4 text-xs text-slate-500 leading-relaxed">
            <strong>How to read.</strong> Each row is an estimated coefficient for a non-reference level (the last level of each attribute is the reference, constrained to 0). <b>SE</b> is the predicted standard error of the coefficient at N = {N}.
            {' '}<b>Min N</b> is the sample size needed to bring that level's SE below your chosen target — if it's above your current N, the level isn't yet well-identified.
            {' '}<b>95% CI half-width</b> = 1.96 × SE; <b>SE ratio</b> compares to the geometric mean across all levels (&gt; 1.3 = much noisier than typical).
            {' '}<span className="text-emerald-700">Green: SE &lt; {seTarget.toFixed(2)} (meets your target)</span>;{' '}
            <span className="text-amber-700">amber: {seTarget.toFixed(2)}–{(2 * seTarget).toFixed(2)} (borderline)</span>;{' '}
            <span className="text-red-700">red: &gt; {(2 * seTarget).toFixed(2)} (over 2× your target — consider design changes or larger N)</span>.
          </div>
          <div className="mt-2 text-[10px] text-slate-400">
            Computed as SE_k = √( {result.versions} · V_kk / N ) where V = M⁻¹ and M is the design's Fisher information matrix at β = 0.
            See the Docs page for the full derivation.
          </div>
        </div>
      )}
    </div>
  );
}

function DesignAdvisor({ study, design, onApplyChoice, onRerunEffort, sampleSizeForPrecision }) {
  const suggestions = useMemo(() => diagnoseDesign(study, design, sampleSizeForPrecision), [study, design, sampleSizeForPrecision]);
  const counts = useMemo(() => ({
    high: suggestions.filter(s => s.severity === 'high').length,
    medium: suggestions.filter(s => s.severity === 'medium').length,
    low: suggestions.filter(s => s.severity === 'low').length
  }), [suggestions]);
  const hasIssues = counts.high + counts.medium > 0;
  const [open, setOpen] = useState(hasIssues);

  useEffect(() => { setOpen(hasIssues); }, [hasIssues, suggestions.length]);

  if (suggestions.length === 0) {
    return (
      <Card className="mb-6 border-emerald-200 bg-emerald-50/40">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 text-lg">✓</div>
          <div>
            <div className="font-semibold text-emerald-900">Design looks healthy</div>
            <div className="text-xs text-emerald-700">
              D-efficiency {design.diagnostics.dEfficiency.toFixed(1)}%,
              level CV {(design.diagnostics.maxLevelCV * 100).toFixed(1)}%,
              overlap {(design.diagnostics.overlapAvg * 100).toFixed(0)}% — all within rulebook ranges.
            </div>
          </div>
        </div>
      </Card>
    );
  }

  const sevColor = {
    high: 'bg-red-100 text-red-700',
    medium: 'bg-amber-100 text-amber-800',
    low: 'bg-slate-100 text-slate-700'
  };
  const borderColor = counts.high > 0 ? 'border-red-300'
    : counts.medium > 0 ? 'border-amber-300'
    : 'border-slate-200';

  const onClickAction = (s) => {
    if (!s.action) return;
    const act = s.action;
    if (act.type === 'set_choice_alts') onApplyChoice({ altsPerTask: act.value });
    else if (act.type === 'set_tasks_per_resp') onApplyChoice({ tasksPerRespondent: act.value });
    else if (act.type === 'rerun_effort') onRerunEffort(act.value);
  };

  return (
    <div className={`mb-6 bg-white border rounded-xl card-shadow ${borderColor}`}>
      <button onClick={() => setOpen(!open)} className="w-full px-5 py-3 flex items-center gap-3 text-left">
        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold ${
          counts.high > 0 ? 'bg-red-100 text-red-700' :
          counts.medium > 0 ? 'bg-amber-100 text-amber-800' : 'bg-slate-100 text-slate-700'
        }`}>{suggestions.length}</div>
        <div className="flex-1">
          <div className="font-semibold text-slate-900">Design advisor</div>
          <div className="text-xs text-slate-500">
            {counts.high > 0 && <span className="text-red-700 font-medium">{counts.high} high · </span>}
            {counts.medium > 0 && <span className="text-amber-700 font-medium">{counts.medium} medium · </span>}
            {counts.low > 0 && <span>{counts.low} low · </span>}
            {suggestions.length} suggestion{suggestions.length !== 1 ? 's' : ''} to improve this design.
          </div>
        </div>
        <span className="text-slate-400 text-lg">{open ? '▾' : '▸'}</span>
      </button>
      {open && (
        <div className="px-5 pb-5 space-y-2 border-t border-slate-100 pt-4">
          {suggestions.map((s, i) => (
            <div key={i} className="border border-slate-200 rounded-lg p-3 bg-white">
              <div className="flex items-center gap-2 flex-wrap mb-2">
                <span className={`text-[10px] font-mono uppercase tracking-wide px-1.5 py-0.5 rounded ${sevColor[s.severity]}`}>
                  {s.severity}
                </span>
                <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-700 tracking-wide uppercase">
                  {s.category}
                </span>
              </div>
              <div className="text-sm text-slate-800 mb-1.5"><strong>Issue.</strong> {s.issue}</div>
              <div className="text-sm text-slate-700"><strong>Suggestion.</strong> {s.suggestion}</div>
              {s.action && (
                <div className="mt-3">
                  <Button variant="secondary" onClick={() => onClickAction(s)} className="text-xs py-1.5">
                    {s.action.label}
                  </Button>
                </div>
              )}
              {!s.action && s.jumpTo && (
                <div className="mt-2 text-xs text-slate-400">Modify in Step 2 → use the sidebar to navigate.</div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function StepDesign() {
  const { study, setDesign, setStatus, setChoice } = useContext(StudyContext);
  const attrs = study.attributes || [];
  const cfg = study.choiceConfig;
  const locked = study.source === 'external';
  const [running, setRunning] = useState(false);
  const [error, setError] = useState(null);
  const [versions, setVersions] = useState(1);
  const [effort, setEffort] = useState('standard');
  const [advOpen, setAdvOpen] = useState(false);
  const [wD, setWD] = useState(0.3);
  const [wB, setWB] = useState(0.2);
  const [wO, setWO] = useState(0.5);
  const [targetDEff, setTargetDEff] = useState('');
  const [targetCV, setTargetCV] = useState('');
  const [progress, setProgress] = useState(null); // { attempt, maxStarts, bestScore, bestDiag, elapsed, scoreHistory }
  const workerRef = useRef(null);
  const carryOverSeed = useRef(null);

  const existingDesign = study.design;

  // Normalize weights to sum to 1
  const normW = () => {
    const s = Math.max(1e-6, wD + wB + wO);
    return { dEff: wD/s, balance: wB/s, overlap: wO/s };
  };

  const optimize = (append = false) => {
    setRunning(true); setError(null);
    setProgress({ attempt: 0, maxStarts: EFFORT_PRESETS[effort].maxStarts, bestScore: 0, bestDiag: null, elapsed: 0, scoreHistory: [] });
    try {
      const w = normW();
      const preset = EFFORT_PRESETS[effort];
      const baseSeed = append && carryOverSeed.current != null
        ? carryOverSeed.current + 500
        : ((Date.now() & 0x7fffffff));
      carryOverSeed.current = baseSeed;

      const worker = buildDesignWorker();
      workerRef.current = worker;
      worker.onmessage = (e) => {
        const m = e.data;
        if (m.type === 'progress' || m.type === 'improved') {
          setProgress(p => ({
            attempt: m.attempt,
            maxStarts: preset.maxStarts,
            bestScore: m.bestScore ?? (p?.bestScore || 0),
            bestDiag: m.bestDiag ?? m.diag ?? p?.bestDiag,
            elapsed: m.elapsed,
            scoreHistory: m.scoreHistory || (p?.scoreHistory || []).concat([m.score].filter(x => x != null))
          }));
        } else if (m.type === 'result') {
          setDesign({
            tasks: m.design,
            seed: baseSeed,
            algorithm: m.algorithm + ` — ${m.attemptsTried} attempt(s), best on attempt ${m.bestAttempt + 1}`,
            diagnostics: m.diagnostics,
            perVersion: m.perVersion,
            versions: m.versions,
            tasksPerVersion: m.tasksPerVersion,
            optimization: {
              weights: w,
              effort,
              score: m.score,
              attemptsTried: m.attemptsTried,
              bestAttempt: m.bestAttempt,
              elapsed: m.elapsed,
              scoreHistory: m.scoreHistory
            }
          });
          setStatus('Design Complete');
          setRunning(false);
          setProgress(null);
          worker.terminate();
          workerRef.current = null;
        } else if (m.type === 'error') {
          setError(m.message);
          setRunning(false);
          setProgress(null);
          worker.terminate();
          workerRef.current = null;
        }
      };
      worker.onerror = (e) => { setError(e.message || 'Worker error'); setRunning(false); };
      worker.postMessage({
        type: 'run',
        payload: {
          attributes: attrs,
          prohibitions: study.prohibitions || [],
          choiceConfig: cfg,
          versions,
          weights: w,
          targets: {
            dEff: targetDEff === '' ? null : Number(targetDEff),
            maxCV: targetCV === '' ? null : Number(targetCV) / 100
          },
          budgetMs: preset.budgetMs,
          maxStarts: preset.maxStarts,
          swapBudget: preset.swapBudget,
          baseSeed
        }
      });
    } catch (e) {
      setError(e.message || String(e));
      setRunning(false);
      setProgress(null);
    }
  };

  const stop = () => {
    if (workerRef.current) {
      workerRef.current.terminate();
      workerRef.current = null;
    }
    // Save whatever progress we have as the current design if no design yet? Skip; simply abort.
    setRunning(false);
  };

  useEffect(() => () => {
    if (workerRef.current) workerRef.current.terminate();
  }, []);

  const run = optimize; // alias, legacy

  const exportDesignMatrix = () => {
    if (!study.design) return;
    const cs = study.cardStyle || {};
    const attrName = (a) => cs.attributeDisplayNames?.[a.id] || a.name;
    const levelName = (a, li) => cs.levelDisplayNames?.[a.id]?.[a.levels[li]?.id] || a.levels[li]?.name;
    const rows = [];
    const header = ['Task_ID', 'Alternative_Position', ...attrs.map(a => attrName(a))];
    rows.push(header);
    study.design.tasks.forEach((task, ti) => {
      task.forEach((prof, ji) => {
        rows.push([ti + 1, ji + 1, ...prof.map((li, ai) => levelName(attrs[ai], li))]);
      });
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Master Design');
    // README sheet — clarifies which export this is
    const readme = [
      ['Master Design export'],
      [''],
      ['This file contains the experimental design only — one row per task × alternative.'],
      ['It is NOT the per-respondent allocation. For survey programming, use the Survey Assignments export from Step 6.'],
      [''],
      ['Sheets in this file:'],
      ['  Master Design — task × alternative × attribute levels'],
      ['  Diagnostics — D-efficiency, level balance, overlap'],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(readme), 'README');
    // Also add diagnostics
    const diag = study.design.diagnostics;
    const d2 = [
      ['Metric', 'Value'],
      ['Algorithm', study.design.algorithm],
      ['Total profiles (alt-slots)', diag.totalProfiles],
      ['Unique profiles', diag.uniqueProfiles],
      ['D-efficiency (approx)', diag.dEfficiency.toFixed(1) + '%'],
      ['Max level-balance CV', (diag.maxLevelCV * 100).toFixed(1) + '%'],
      ['Average overlap', (diag.overlapAvg * 100).toFixed(1) + '%'],
      ['Seed', study.design.seed],
      ['Versions', study.design.versions],
      ['Tasks per respondent', study.design.tasksPerVersion]
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(d2), 'Diagnostics');
    XLSX.writeFile(wb, `${(study.setup?.name || 'study').replace(/[^a-z0-9-_]+/gi,'_')}_master_design.xlsx`);
  };

  // Advisory tags per diagnostics
  const diagBadge = (label, level) => {
    const map = { green: 'bg-emerald-100 text-emerald-700', yellow: 'bg-amber-100 text-amber-800', red: 'bg-red-100 text-red-700' };
    return <span className={`px-2 py-0.5 rounded text-xs font-medium ${map[level]}`}>{label}</span>;
  };

  const effLevel = (v) => v >= 90 ? 'green' : v >= 80 ? 'yellow' : 'red';
  const cvLevel = (v) => v < 0.05 ? 'green' : v < 0.10 ? 'yellow' : 'red';

  return (
    <div>
      <h2 className="text-2xl font-semibold text-slate-900 mb-1">Experimental Design</h2>
      <p className="text-slate-500 text-sm mb-6">The tool generates a fractional factorial design that maximizes statistical efficiency subject to your prohibitions.</p>

      <Card title="Optimize design" className="mb-6">
        {locked && <Advisory level="info" className="mb-3"><strong>Imported study.</strong> The design was uploaded from the vendor and is shown read-only — re-optimizing would replace it and break response matching. You can still export it below.</Advisory>}
        <fieldset disabled={locked} className={`border-0 p-0 m-0 ${locked ? 'opacity-60' : ''}`}>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 items-start">
          <div className="md:col-span-2">
            <div className="text-xs font-medium text-slate-700 mb-2">Effort</div>
            <div className="grid grid-cols-3 gap-2">
              {Object.entries(EFFORT_PRESETS).map(([k, v]) => (
                <button key={k} onClick={() => setEffort(k)} disabled={running}
                  className={`px-3 py-2 rounded-lg border text-sm text-left transition-colors ${effort === k ? 'bg-blue-50 border-blue-400 ring-primary' : 'bg-white border-slate-200 hover:border-slate-300'}`}>
                  <div className="font-semibold text-slate-800">{v.label}</div>
                  <div className="text-xs text-slate-500">{v.desc}</div>
                </button>
              ))}
            </div>
          </div>
          <NumberInput label="Number of versions" value={versions} min={1} max={300} onChange={v => setVersions(clamp(v || 1, 1, 300))} help={`Total master tasks = ${cfg.tasksPerRespondent * versions}`} />
        </div>

        <details className="mt-4 border border-slate-200 rounded-lg p-3" open={advOpen} onToggle={e => setAdvOpen(e.target.open)}>
          <summary className="text-xs font-medium text-slate-700 cursor-pointer">Advanced: priority weights & quality targets</summary>
          <div className="mt-3 grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <div className="text-xs font-medium text-slate-700 mb-1">Priority weights (sum normalized to 1)</div>
              <div className="space-y-1.5">
                {[
                  { label: `D-efficiency · ${(wD/(wD+wB+wO)*100).toFixed(0)}%`, val: wD, set: setWD },
                  { label: `Level balance · ${(wB/(wD+wB+wO)*100).toFixed(0)}%`, val: wB, set: setWB },
                  { label: `Overlap (minimize) · ${(wO/(wD+wB+wO)*100).toFixed(0)}%`, val: wO, set: setWO },
                ].map((r, i) => (
                  <div key={i} className="flex items-center gap-2">
                    <div className="text-xs text-slate-600 w-64">{r.label}</div>
                    <input type="range" min={0} max={1} step={0.05} value={r.val} onChange={e => r.set(Number(e.target.value))} className="flex-1" />
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div className="text-xs font-medium text-slate-700 mb-1">Quality targets (early-stop when both met)</div>
              <div className="grid grid-cols-2 gap-2">
                <TextInput label="Min D-efficiency (%)" placeholder="e.g., 85" value={targetDEff} onChange={e => setTargetDEff(e.target.value)} />
                <TextInput label="Max level CV (%)" placeholder="e.g., 5" value={targetCV} onChange={e => setTargetCV(e.target.value)} />
              </div>
              <div className="text-xs text-slate-400 mt-2">Leave blank to run the full effort budget.</div>
            </div>
          </div>
        </details>
        </fieldset>

        <div className="mt-5 flex items-center gap-3 flex-wrap">
          {!running && !locked && (
            <Button onClick={() => optimize(false)}>{existingDesign ? 'Re-optimize design' : 'Optimize design'}</Button>
          )}
          {!running && !locked && existingDesign && (
            <Button variant="secondary" onClick={() => optimize(true)}>Keep optimizing</Button>
          )}
          {running && (
            <Button variant="danger" onClick={stop}>Stop</Button>
          )}
          {existingDesign && <Button variant="secondary" onClick={exportDesignMatrix}>Export Master Design (Excel)</Button>}
        </div>
        {existingDesign && (
          <div className="mt-3 text-xs text-slate-500 max-w-3xl">
            <b>Master Design</b> = the experimental design itself: one row per task × alternative, with the level shown in each position. This is what an experimental-design reviewer or methodologist wants to inspect. It is <b>not</b> the per-respondent allocation for survey programming — for that, complete Step 6 and use <b>Export Survey Assignments</b> there.
          </div>
        )}
        {error && <Advisory level="danger" className="mt-4">{error}</Advisory>}

        {running && progress && (
          <div className="mt-4 bg-slate-50 rounded-lg p-3 text-xs">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <Spinner />
                <span>Attempt {progress.attempt} / {progress.maxStarts}</span>
                {progress.bestDiag && (
                  <span className="text-slate-500 tabular">
                    · best so far: D-eff {progress.bestDiag.dEfficiency.toFixed(1)}%, CV {(progress.bestDiag.maxLevelCV*100).toFixed(1)}%, overlap {(progress.bestDiag.overlapAvg*100).toFixed(0)}%
                  </span>
                )}
              </div>
              <span className="text-slate-500 tabular">{(progress.elapsed/1000).toFixed(1)}s</span>
            </div>
            <div className="w-full bg-slate-200 rounded-full h-1.5 mb-2">
              <div className="bg-blue-600 h-1.5 rounded-full transition-all" style={{ width: (progress.attempt/progress.maxStarts*100) + '%' }} />
            </div>
            {progress.scoreHistory.length > 1 && (
              <div className="h-10">
                <R.ResponsiveContainer>
                  <R.LineChart data={progress.scoreHistory.map((v, i) => ({ i, v }))}>
                    <R.Line type="monotone" dataKey="v" stroke="#2563eb" strokeWidth={1.5} dot={false} />
                    <R.YAxis hide domain={[0, 1]} />
                    <R.XAxis hide dataKey="i" />
                  </R.LineChart>
                </R.ResponsiveContainer>
              </div>
            )}
          </div>
        )}

        {existingDesign?.optimization && !running && (
          <div className="mt-3 text-xs text-slate-500">
            {existingDesign.optimization.attemptsTried} attempts tried · best on attempt {existingDesign.optimization.bestAttempt + 1} · composite score {existingDesign.optimization.score.toFixed(3)} · {(existingDesign.optimization.elapsed/1000).toFixed(1)}s
          </div>
        )}
      </Card>

      {existingDesign && (
        <>
          <Card title="Design diagnostics" className="mb-6">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
              <div className="bg-slate-50 rounded-lg p-3">
                <div className="text-xs text-slate-500 mb-1">Unique profiles</div>
                <div className="text-2xl font-semibold text-slate-900">{existingDesign.diagnostics.uniqueProfiles}</div>
              </div>
              <div className="bg-slate-50 rounded-lg p-3">
                <div className="text-xs text-slate-500 mb-1">Total alt-slots</div>
                <div className="text-2xl font-semibold text-slate-900">{existingDesign.diagnostics.totalProfiles}</div>
                <div className="text-xs text-slate-400">{existingDesign.tasks.length} tasks × {cfg.altsPerTask} alts</div>
              </div>
              <div className="bg-slate-50 rounded-lg p-3">
                <div className="text-xs text-slate-500 mb-1">D-efficiency (approx)</div>
                <div className="text-2xl font-semibold text-slate-900">{existingDesign.diagnostics.dEfficiency.toFixed(1)}%</div>
                <div className="mt-1">{diagBadge(
                  existingDesign.diagnostics.dEfficiency >= 90 ? 'Excellent' : existingDesign.diagnostics.dEfficiency >= 80 ? 'Good' : 'Below threshold',
                  effLevel(existingDesign.diagnostics.dEfficiency))}</div>
              </div>
              <div className="bg-slate-50 rounded-lg p-3">
                <div className="text-xs text-slate-500 mb-1">Max level-CV</div>
                <div className="text-2xl font-semibold text-slate-900">{(existingDesign.diagnostics.maxLevelCV * 100).toFixed(1)}%</div>
                <div className="mt-1">{diagBadge(
                  existingDesign.diagnostics.maxLevelCV < 0.05 ? 'Excellent' : existingDesign.diagnostics.maxLevelCV < 0.10 ? 'Acceptable' : 'Imbalanced',
                  cvLevel(existingDesign.diagnostics.maxLevelCV))}</div>
              </div>
            </div>
            {existingDesign.perVersion && existingDesign.versions > 1 && (
              <details className="mb-4 border border-slate-200 rounded-lg p-3">
                <summary className="text-xs font-medium text-slate-700 cursor-pointer">Per-version detail · {existingDesign.versions} versions</summary>
                <div className="mt-3 overflow-x-auto scroll-thin">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="text-slate-500">
                        <th className="text-left py-1 pr-3">Metric (across versions)</th>
                        <th className="text-right py-1 pr-3">Best</th>
                        <th className="text-right py-1 pr-3">Mean</th>
                        <th className="text-right py-1 pr-3">Worst</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr className="border-t border-slate-100">
                        <td className="py-1.5 pr-3 text-slate-800">D-efficiency</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{existingDesign.perVersion.dEff.max.toFixed(1)}%</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{existingDesign.perVersion.dEff.mean.toFixed(1)}%</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{existingDesign.perVersion.dEff.min.toFixed(1)}%</td>
                      </tr>
                      <tr className="border-t border-slate-100">
                        <td className="py-1.5 pr-3 text-slate-800">Max level-CV</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{(existingDesign.perVersion.maxLevelCV.min*100).toFixed(1)}%</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{(existingDesign.perVersion.maxLevelCV.mean*100).toFixed(1)}%</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{(existingDesign.perVersion.maxLevelCV.max*100).toFixed(1)}%</td>
                      </tr>
                      <tr className="border-t border-slate-100">
                        <td className="py-1.5 pr-3 text-slate-800">Average overlap</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{(existingDesign.perVersion.overlap.min*100).toFixed(0)}%</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{(existingDesign.perVersion.overlap.mean*100).toFixed(0)}%</td>
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{(existingDesign.perVersion.overlap.max*100).toFixed(0)}%</td>
                      </tr>
                    </tbody>
                  </table>
                  <div className="text-xs text-slate-400 mt-2">Each respondent sees one version. "Best/Worst" are the most/least favorable versions per metric (for CV and overlap, lower is better).</div>
                </div>
              </details>
            )}
            <div className="overflow-x-auto scroll-thin">
              <table className="w-full text-xs">
                <thead>
                  <tr className="text-slate-500">
                    <th className="text-left py-1 pr-3">Attribute</th>
                    {Math.max(...attrs.map(a => a.levels.length)) > 0 &&
                      range(Math.max(...attrs.map(a => a.levels.length))).map(i => <th key={i} className="text-right py-1 pr-3">Lvl {i+1}</th>)}
                    <th className="text-right py-1 pr-3">Overlap</th>
                  </tr>
                </thead>
                <tbody>
                  {attrs.map((a, ai) => {
                    const counts = existingDesign.diagnostics.levelCounts[ai] || [];
                    const ov = existingDesign.diagnostics.overlapPerAttr[ai] || 0;
                    return (
                      <tr key={a.id} className="border-t border-slate-100">
                        <td className="py-1.5 pr-3 text-slate-800">{a.name}</td>
                        {range(Math.max(...attrs.map(x => x.levels.length))).map(li => (
                          <td key={li} className="text-right py-1.5 pr-3 tabular text-slate-700">{counts[li] ?? '—'}</td>
                        ))}
                        <td className="text-right py-1.5 pr-3 tabular text-slate-700">{(ov * 100).toFixed(0)}%</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          <ParameterPrecisionTable study={study} design={existingDesign} />

          <DesignAdvisor
            study={study}
            design={existingDesign}
            sampleSizeForPrecision={study.assignment?.sampleSize || 300}
            onApplyChoice={(patch) => setChoice(patch)}
            onRerunEffort={(eff) => { setEffort(eff); setTimeout(() => optimize(false), 50); }}
          />

          <Card title={`Product card gallery — ${existingDesign.tasks.length} choice tasks`}>
            <div className="max-h-[500px] overflow-y-auto scroll-thin space-y-4 pr-2">
              {existingDesign.tasks.map((task, ti) => (
                <div key={ti}>
                  <div className="text-xs text-slate-500 mb-1">Task {ti + 1}</div>
                  <div className="flex gap-2 overflow-x-auto scroll-thin">
                    {task.map((p, j) => (
                      <ProfileCard key={j} attrs={attrs} profile={p} label={`Prod ${String.fromCharCode(65+j)}`} cardStyle={study.cardStyle} />
                    ))}
                    {cfg.includeSoC && cfg.socProfile && (
                      <ProfileCard attrs={attrs} profile={cfg.socProfile} label={cfg.socLabel} cardStyle={study.cardStyle} />
                    )}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        </>
      )}
    </div>
  );
}

// ========================================================================
// SECTION 14 — STEP 5: CARD PREVIEW & CUSTOMIZATION
// ========================================================================
function StepCards() {
  const { study, setCardStyle } = useContext(StudyContext);
  const cs = study.cardStyle || {};
  const attrs = study.attributes || [];
  const cfg = study.choiceConfig;
  const d = study.design;

  const dnSet = (attrId, v) => setCardStyle({ attributeDisplayNames: { ...cs.attributeDisplayNames, [attrId]: v } });
  const dlSet = (attrId, levelId, v) => setCardStyle({ levelDisplayNames: { ...cs.levelDisplayNames, [attrId]: { ...(cs.levelDisplayNames?.[attrId] || {}), [levelId]: v } } });

  const exportCSV = () => {
    if (!d) return alert('Generate the design first.');
    const dn = (a) => cs.attributeDisplayNames?.[a.id] || a.name;
    const dl = (a, li) => cs.levelDisplayNames?.[a.id]?.[a.levels[li]?.id] || a.levels[li]?.name;
    const rows = [['Task_ID', 'Alternative_Position', ...attrs.map(dn)]];
    d.tasks.forEach((task, ti) => {
      task.forEach((p, ji) => {
        rows.push([ti + 1, ji + 1, ...p.map((li, ai) => dl(attrs[ai], li))]);
      });
      if (cfg.includeSoC && cfg.socProfile) {
        rows.push([ti + 1, d.tasks[0].length + 1, ...cfg.socProfile.map((li, ai) => dl(attrs[ai], li))]);
      }
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Cards');
    XLSX.writeFile(wb, `${(study.setup?.name || 'study').replace(/[^a-z0-9-_]+/gi,'_')}_cards.xlsx`);
  };

  const exportHTML = () => {
    if (!d) return;

// ========================================================================
function buildAssignment(study, opts) {
  // Given the master design (already split into versions by S / T), produce per-respondent task/position assignments.
  const d = study.design;
  const cfg = study.choiceConfig;
  const nResp = opts.sampleSize;
  const versions = d.versions;
  const T = d.tasksPerVersion;

  const rng = makeRng(opts.seed || 1337);

  // Split master tasks into versions
  const versionTasks = [];
  for (let v = 0; v < versions; v++) {
    versionTasks.push(d.tasks.slice(v * T, (v + 1) * T));
  }

  // Sequential version allocation with optional subgroup blocking
  const rows = [];
  const subgroups = (opts.subgroups && opts.subgroups.length) ? opts.subgroups : [''];
  // Round-robin version within each subgroup
  const subgroupSize = Math.ceil(nResp / subgroups.length);
  let respIdx = 0;
  for (let si = 0; si < subgroups.length; si++) {
    const label = subgroups[si];
    const n = Math.min(subgroupSize, nResp - respIdx);
    for (let r = 0; r < n; r++, respIdx++) {
      const respId = `R${String(respIdx + 1).padStart(4, '0')}`;
      const version = (r % versions);
      const tasks = versionTasks[version].map((t, ti) => ({ ti: ti + 1, alts: t }));
      shuffleInPlace(tasks, rng);
      tasks.forEach((t, taskNum) => {
        // Randomize positions (SoC stays fixed if included)
        const positions = t.alts.map((p, i) => ({ p, i }));
        shuffleInPlace(positions, rng);
        positions.forEach((item, pos) => {
          rows.push({
            respId, version: version + 1, subgroup: label,
            taskNum: taskNum + 1,
            position: pos + 1,
            originalAltIdx: item.i + 1,
            profile: item.p
          });
        });
        if (cfg.includeSoC && cfg.socProfile) {
          rows.push({
            respId, version: version + 1, subgroup: label,
            taskNum: taskNum + 1,
            position: positions.length + 1,
            originalAltIdx: 'SoC',
            profile: cfg.socProfile
          });
        }
      });
    }
  }

  return {
    rows, sampleSize: nResp, versions, subgroups,
    createdAt: Date.now(),
    seed: opts.seed
  };
}

function StepAssignment() {
  const { study, setAssignment, setStatus } = useContext(StudyContext);
  const d = study.design;
  const locked = study.source === 'external';
  // Compute the precision-based floor for sample size: smallest N at which every parameter
  // meets the user's SE target (set on Step 4, default 0.10). Below this floor, at least
  // one level in the design isn't well-identified.
  const seTarget = (typeof study.precisionTarget === 'number' && study.precisionTarget > 0) ? study.precisionTarget : 0.10;
  const precisionFloor = useMemo(
    () => d ? computeRequiredNForTarget(study, d, seTarget) : null,
    [study, d, seTarget]
  );
  // Hard floor used for the input min. When no design exists yet, fall back to 1 (no precision data).
  const hardFloor = precisionFloor || 1;
  const defaultSampleSize = study.assignment?.sampleSize || Math.max(precisionFloor || 300, 300);
  const [sampleSize, setSampleSize] = useState(defaultSampleSize);
  const [subgroupsStr, setSubgroupsStr] = useState(study.assignment?.subgroups?.join(', ') || '');
  const [seed, setSeed] = useState(study.assignment?.seed || 1337);
  const [running, setRunning] = useState(false);

  // If the precision floor changes (user re-runs design or changes SE target) and current N is
  // below it, bump N up automatically — keeps the input in a valid state.
  useEffect(() => {
    if (precisionFloor && sampleSize < precisionFloor) setSampleSize(precisionFloor);
  }, [precisionFloor]);  // intentionally not depending on sampleSize — only re-floor on floor changes

  const advisories = [];
  if (precisionFloor && sampleSize < precisionFloor) {
    advisories.push({
      level: 'danger',
      msg: `Sample size N = ${sampleSize} is below the precision floor N = ${precisionFloor} required for every parameter in this design to meet SE < ${seTarget.toFixed(2)}. Increase N or relax the SE target on Step 4 → Parameter precision.`
    });
  } else if (sampleSize < 200) {
    advisories.push({ level: 'warn', msg: 'Sample sizes below 200 may produce unstable individual-level HB estimates. Aggregate-level results will still be valid, but subgroup analyses may show high variance.' });
  }

  const run = () => {
    setRunning(true);
    setTimeout(() => {
      const subgroups = subgroupsStr.split(',').map(s => s.trim()).filter(Boolean);
      const a = buildAssignment(study, { sampleSize, seed, subgroups });
      setAssignment(a);
      setStatus('Awaiting Data');
      setRunning(false);
    }, 30);
  };

  const exportAssignment = () => {
    if (!study.assignment) return;
    const attrs = study.attributes;
    const cs = study.cardStyle || {};
    const dn = (a) => cs.attributeDisplayNames?.[a.id] || a.name;
    const dl = (a, li) => cs.levelDisplayNames?.[a.id]?.[a.levels[li]?.id] || a.levels[li]?.name;
    const header = ['Respondent_ID', 'Version_ID', 'Subgroup', 'Task_Number', 'Alternative_Position', 'Original_Alt_Idx', ...attrs.map(dn)];
    const rows = [header];
    study.assignment.rows.forEach(r => {
      rows.push([r.respId, r.version, r.subgroup, r.taskNum, r.position, r.originalAltIdx, ...r.profile.map((li, ai) => dl(attrs[ai], li))]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    // README sheet — clarifies which export this is
    const readme = [
      ['Survey Assignments export (per-respondent)'],
      [''],
      ['This file contains the per-respondent allocation — one row per respondent × task × alternative position.'],
      ['Position randomization has already been applied. This is what your survey programmer needs to field the study.'],
      [''],
      ['For the underlying experimental design (without respondent allocation), see the Master Design export from Step 4.'],
      [''],
      ['Sheets in this file:'],
      ['  Survey Assignments — respondent × task × position × levels'],
      ['  Summary — sample size, versions, respondents per version'],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(readme), 'README');
    XLSX.utils.book_append_sheet(wb, ws, 'Survey Assignments');
    // Summary tab

    const taskCount = study.choiceConfig.tasksPerRespondent;

    const respPerVersion = {};
    new Set(study.assignment.rows.map(r => r.respId + '|' + r.version)).forEach(k => {
      const v = k.split('|')[1];

    const s2 = [['Metric', 'Value'], ['Total respondents', study.assignment.sampleSize], ['Versions', study.assignment.versions]];
    Object.entries(respPerVersion).forEach(([v, n]) => s2.push([`Version ${v} respondents`, n]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s2), 'Summary');
    XLSX.writeFile(wb, `${(study.setup?.name || 'study').replace(/[^a-z0-9-_]+/gi,'_')}_survey_assignments.xlsx`);
  };

  return (
    <div>
      <h2 className="text-2xl font-semibold text-slate-900 mb-1">Respondent Assignment</h2>

      {advisories.length > 0 && <div className="mb-5 space-y-2">{advisories.map((a, i) => <Advisory key={i} level={a.level}>{a.msg}</Advisory>)}</div>}

      {locked && <Advisory level="info" className="mb-5"><strong>Imported study.</strong> The respondent assignment came from the vendor field data and is locked — rebuilding it would replace the real allocation and break response matching. Export remains available.</Advisory>}

      <Card title="Assignment parameters" className="mb-6">
        <fieldset disabled={locked} className={`border-0 p-0 m-0 ${locked ? 'opacity-60' : ''}`}>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <NumberInput
              label="Total sample size"
              value={sampleSize}
              min={hardFloor}
              onChange={v => {
                // Clamp on input — don't allow values below the precision floor.
                // HTML5 min isn't strictly enforced on typed values, so we clamp here.
                const n = Number(v) || 0;
                setSampleSize(precisionFloor ? Math.max(precisionFloor, n) : n);

            />

              <div className="text-xs text-slate-500 mt-1">

                  <button

                Generate the design on Step 4 first to see the precision-based minimum.
              </div>
            )}
          </div>
          <div>
            <div className="text-xs font-medium text-slate-700 mb-1">Versions (auto)</div>
            <div className="px-3 py-2 bg-slate-50 rounded-lg text-sm text-slate-600 tabular">{d?.versions || '—'}</div>
            <div className="text-xs text-slate-400 mt-1">Tasks per respondent: {d?.tasksPerVersion}</div>

        </div>

          {!locked && <Button onClick={run} disabled={running}>{running ? <><Spinner /> Assigning…</> : 'Build Assignment'}</Button>}
          {study.assignment && <Button variant="secondary" onClick={exportAssignment}>Export Survey Assignments (Excel)</Button>}
        </div>
        {study.assignment && (
          <div className="mt-3 text-xs text-slate-500 max-w-3xl">
            <b>Survey Assignments</b> = the per-respondent allocation: one row per respondent × task × alternative position, with the exact attribute levels each person sees and the position randomization already applied. <b>This is what your survey programmer needs.</b> (For the underlying experimental design without respondent allocation, see <b>Export Master Design</b> on Step 4.)
          </div>
        )}

      {study.assignment && (
        <Card title="Assignment summary">

            <div className="bg-slate-50 rounded p-3"><div className="text-xs text-slate-500">Versions</div><div className="text-xl font-semibold">{study.assignment.versions}</div></div>
            <div className="bg-slate-50 rounded p-3"><div className="text-xs text-slate-500">Tasks / respondent</div><div className="text-xl font-semibold">{study.choiceConfig.tasksPerRespondent}</div></div>
            <div className="bg-slate-50 rounded p-3"><div className="text-xs text-slate-500">Total rows</div><div className="text-xl font-semibold">{study.assignment.rows.length.toLocaleString()}</div></div>
          </div>
          <div className="mt-3 text-xs text-slate-500">The assignment file is the primary handoff to survey programmers. Each row = one card shown to one respondent in one task at one position.</div>

function parseUploadedFile(file) {
  return new Promise((resolve, reject) => {
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const ext = (file.name.split('.').pop() || '').toLowerCase();
        let rows = [];
        if (ext === 'csv' || ext === 'tsv' || ext === 'txt') {
          const text = rd.result;
          // Parse CSV naively (SheetJS handles quoted fields better)
          const wb = XLSX.read(text, { type: 'string' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        } else {
          const ab = rd.result;
          const wb = XLSX.read(ab, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        }
        resolve(rows);
      } catch (e) { reject(e); }
    };
    rd.onerror = () => reject(rd.error);
    if ((file.name.split('.').pop() || '').toLowerCase() === 'csv') rd.readAsText(file);
    else rd.readAsArrayBuffer(file);
  });
}

function validateResponses(rows, study) {
  // Expected columns (case-insensitive): Respondent_ID, Task_Number, Chosen_Alternative, plus optional segmentation
  const norm = r => {
    const o = {};
    for (const k of Object.keys(r)) o[k.toLowerCase()] = r[k];
    return o;
  };
  const normed = rows.map(norm);
  const knownKeys = new Set(['respondent_id','respondentid','task_number','tasknumber','chosen_alternative','chosenalternative','chosen','response']);
  const segCols = [];
  if (normed.length > 0) {
    for (const k of Object.keys(normed[0])) if (!knownKeys.has(k)) segCols.push(k);
  }

  const respondents = {};
  const assigned = study.assignment ? new Set(study.assignment.rows.map(r => `${r.respId}|${r.taskNum}`)) : null;
  const assignedRespIds = new Set(study.assignment ? study.assignment.rows.map(r => r.respId) : []);

  let unmatchedCount = 0;
  normed.forEach(r => {
    const rid = String(r.respondent_id ?? r.respondentid ?? '').trim();
    const tn = Number(r.task_number ?? r.tasknumber ?? 0);
    let ca = r.chosen_alternative ?? r.chosenalternative ?? r.chosen ?? r.response;
    if (typeof ca === 'string') {
      const t = ca.trim().toLowerCase();
      if (t === 'none' || t === '' || t === '0') ca = 0;
      else ca = Number(ca);
    } else ca = Number(ca);
    if (!rid || !tn) return;
    if (assigned && !assigned.has(`${rid}|${tn}`)) unmatchedCount++;
    if (!respondents[rid]) respondents[rid] = { respId: rid, tasks: {}, seg: {} };
    respondents[rid].tasks[tn] = ca;
    segCols.forEach(c => { respondents[rid].seg[c] = r[c]; });
  });

  // Validation flags
  const T = study.choiceConfig.tasksPerRespondent;
  const J = study.choiceConfig.altsPerTask + (study.choiceConfig.includeSoC ? 1 : 0);
  const respArr = Object.values(respondents);
  respArr.forEach(resp => {
    const choices = Object.values(resp.tasks);
    resp.nTasks = choices.length;
    resp.completeness = resp.nTasks / T;
    // Straight-lining
    const posCounts = {};
    choices.forEach(c => { posCounts[c] = (posCounts[c] || 0) + 1; });
    const maxSame = Math.max(...Object.values(posCounts), 0);
    resp.straightlineFrac = resp.nTasks ? maxSame / resp.nTasks : 0;
    resp.flagIncomplete = resp.completeness < 0.75;
    resp.flagStraightline = resp.straightlineFrac > 0.8;
    const noneCount = choices.filter(c => c === 0).length;
    resp.noneFrac = resp.nTasks ? noneCount / resp.nTasks : 0;
    resp.flagNoneHeavy = resp.noneFrac > 0.8;
    // default exclude flag
    resp.exclude = resp.flagIncomplete || resp.flagStraightline;
  });

  return {
    rows: respArr,
    segColumns: segCols,
    summary: {
      total: respArr.length,
      complete: respArr.filter(r => !r.flagIncomplete).length,
      incomplete: respArr.filter(r => r.flagIncomplete).length,
      straightline: respArr.filter(r => r.flagStraightline).length,
      noneHeavy: respArr.filter(r => r.flagNoneHeavy).length,
      unmatchedCount,
      unmatchedRespondents: [...new Set(normed.map(r => String(r.respondent_id ?? r.respondentid ?? '').trim()))].filter(rid => rid && !assignedRespIds.has(rid)).length
    }
  };
}

function StepData() {
  const { study, setResponses, setStatus } = useContext(StudyContext);
  const [parsing, setParsing] = useState(false);
  const [error, setError] = useState(null);
  const locked = study.source === 'external';

  const handleFile = async (ev) => {
    const file = ev.target.files?.[0];
    if (!file) return;
    setParsing(true); setError(null);
    try {
      const rows = await parseUploadedFile(file);
      const v = validateResponses(rows, study);
      setResponses(v);
      setStatus('Awaiting Data');
    } catch (e) { setError(e.message || String(e)); }
    finally { setParsing(false); ev.target.value = ''; }
  };

  const toggleExclude = (respId) => {
    const copy = { ...study.responses, rows: study.responses.rows.map(r => r.respId === respId ? { ...r, exclude: !r.exclude } : r) };
    setResponses(copy);
  };
  const includeAll = () => setResponses({ ...study.responses, rows: study.responses.rows.map(r => ({ ...r, exclude: false })) });
  const excludeAllFlagged = () => setResponses({ ...study.responses, rows: study.responses.rows.map(r => ({ ...r, exclude: r.flagIncomplete || r.flagStraightline || r.flagNoneHeavy })) });

  const exportSampleData = () => {
    // Generate synthetic response data matching the assignment file, for testing.
    if (!study.assignment) return alert('Create an assignment first.');
    const attrs = study.attributes;
    const rng = makeRng(999);
    const layout = buildParamLayout(attrs, study.choiceConfig.includeNone);
    // Population mean utility (random)
    const mu = new Float64Array(layout.nPar);
    for (let k = 0; k < layout.nPar; k++) mu[k] = randn(rng) * 0.5;
    // Per-respondent betas
    const respIds = [...new Set(study.assignment.rows.map(r => r.respId))];
    const betas = {};
    respIds.forEach(rid => {
      const b = new Float64Array(layout.nPar);
      for (let k = 0; k < layout.nPar; k++) b[k] = mu[k] + randn(rng) * 0.5;
      betas[rid] = b;
    });
    // For each respondent, for each task (grouped), compute utilities and sample choice
    const grouped = {};
    study.assignment.rows.forEach(r => {
      const key = `${r.respId}|${r.taskNum}`;
      if (!grouped[key]) grouped[key] = { respId: r.respId, taskNum: r.taskNum, alts: [] };
      grouped[key].alts.push({ position: r.position, profile: r.profile, isSoC: r.originalAltIdx === 'SoC' });
    });
    const rows = [['Respondent_ID', 'Task_Number', 'Chosen_Alternative', 'Specialty', 'Region']];
    const specialties = ['Oncologist', 'Hematologist'];
    const regions = ['Northeast', 'Midwest', 'South', 'West'];
    const respMeta = {};
    respIds.forEach(rid => { respMeta[rid] = { Specialty: specialties[Math.floor(rng()*2)], Region: regions[Math.floor(rng()*4)] }; });
    Object.values(grouped).forEach(g => {
      const util = g.alts.map(a => {
        const row = profileToDummyRow(a.profile, attrs, layout);
        let u = 0; for (let k = 0; k < layout.nPar; k++) u += betas[g.respId][k] * row[k];
        return u;
      });
      // None: if enabled, add None utility
      let chosen = 0;
      if (study.choiceConfig.includeNone) {
        const uNone = betas[g.respId][layout.nPar - 1];
        const all = [...util, uNone];
        const probs = softmax(all);
        // Cumulative sampling
        let s = 0, pick = all.length - 1;
        const u = rng();
        for (let i = 0; i < all.length; i++) { s += probs[i]; if (u < s) { pick = i; break; } }
        chosen = (pick === all.length - 1) ? 0 : g.alts[pick].position; // 0 for None
      } else {
        const probs = softmax(util);
        let s = 0, pick = 0; const u = rng();
        for (let i = 0; i < probs.length; i++) { s += probs[i]; if (u < s) { pick = i; break; } }
        chosen = g.alts[pick].position;
      }
      rows.push([g.respId, g.taskNum, chosen, respMeta[g.respId].Specialty, respMeta[g.respId].Region]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Responses');
    XLSX.writeFile(wb, `${(study.setup?.name || 'study').replace(/[^a-z0-9-_]+/gi,'_')}_synthetic_responses.xlsx`);
  };

  const r = study.responses;
  return (
    <div>
      <h2 className="text-2xl font-semibold text-slate-900 mb-1">Data Upload & Validation</h2>
      <p className="text-slate-500 text-sm mb-6">Upload respondent choices. Expected columns: Respondent_ID, Task_Number, Chosen_Alternative (integer position; 0 or "None" for none-choice). Any extra columns are treated as respondent-level segmentation variables.</p>

      <Card title="Upload file" className="mb-6">
        {locked ? (
