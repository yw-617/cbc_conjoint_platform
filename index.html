            This page documents the mathematical methodology used in the tool and the validation performed against
            independent numpy/scipy reference implementations.
          </P>

          <H2 id="methodology">2. Methodology</H2>

          <H3 id="m-rum">2.1 The Random Utility Model</H3>
          <P>
            CBC is grounded in random utility theory (McFadden 1974). Respondent <em>n</em>, presented with task <em>t</em>
            containing <em>J</em> alternatives, assigns a utility to each alternative <em>j</em>:
          </P>
          <Eq>U_njt = V_njt + ε_njt</Eq>
          <P>
            <em>V</em> is the systematic component (estimated); ε is i.i.d. Type-I Extreme Value noise. Under this
            assumption the choice probability follows the multinomial logit (MNL):
          </P>
          <Eq>P_n(j | t) = exp(V_njt) / Σ_k exp(V_nkt)</Eq>

          <H3 id="m-partworth">2.2 Part-Worth Utility Specification</H3>
          <P>
            With categorical attributes, systematic utility is a sum of part-worths:
          </P>
          <Eq>V_njt = Σ_a Σ_l (β_n,a,l · x_njt,a,l)</Eq>
          <P>
            where <em>x_njt,a,l</em> = 1 if alternative <em>j</em> in task <em>t</em> has level <em>l</em> of attribute
            <em> a</em>, else 0. One level per attribute is set as reference (β = 0); all other levels are estimated
            relative to it. Default reference: the last level the user defined for each attribute. The platform uses
            raw part-worths — not zero-centered diffs.
          </P>

          <H3 id="m-design">2.3 Experimental Design Generation</H3>
          <P>
            The design engine selects J alternatives for each of S tasks, respecting any prohibited level-pairs the
            user defined. Two algorithms are used depending on problem shape:
          </P>
          <P>
            <strong>Modified Federov (D-efficient).</strong> When there are ≤6 attributes and no prohibitions, the
            tool runs a Federov-style algorithm: for each current alternative slot, sample candidate profiles and
            accept the swap that maximizes the log-determinant of the MNL Fisher information matrix evaluated at β = 0.
            The tool uses 25 random starts (reduced from the rulebook's 1,000 for browser performance).
          </P>
          <P>
            <strong>Balanced-overlap with swap optimization.</strong> Used when there are ≥7 attributes or any prohibitions.
            Each start begins from a balanced initial design (level frequencies near-uniform) and runs a swap loop:
            pick a random (task, alternative, attribute) and propose a level swap; accept based on a composite score.
          </P>
          <P>
            <strong>Composite score.</strong> Three diagnostics — D-efficiency, max level CV, average overlap — are each
            normalized to [0,1] at rulebook thresholds, then combined with user-tunable weights:
          </P>
          <Eq>{`D̂  = min(1, D-eff / 100)
B̂  = max(0, 1 − min(1, maxCV / 0.20))
Ô  = max(0, 1 − min(1, |overlap − 0.30| / 0.20))

score = w_D · D̂ + w_B · B̂ + w_O · Ô,   w_D + w_B + w_O = 1

default weights: w_D = 0.5, w_B = 0.3, w_O = 0.2`}</Eq>
          <P>
            <strong>Simulated annealing.</strong> Swap acceptance uses Metropolis: accept if ΔS = score_new − score_cur > 0,
            otherwise accept with probability exp(ΔS / T). Geometric cooling T_k = T₀·αᵏ with T₀ = 0.05, T_f = 10⁻⁴,
            α = (T_f/T₀)^(1/K). Improvements are always kept; regressions accepted with decaying probability so the
            search can escape local optima.
          </P>
          <P>
            <strong>Multi-start.</strong> N independent starts are run; each emits an improvement event when it beats
            the global best. Effort presets: <strong>Quick</strong> (10 starts, 5k swaps, ~5s), <strong>Standard</strong>
            (50 starts, 15k swaps, ~30s), <strong>Thorough</strong> (200 starts, 30k swaps, ~2min).
          </P>
          <P>
            <strong>D-efficiency proxy.</strong> For the information matrix M of the current design (size p × p) and
            total alternative-slots N, the tool reports:
          </P>
          <Eq>D-eff = 100 · exp( log|M|/p − log( N(J−1) / (J · L̄) ) )</Eq>
          <P>
            where L̄ = mean levels per attribute. The baseline is the log-determinant expected from a perfectly
            balanced orthogonal design of the same size. Values in the 90–100% range indicate orthogonal-grade designs.
            log|M| is computed via Cholesky factorization, which returns −∞ on singular matrices (scoring that design as 0).
          </P>
          <P>
            <strong>Predicted parameter precision.</strong> Once you've chosen a sample size N, the tool can predict the
            standard error of each individual part-worth estimate <em>before</em> any data is collected. The variance-covariance
            matrix of the estimated parameters is V = M⁻¹. Inverting via Cholesky:
          </P>
          <Eq>{`SE_k = √( versions · V_kk / N )

95% CI half-width = 1.96 · SE_k

SE ratio_k = SE_k / geomean(SE_1, ..., SE_p)`}</Eq>
          <P>
            The <em>versions</em> factor accounts for the fact that each respondent only sees 1/versions of the master design,
            so per-respondent information is M / versions. With one version, every respondent sees the entire design.
            With two versions, each respondent sees half — and the SE for the same N is √2 ≈ 1.41× higher than it would be
            with a single version.
          </P>
          <P>
            The <em>SE ratio</em> compares each parameter to the geometric mean across the design. Values ≈ 1 mean balanced
            precision. Ratios &gt; 1.3 flag parameters that will be unusually noisy compared to siblings — typically a
            sign of confounding or a level appearing too rarely.
          </P>
          <P>
            The platform displays this as a per-attribute table in Step 4. Color cells: green if SE &lt; 0.10 (well identified);
            amber if 0.10–0.20 (borderline); red if &gt; 0.20 (weakly identified — design changes recommended).
            The Design advisor adds a medium-severity item if any parameter exceeds the 0.20 threshold at the configured N.
          </P>

          <H3 id="m-hb">2.4 Hierarchical Bayes Estimation</H3>
          <P>
            The HB-MNL model estimates individual-level part-worths by borrowing strength across respondents through a
            hierarchical prior.
          </P>
          <P>
            <strong>Level 1 (individual).</strong> Given β_n, respondent n's sequence of choices:
          </P>
          <Eq>L(β_n) = Π_t [ exp(x_njt' β_n) / Σ_k exp(x_nkt' β_n) ]</Eq>
          <P>
            <strong>Level 2 (population).</strong>
          </P>
          <Eq>β_n ~ MVN(μ, Σ)</Eq>
          <P>
            <strong>Priors.</strong>
          </P>
          <Eq>{`μ ~ MVN(0, σ²_μ · I),   σ²_μ = 100  (diffuse)
Σ ~ Inverse-Wishart(ν, Ω),   ν = p + 3,   Ω = ν · I`}</Eq>
          <P>
            <strong>Metropolis-within-Gibbs sampler.</strong> Each iteration cycles:
          </P>
          <P>
            1. Sample μ | Σ, β — closed-form MVN update.<br />
            2. Sample Σ | μ, β — closed-form Inverse-Wishart update.<br />
            3. For each respondent, MH-propose β*_n = β_n + s · N(0, I). Accept with probability<br />
            &nbsp;&nbsp;&nbsp;min(1, r) where r = [ L(β*) · φ(β* | μ, Σ) ] / [ L(β) · φ(β | μ, Σ) ]<br />
            The step size s is adaptively tuned during burn-in toward ~30% acceptance.
          </P>
          <P>
            <strong>Schedule.</strong> Browser defaults: 8,000 iterations, 4,000 burn-in, thin 5. The rulebook's
            20k/10k/5 schedule is exposed in Advanced Settings for full-quality runs.
          </P>
          <P>
            <strong>Diagnostics.</strong>
          </P>
          <Eq>{`RLH  =  [ Π_n Π_t P_n(chosen | β_n) ]^(1 / (N · T))
       ≈ exp( meanLL )

Percent Certainty  =  (RLH − 1/J) / (1 − 1/J) · 100%`}</Eq>
          <P>
            RLH is the geometric mean of predicted probabilities for the observed choices. Chance level is 1/J; a
            well-fitting model typically reaches 0.5–0.7. Percent certainty rescales RLH to 0–100%.
          </P>
          <P>
            The platform also runs a convergence check: a t-test for non-zero slope of RLH across the last 2,000
            burn-in iterations. Significant slope triggers a warning suggesting more iterations.
          </P>

          <H3 id="m-lca">2.5 Latent Class Segmentation</H3>
          <P>
            Latent class analysis assumes the population is a mixture of K discrete segments, each with its own β:
          </P>
          <Eq>P(choices of n) = Σ_k π_k · Π_t [ exp(x_njt' β_k) / Σ_m exp(x_nmt' β_k) ]</Eq>
          <P>
            π_k is the class probability, β_k is class k's part-worth vector. Estimated via EM:
          </P>
          <P>
            <strong>E-step.</strong> Compute posterior class membership for each respondent:
          </P>
          <Eq>{`P(k | data_n) = softmax_k [ log π_k + Σ_t log P(choice_nt | β_k) ]`}</Eq>
          <P>
            <strong>M-step.</strong> Update π_k as the mean posterior, and each β_k via weighted Newton steps on the
            MNL log-likelihood (inner loop of 4 Newton steps per EM iteration with step clipping to [-1, +1] for
            stability). Outer loop terminates when ΔLL &lt; 0.001 · |LL|.
          </P>
          <P>
            <strong>Model selection.</strong> The tool runs K = 2, 3, 4, 5 and reports:
          </P>
          <Eq>{`BIC = −2·LL + p · ln(N)
AIC = −2·LL + 2p    where p = K·(nParams) + (K − 1)`}</Eq>
          <P>
            The BIC-optimal model is auto-selected as default. Users can override from the K table.
          </P>
          <P>
            <strong>Random starts.</strong> EM is non-convex; the tool runs 8 random starts per K (rulebook's 50 is
            available by editing the code). The best-LL solution is kept.
          </P>

          <H3 id="m-acbc">2.6 Adaptive CBC (ACBC)</H3>
          <P>
            The platform supports a parallel <em>Adaptive CBC</em> study type. Unlike standard CBC, where every respondent sees the same
            fractional-factorial design, ACBC tailors the survey to each respondent in real time. Each respondent moves through four
            stages, generating richer per-respondent data (typically allowing ~40% smaller samples for the same individual-level precision)
            at the cost of longer interview time (~20–30 minutes vs. ~10).
          </P>

          <P>
            <strong>Architecture in this platform.</strong> The tool covers ACBC <em>design specification</em> and <em>analysis</em>
            but not <em>fielding itself</em>. The wizard captures stage parameters and constraints; the platform exports a JSON spec
            and Markdown fielding instructions for an external survey programmer to implement. Once the survey is fielded, you upload
            the response JSON back into the tool for analysis.
          </P>

          <P>
            <strong>Phase 1 (built):</strong> study type selection, stage configuration, spec/instructions export, response upload.
            <br />
            <strong>Phase 2 (planned):</strong> constraint-augmented HB-MNL on the uploaded data, ACBC-aware analysis outputs, simulator.
          </P>

          <H3 id="m-acbc-byo">2.6.1 Stage 1 — Build Your Own (BYO)</H3>
          <P>
            No statistical math; pure data capture. The respondent picks one level per included attribute. The output is a
            baseline profile <code>byo[attr_id] = level_id</code>. This baseline seeds Stage 2 (screener generates profiles "near"
            the BYO) and is used analytically in Stage 4 calibration as a comparator.
          </P>

          <H3 id="m-acbc-screener-gen">2.6.2 Stage 2 — Screener profile generation</H3>
          <P>
            For each batch and each profile slot, generate one near-baseline profile by varying 1–3 attributes. Pseudocode:
          </P>
          <Eq>{`for each batch b in 1..B:
  for each profile slot p in 1..P:
    k = configured number of attributes to vary (default 2)
    A_vary = random sample of k attributes
    profile = copy(byo)
    for a in A_vary:
      profile[a] = uniform random level ∈ levels[a] \\ {byo[a]}
    if profile violates any prohibition OR duplicates a profile already in batch:
      retry from the top
    show profile, capture response ∈ {yes, possibly, no}
  (optional) prompt respondent for must-haves and unacceptables`}</Eq>
          <P>
            Result: per-respondent screener data with B batches × P profiles, plus optional must-have / unacceptable flag lists.
          </P>

          <H3 id="m-acbc-mh-unacc">2.6.3 Stage 2 — Must-haves and unacceptables</H3>
          <P>
            Must-have and unacceptable flags play <em>two distinct roles</em>:
          </P>
          <P>
            <strong>Design-side (filter for consideration set).</strong> Stage 3's tournament draws from the consideration set:
          </P>
          <Eq>{`consideration_set = {
  profile p ∈ screener_profiles :
       response(p) ∈ {yes, possibly}
   AND ∀ must-have (a, l*) : profile[a] = l*
   AND ∀ unacceptable (a, l_bad) : profile[a] ≠ l_bad
}`}</Eq>
          <P>
            <strong>Analytic-side (HB constraint augmentation).</strong> The same flags are converted into synthetic choice tasks
            that bias the HB likelihood — see §2.6.7 below.
          </P>

          <H3 id="m-acbc-tournament">2.6.4 Stage 3 — Choice tournament structures</H3>
          <P>
            Three supported structures, each producing a sequence of choice tasks of size K with one chosen alternative.
          </P>
          <P>
            <strong>Best-of (default).</strong> The Sawtooth standard:
          </P>
          <Eq>{`remaining = consideration_set
winner = null
for round r in 1..R:
  if winner is null:
    drawn = random K profiles from remaining
  else:
    drawn = [winner] + random (K-1) profiles from remaining
  show drawn; capture chosen ∈ drawn
  winner = chosen
  remaining = remaining \\ drawn`}</Eq>
          <P>
            <strong>Single elimination.</strong> A power-of-two pool is sampled upfront and folded into a bracket: round 1 has
            2^(R−1) pairs, winners advance, etc. Final round is the championship pair.
          </P>
          <P>
            <strong>Round-robin.</strong> All n·(n−1)/2 pairs of consideration-set profiles compete. Each profile gets a wins
            count. Heaviest data per respondent; only feasible when consideration set is small.
          </P>
          <P>
            All three produce data of the form <code>{'[{ round, alternatives: [profile, ...], chosen: profile }, ...]'}</code> —
            the standard MNL choice-task format.
          </P>

          <H3 id="m-acbc-calibration">2.6.5 Stage 4 — Calibration math</H3>
          <P>
            Per profile, capture rating r ∈ {1..S} (S = 5 or 7). The conversion to probability happens at analysis time:
          </P>
          <Eq>{`P_target(r) = (r − 0.5) / S

For S = 7:  r=1 → 0.07,  r=4 → 0.50,  r=7 → 0.93
For S = 5:  r=1 → 0.10,  r=3 → 0.50,  r=5 → 0.90`}</Eq>
          <P>
            P_target is used to anchor the None-threshold parameter in HB: a profile rated highly should have a high
            choice probability vs. None; a low rating, the reverse.
          </P>

          <H3 id="m-acbc-hb">2.6.6 Constraint-augmented HB-MNL (Phase 2 analysis math)</H3>
          <P>
            The full likelihood for respondent n is a product of five terms. Same Metropolis-within-Gibbs sampler as in
            standard CBC (§2.4), evaluated on the augmented likelihood:
          </P>
          <Eq>{`L_n(β) = L_tournament(β) · L_screener(β) · L_calibration(β) · L_must(β) · L_unacc(β)`}</Eq>
          <P>
            <strong>L_tournament:</strong> standard MNL likelihood on the tournament choice data (same form as CBC).
          </P>
          <Eq>{`L_tournament(β) = ∏_t  exp(x_chosen,t · β) / Σ_k exp(x_alt,k · β)`}</Eq>
          <P>
            <strong>L_screener:</strong> each shown profile becomes a binary "would consider" task. "Yes" responses contribute
            with full weight; "Possibly" with weight 0.5; "No" with weight 1 toward the None alternative.
          </P>
          <Eq>{`L_screener(β) = ∏_s  [ P(profile_s | β) ]^{w_yes(response_s)}  ·
                  [ P(None | β)    ]^{w_no(response_s)}

with response weights: yes → 1.0,  possibly → 0.5,  no → 1.0 (toward None)`}</Eq>
          <P>
            <strong>L_calibration:</strong> rating r becomes P_target = (r − 0.5)/S, treated as a soft binary target:
          </P>
          <Eq>{`L_calibration(β) = ∏_c  P(profile_c | β)^{P_target}  ·  P(None | β)^{1 − P_target}

P(profile | β) = exp(x_profile · β) / (exp(x_profile · β) + exp(β_None))`}</Eq>
          <P>
            <strong>L_must:</strong> for each must-have level (a*, l*) declared by the respondent, augment with synthetic 2-alt
            choice tasks where l* always beats every other level k of the same attribute:
          </P>
          <Eq>{`L_must(β) = ∏ over (a*, l*) ∏ over k ≠ l*
   [ exp(β_{a*, l*}) / ( exp(β_{a*, l*}) + exp(β_{a*, k}) ) ]^w_constraint

w_constraint default = 5.0  (each must-have flag carries information equivalent to ~5 real choice tasks)`}</Eq>
          <P>
            <strong>L_unacc:</strong> symmetric, but the unacceptable level loses to every alternative:
          </P>
          <Eq>{`L_unacc(β) = ∏ over (a*, l_bad) ∏ over k ≠ l_bad
   [ exp(β_{a*, k}) / ( exp(β_{a*, k}) + exp(β_{a*, l_bad}) ) ]^w_constraint`}</Eq>
          <P>
            The constraint augmentation weight <code>w_constraint</code> is the lever between "gentle preference signal" and
            "near-hard constraint". Sawtooth's default of 5.0 is typically sufficient to push must-have/unacceptable utilities
            in the right direction without overwhelming the choice data. The platform exposes this weight in Advanced settings
            for Phase 2.
          </P>
          <P>
            <strong>What the sampler does in practice.</strong> The Phase 2 HB worker will reuse the existing
            Metropolis-within-Gibbs implementation (§2.4) verbatim. The only change is in the inner per-respondent log-likelihood
            evaluation: it iterates over five lists (tournament tasks, screener binary tasks, calibration soft-binary tasks,
            must-have synthetic tasks, unacceptable synthetic tasks) instead of one. The MCMC dynamics — adaptive RW step size,
            μ and Σ Gibbs updates, RLH tracking — are unchanged.
          </P>

          <H3 id="m-acbc-impl">2.6.7 Implementing ACBC fielding without Sawtooth</H3>
          <P>
            The platform handles design and analysis; fielding goes to an external programmer. Three viable paths:
          </P>
          <P>
            <strong>1. Custom React / Vue / Svelte web app (best fit).</strong> The programmer implements a four-stage state machine
            using the spec we export. The cleanest reference implementation:
          </P>
          <Eq>{`// State machine pseudocode
state = { stage: 'byo', byo: {}, screener: {batches: []}, tournament: [], calibration: [] }

stage 'byo':
  show one-question-per-attribute form
  on submit: state.byo = answers, advance to 'screener'

stage 'screener':
  for batch b in 1..B:
    profiles = generateScreenerProfiles(state.byo, attrs, prohibitions, P, k)
    for profile in profiles:
      show profile, capture {yes|possibly|no}
    if mustHavesEnabled: prompt and append to state.screener.mustHaves
    if unaccEnabled: prompt and append to state.screener.unacceptables
  build consideration_set; advance to 'tournament'

stage 'tournament':
  for round r in 1..R:
    sample alternatives per chosen structure
    show, capture chosen
  advance to 'calibration'

stage 'calibration':
  pick C profiles from consideration_set with random perturbations
  for each: show, capture rating ∈ 1..S
  on submit: POST entire state object as the JSON respondent record`}</Eq>
          <P>
            State persists in IndexedDB or localStorage across page reloads. On completion, post the JSON to a backend or
            download it for upload back to this platform. <strong>This pattern can also be built in Lovable</strong> in a few
            hours from a prompt, using the same React/TypeScript scaffold we already produced for the analysis platform.
          </P>
          <P>
            <strong>2. Qualtrics with embedded JavaScript.</strong> Possible but fragile. Survey Flow handles branching, Embedded
            Data carries state across questions, and JavaScript blocks implement the screener profile generation. Watchouts:
            client-side state management is brittle (browser back button, partial completes); profile generation must be
            seeded deterministically per respondent so resumes work; complex must-have/unacceptable filtering of Stage 3
            requires careful logic. Workable but takes ~1–2 weeks of senior Qualtrics engineering.
          </P>
          <P>
            <strong>3. Hosted ACBC alternatives.</strong> Conjointly, Decipher, and Forsta each offer ACBC-equivalent functionality
            with their own UIs. Our spec doc gives them everything they need to set up the study; the JSON output format we
            specify is compatible with what these platforms produce (often with a thin format translation).
          </P>
          <P>
            <strong>What the programmer needs from this platform:</strong>
          </P>
          <P>
            • The exported JSON spec and Markdown fielding doc from Step 4 — contains every attribute, level, prohibition, stage parameter, and the algorithms above with concrete numbers.
            <br />
            • Test data — running through the survey at least 3–5 times before fielding, with the captured JSON validated against the upload schema.
            <br />
            • Production fielding produces the JSON file (one object per respondent, in an array), uploaded back into Step 5 of the platform.
          </P>
          <P>
            From there, Phase 2 analysis takes over: the constraint-augmented HB worker computes individual-level utilities,
            and downstream we get importance, tornado, simulator — same outputs as the CBC flow.
          </P>

          <H3 id="m-acbc-provenance">2.6.8 Provenance and validation status</H3>
          <P>
            ACBC was developed by Sawtooth Software and is the basis for their commercial product (Lighthouse Studio / Discover).
            For full transparency about where each part of the math above comes from:
          </P>
          <P>
            <strong>Direct from Sawtooth's published materials.</strong> The four-stage architecture, the screener profile
            generation algorithm (vary 1–3 attributes from BYO), the must-have / unacceptable consideration-set filtering, and
            the best-of tournament structure are direct implementations of what's described in Sawtooth's <em>ACBC Technical
            Paper</em> and Bryan Orme's book <em>Getting Started with Conjoint Analysis</em> (4th ed., ch. 11). Default values
            (~7 screener batches × 4 profiles, 2 attributes varied, 3-way tournament rounds, 5–7 calibration profiles) are
            their published defaults.
          </P>
          <P>
            <strong>Sawtooth framework, my interpretation in the gaps.</strong> Sawtooth publishes the <em>concept</em> of
            constraint-augmented HB ("synthetic tasks with weight w") but does not publish the exact equations or specific
            constants their commercial software uses — that code is closed-source. The specific formulations in §2.6.6 are
            my published-consistent interpretation:
          </P>
          <P>
            • <strong>Constraint weight w_constraint = 5.0.</strong> Sawtooth references "around 5" in their materials; the exact
            value in their code may be 4.0 or 6.0.
            <br />
            • <strong>Linear calibration mapping P_target = (r − 0.5)/S.</strong> Sawtooth describes what calibration data is
            <em>used for</em> (anchoring the None threshold) but not the exact functional form. A linear mapping is the most
            common implementation in academic ACBC reproductions; a sigmoid or beta-distribution mapping would be alternatives.
            <br />
            • <strong>Screener response weights (Yes 1.0 / Possibly 0.5 / No 1.0 toward None).</strong> Reasonable interpretations
            of "Possibly = half-strength positive". Sawtooth's exact weights are not published.
            <br />
            • <strong>Single-elimination and round-robin tournament structures.</strong> These are not Sawtooth's defaults
            (Sawtooth uses best-of). Added because they're standard tournament structures that some external programmers find
            easier to implement.
          </P>
          <P>
            <strong>Underlying CBC / HB-MNL math.</strong> The Metropolis-within-Gibbs sampler that Phase 2 will run on top of
            the augmented likelihood is the standard HB-MNL described in McFadden (1974), Train (2009) <em>Discrete Choice
            Methods with Simulation</em>, and Allenby & Rossi (1998) — not specific to Sawtooth and the same code we already
            validated head-to-head against numpy/scipy in our CBC validation report.
          </P>
          <P>
            <strong>Validation status.</strong> Phase 1 (design side — screener generation, tournament structure, spec export,
            data upload) is structurally correct against Sawtooth's published methodology. A survey programmer following our
            spec will produce response data compatible with Sawtooth's expectations.
          </P>
          <P>
            Phase 2 (analysis math) when built will have <em>published-correct form</em> but should be benchmarked against a
            Sawtooth commercial run on the same dataset before high-stakes use. Sawtooth is proprietary and cannot be run in
            this sandbox; doing the head-to-head requires a separate environment with a Sawtooth license. The recommended
            validation pattern mirrors what we did for CBC HB (see VALIDATION.md): generate synthetic ACBC data with known
            true β per respondent including known must-haves and unacceptables; run both implementations; compare posterior
            means. Until that benchmark is run, treat Phase 2 ACBC analysis output as "methodologically sound but not
            byte-equivalent to Sawtooth."
          </P>
          <P>
            <strong>Bottom line.</strong> Use the spec exporter (Phase 1) confidently for ACBC fielding setup. Use the Phase 2
            analysis (when built) for internal exploration and prototyping; for client-facing high-stakes work, validate
            against Sawtooth on at least one benchmark dataset first.
          </P>

          <H3 id="m-sim">2.7 Market Simulation</H3>
          <P>
            <strong>Share of Preference.</strong> For each respondent, compute total utility of each simulated product
            and convert to probabilities via the logit rule:
          </P>
          <Eq>{`U_nm = Σ_a β_n,a,l(m,a)
P_nm = exp(U_nm) / Σ_m' exp(U_nm')
SoP_m = (1/N) · Σ_n P_nm`}</Eq>
          <P>
            If "None" is included, add the estimated None utility to the denominator. "None" share is the aggregate
            probability of choosing no product.
          </P>
          <P>
            <strong>First Choice.</strong> For each respondent, 100% goes to the product with the highest utility;
            0% to all others. Aggregate = mean across respondents. Ties are split equally. First Choice is a more
            conservative, winner-take-all complement to Share of Preference.
          </P>
          <P>
            <strong>Numerical stability.</strong> All logit computations use the log-sum-exp trick:
            P_j = exp(U_j − max(U)) / Σ exp(U_k − max(U)).
          </P>
          <P>
            <strong>Sensitivity.</strong> The simulator supports single-attribute sensitivity (vary one attribute of
            one product across all its levels; plot SoP) and tornado (impact of varying each attribute min-to-max
            on the target product's SoP, sorted by magnitude).
          </P>

          <H2 id="path-c">2.8 Rigorous Python mode — planned, not currently operational</H2>
          <P>
            <strong>Status (as of this build): the rigorous-mode pathway is implemented end-to-end but is not currently
            reliable in production.</strong> The "Run with Python (rigorous mode)" button on the CBC Analysis step and the
            "Run ACBC HB (rigorous)" button on the ACBC Analysis step are wired up to OpenAI's Responses API + Code
            Interpreter, but the actual round-trip does not consistently complete on the API access tier configured for this
            deployment. Requests are accepted by OpenAI but no response is returned within the 120-second fetch window. The
            blocker is API access, not the platform code — the entire request / file-upload / response-parsing pipeline is
            built and the verbose-mode log captures exactly what's sent and what comes back.
          </P>
          <P>
            <strong>What this means for you in practice:</strong>
          </P>
          <P>
            • <strong>For CBC studies: no functional impact.</strong> The browser HB worker (Step 8 default, "Run HB
            estimation (browser)") produces the same posterior distribution as the Python reference and is validated head-to-head
            against numpy/scipy at r = 0.986 on individual-level β (see Section 4 below and <em>VALIDATION.md</em> §3).
            Use the browser HB for all CBC analysis. The rigorous-mode button stays in the UI for diagnostic / future use; if
            it does work for your account, great — if it times out, switch to the browser button.
            <br />
            • <strong>For ACBC studies: Phase 2 analysis is blocked.</strong> The constraint-augmented HB only exists in
            Python — there is no browser implementation. ACBC studies can be designed, fielded, and have their data uploaded,
            but the analysis tab cannot complete until either (a) rigorous mode starts working on the OpenAI side, or
            (b) a separate browser-side implementation of constraint-augmented HB is built. The latter is roughly 8–12 hours
            of focused work; we have not done it yet because we expected rigorous mode to cover the case.
          </P>
          <P>
            <strong>Re-enabling rigorous mode:</strong> the most likely cause of the timeouts is API tier restrictions on
            the Responses API + Code Interpreter combination. Check <code>platform.openai.com/settings/organization/limits</code>
            for whether code_interpreter is enabled. If it is and runs still hang, switching the implementation to OpenAI's
            Assistants API (older, being deprecated, but proven for code_interpreter + files) is the recommended fallback —
            roughly 4–6 hours of additional engineering work.
          </P>
          <P>
            The mathematical specification below describes how rigorous mode would behave once operational. The Python
            implementations themselves (embedded as strings in <code>index.html</code> for both CBC HB and ACBC
            constraint-augmented HB) are complete and match the published methodology — they just need a working execution
            substrate.
          </P>
          <P>
            <em>Original section text follows for reference.</em>
          </P>
          <P>
            The platform exposes a "Run with Python (rigorous mode)" button on the CBC Analysis step and runs the full
            constraint-augmented HB on the ACBC Analysis step. Both pathways execute Python (numpy / scipy) in OpenAI's
            <em> Code Interpreter</em> sandbox via the Responses API, returning results in the same data shape as the browser HB
            so the existing analysis tabs render unchanged.
          </P>
          <P>
            <strong>When to use rigorous mode.</strong> The browser HB is fast, free, and converges well on routine
            samples — use it for prototyping and iteration. Switch to rigorous mode when you need:
          </P>
          <P>
            • The full rulebook chain length (20k iterations, 10k burn-in) where the browser version would block the UI for minutes.<br />
            • Larger studies (500+ respondents) where browser performance degrades.<br />
            • Numerically rigorous results for a deliverable that will be cross-checked against numpy/scipy or third-party tools.<br />
            • ACBC analysis (Phase 2): the constraint-augmented HB is only available via rigorous mode.
          </P>
          <P>
            <strong>What the button does, step by step:</strong>
          </P>
          <Eq>{`1. Browser packages: study config + responses + assignment + hyperparams (iters, burnin, etc.)
2. Uploads the JSON payload to OpenAI's Files API (purpose: 'assistants'). Returns a file_id.
   This bypasses the chat context window, which would otherwise reject medium-to-large studies.
3. POSTs to OpenAI's Responses API with:
   - The Python reference implementation as plain text in the user message
   - The code_interpreter tool configured with the uploaded file_id (mounts at /mnt/data/)
4. OpenAI executes Python in its sandbox (full numpy / scipy stack, ~5 min timeout).
   The script reads the data from /mnt/data/study_data.json instead of receiving it inline.
5. Python prints a delimited JSON block to stdout containing posterior means + diagnostics.
6. Browser extracts the JSON, converts to the AnalysisBundle shape, populates state.
7. The uploaded data file is deleted from OpenAI's storage (best-effort cleanup).
8. Existing analysis tabs (importance, utilities, tornado, segments) render normally.`}</Eq>
          <P>
            <strong>Math correspondence.</strong> The CBC reference Python is the same numpy implementation validated in §3 of
            <em> VALIDATION.md</em> — at R = 200, both implementations agreed at r = 0.986 on individual-level posterior means and
            recovered known-true β with the same RMSE. The ACBC reference Python implements the constraint-augmented likelihood
            described in §2.6.6 above: tournament choices via standard MNL, screener as binary vs. None, calibration via soft-target
            P_target = (r − 0.5)/S, must-have / unacceptable flags as synthetic 2-alt tasks with weight w (default 5.0).
          </P>
          <P>
            <strong>Cost model.</strong> Each rigorous-mode run incurs API charges. The pre-run modal shows an estimate based on
            the study size and chosen model. Rough per-run figures (300 respondents, 16k iterations):
          </P>
          <Eq>{`Model         Estimated cost   Estimated runtime
gpt-4o        $0.30 – $0.80    20–40 s
gpt-4o-mini   $0.05 – $0.20    20–40 s
gpt-4-turbo   $1.00 – $3.00    20–40 s
o3-mini       $0.20 – $0.50    30–60 s`}</Eq>
          <P>
            Runtime is mostly Python execution; OpenAI typically adds 5–15s of orchestration overhead per call. ACBC HB is slower
            per respondent because of the augmented likelihood (more tasks per persona).
          </P>
          <P>
            <strong>Failure modes & limits.</strong>
          </P>
          <P>
            • <em>Sandbox timeout (~5 min).</em> Very long chains × very large samples can exceed it; the browser returns an error
            and no result is stored. Mitigation: lower iters, smaller sample, or split into per-respondent chunks.
            <br />
            • <em>Token limits.</em> Studies with extremely large response payloads (1000+ respondents × 50+ tasks) may exceed
            the model's input context. For those, you'd want a real Python backend (Path A) instead of code interpreter.
            <br />
            • <em>Output parsing.</em> If Python errors before printing the delimited JSON block, the browser surfaces the OpenAI
            error message verbatim.
          </P>
          <P>
            <strong>Practical pattern.</strong> Most users run the browser HB first for fast iteration; then run rigorous mode once
            at the end of design for the deliverable-quality estimates. The two results land in the same UI; if you re-run rigorous
            mode after the browser version, the rigorous results replace the browser ones (both are stored in <code>study.analysis</code>;
            no side-by-side view yet, but each result carries an <code>engine</code> field indicating which produced it).
          </P>

          <H2 id="validation">3. Validation Approach</H2>
          <P>
            Because the statistical code runs in JavaScript (not Python with numpy/scipy), we cross-validated the math
            against independent numpy/scipy reference implementations. The core question:{' '}
            <em>do the JS implementations produce the same numerical outputs as established Python libraries on
            identical inputs?</em>
          </P>
          <P>
            <strong>Method.</strong> For each component (simulator, design diagnostics, HB-MNL, LCA):
          </P>
          <P>
            1. Generate synthetic data with known ground truth.<br />
            2. Run the JS implementation via Node on the exact same data.<br />
            3. Run an independent numpy/scipy reference implementing the same model.<br />
            4. Compare outputs quantitatively: numerical agreement, truth recovery, model selection agreement.
          </P>
          <P>
            All scripts and data artifacts are in{' '}
            <code className="text-xs bg-slate-100 px-1 py-0.5 rounded">validation-scripts/</code> in the project folder;
            results are reproducible.
          </P>

          <H2 id="outcomes">4. Validation Outcomes</H2>

          <H3 id="o-sim">4.1 Simulator — exact match</H3>
          <P>
            Computed Share of Preference and First Choice for 3 test products across 200 respondents with known
            per-respondent utilities.
          </P>
          <Eq>{`                       JS                              Python
shares          [0.5688, 0.1831, 0.2481]       [0.5688, 0.1831, 0.2481]
first choice    [0.7500, 0.0800, 0.1700]       [0.7500, 0.0800, 0.1700]

max |Δ shares|  = 0.0 (bit-for-bit identical)
max |Δ fc|      = 0.0`}</Eq>
          <P>
            Deterministic math; JS and Python produce literally the same bits.
          </P>

          <H3 id="o-design">4.2 Design Diagnostics — machine precision</H3>
          <P>
            On a fixed 24-task × 3-alt × 4-attr × 3-level design:
          </P>
          <Eq>{`Metric          JS            Python        |Δ|
log|M|          17.308394     17.308394     3.55e-15
D-efficiency    54.387%       54.387%       2.13e-14
Max level CV    38.188%       38.188%       0
Avg overlap     66.667%       66.667%       0`}</Eq>
          <P>
            Differences are pure floating-point roundoff. The JS Cholesky, information matrix, balance CV, and overlap
            formulas produce the same values as scipy's reference.
          </P>

          <H3 id="o-hb">4.3 Hierarchical Bayes — r = 0.986</H3>
          <P>
            Synthetic data: 200 respondents × 12 tasks × 3 alts × 4 attrs × 3 levels (8 parameters). True β_n drawn
            from MVN(μ_true, Σ_true) with known μ_true and diagonal Σ_true.
          </P>
          <P>
            Both implementations ran with the same priors (μ prior N(0, 100·I), Σ prior IW(p+3, (p+3)·I)) but
            independent random seeds.
          </P>
          <P>
            <strong>Per-parameter agreement:</strong>
          </P>
          <Eq>{`param   r(JS, Py)   RMSE(JS, Py)   RMSE(JS, true)   RMSE(Py, true)
  0     0.968       0.167          0.521            0.545
  1     0.965       0.149          0.525            0.527
  2     0.969       0.167          0.529            0.575
  3     0.929       0.219          0.541            0.624
  4     0.944       0.187          0.534            0.560
  5     0.920       0.189          0.557            0.552
  6     0.946       0.191          0.641            0.644
  7     0.942       0.176          0.509            0.529`}</Eq>
          <P>
            <strong>Overall:</strong> Correlation JS vs. Python across all 1,600 individual β estimates:{' '}
            <strong>r = 0.986</strong>. RMSE between the two = 0.18, which is on the order of Monte Carlo sampling
            noise between two correct runs with different seeds.
          </P>
          <P>
            <strong>Truth recovery:</strong> JS vs. true β: r = 0.831, RMSE = 0.546. Python vs. true β: r = 0.833,
            RMSE = 0.571. Both implementations recover the true parameters with statistically indistinguishable
            accuracy.
          </P>
          <P>
            <strong>Attribute importance:</strong> JS and Python agree within 0.6 percentage points on every
            attribute, and both preserve the true importance ranking.
          </P>

          <H3 id="o-lca">4.4 Latent Class — likelihood exact, optimizer finds valid local optima</H3>
          <P>
            Synthetic data: 300 respondents in 3 known segments (~40% / 35% / 25%) with sparse, highly-differentiating
            per-segment β.
          </P>
          <P>
            <strong>Core likelihood function:</strong> Given fixed parameters (both the true segment β and a random
            reference), both implementations compute total log-likelihood of the data:
          </P>
          <Eq>{`                            JS LL           Python LL       |Δ|
True segment parameters     -3450.2947      -3450.2947       4.5e-13
Random fixed parameters     -3835.3074      -3835.3074       9.1e-13`}</Eq>
          <P>
            The E-step math — which is 80% of EM — is bit-identical.
          </P>
          <P>
            <strong>EM optimizer:</strong> Run with 50 random starts per K ∈ [2, 5]. Both implementations agree that
            K = 2 is the BIC-optimal model. They find different specific local optima at K = 2 (JS: 89/11 split,
            LL = −3643; Python: 32/68 split, LL = −3958) — a known property of EM on non-convex mixture likelihoods.
            This is a property of the data and algorithm, not of either implementation.
          </P>
          <P>
            <strong>Practical implication:</strong> Segment Profiles results should be interpreted as "the model found
            these segments in this dataset" rather than "the underlying truth." This is the standard caveat for all
            latent-class analysis, not specific to this platform.
          </P>

          <H3 id="test-harness">4.5 Run validation tests (live, in this browser)</H3>
          <P>
            The validation report in §4.1–4.4 was generated offline against numpy/scipy reference implementations and
            represents a one-time, methodology-equivalent comparison. For ongoing assurance that the math primitives
            running in <em>this exact browser session</em> are behaving correctly (no transient float-precision issues,
            no version regressions), the button below runs a self-contained test suite on synthetic inputs with known
            ground truth.
          </P>
          <P>
            What it tests: Cholesky factorization and inverse, multivariate Normal sampling moments, Inverse-Wishart
            sampling moments, log-sum-exp / softmax identities, design Fisher information against a hand-computed
            reference, design diagnostics on a balanced orthogonal example with known D-efficiency, parameter
            precision recovery, simulator equivalence to analytical MNL, and posterior-draw simulator percentile
            consistency. Every test is deterministic given its seed; the suite typically runs in under 2 seconds.
          </P>
          <TestHarness />

          <H2 id="gaps">5. Known Gaps</H2>
          <P>
            Honest list of what this validation did <em>not</em> cover:
          </P>
          <P>
            • <strong>Production-scale convergence.</strong> Tested at R = 200, iters = 8,000 (HB) and R = 300, 50 starts (LCA).
            Larger studies (R ≥ 500) and the rulebook's full 20k-iter HB schedule weren't re-validated, but agreement at
            this scale means the estimators are correct — longer chains tighten the same posterior.
          </P>
          <P>
            • <strong>Edge cases.</strong> Near-degenerate designs (highly unbalanced), respondents with all-None choices,
            extremely small samples (R &lt; 50) were not explicitly stress-tested.
          </P>
          <P>
            • <strong>Commercial Sawtooth CBC/HB.</strong> Sawtooth is proprietary and unavailable in this sandbox. The
            validation above is against an independent numpy/scipy reference that implements the same models Sawtooth
            implements. Agreement with the numpy reference strongly implies agreement with Sawtooth on identical model
            specifications, but the comparison is not direct.
          </P>
          <P>
            • <strong>Alternative priors.</strong> The rulebook-specified diffuse priors are used throughout. Sensitivity
            to prior choice was not explored.
          </P>

          <H2 id="refs">6. References</H2>
          <P>
            McFadden, D. (1974). <em>Conditional logit analysis of qualitative choice behavior.</em> In: Frontiers in
            Econometrics. Academic Press.
          </P>
          <P>
            Train, K. (2009). <em>Discrete Choice Methods with Simulation</em> (2nd ed.). Cambridge University Press.
          </P>
          <P>
            Allenby, G. M., &amp; Rossi, P. E. (1998). <em>Marketing models of consumer heterogeneity.</em> Journal
            of Econometrics, 89(1–2), 57–78.
          </P>
          <P>
            Huber, J., &amp; Zwerina, K. (1996). <em>The importance of utility balance in efficient choice designs.</em>
            Journal of Marketing Research, 33(3), 307–317.
          </P>
          <P>
            Cook, R. D., &amp; Nachtsheim, C. J. (1980). <em>A comparison of algorithms for constructing exact
            D-optimal designs.</em> Technometrics, 22(3), 315–324.
          </P>
          <P>
            Orme, B. (2020). <em>Getting Started with Conjoint Analysis</em> (4th ed.). Research Publishers.
          </P>
          <P>
            Sawtooth Software (2021). <em>The CBC/HB System for Hierarchical Bayes Estimation.</em> Technical Paper Series.
          </P>
          <P>
            Sawtooth Software (2021). <em>The CBC Latent Class Technical Paper.</em> Technical Paper Series.
          </P>
          <P>
            McLachlan, G., &amp; Peel, D. (2000). <em>Finite Mixture Models.</em> Wiley. (§3.9 on EM non-convexity.)
          </P>
          <P>
            Bridges, J. F. P., et al. (2011). <em>Conjoint analysis applications in health — a checklist: a report of
            the ISPOR Good Research Practices for Conjoint Analysis Task Force.</em> Value in Health, 14(4), 403–413.
          </P>

          <div className="mt-12 pt-8 border-t border-slate-200 text-xs text-slate-400">
            Documentation version 1.0 · Methodology and validation frozen at the time of build.
            Validation scripts reproducible from <code className="px-1 bg-slate-100 rounded">validation-scripts/</code> in the project folder.
          </div>
        </main>
      </div>
    </div>
  );
}

// ========================================================================
// SECTION 20 — APP ROOT
// ========================================================================
function App() {
  const [view, setView] = useState('dashboard'); // 'dashboard' | 'study' | 'docs'
  const [studyId, setStudyId] = useState(null);

  const onCreate = async (type = 'cbc') => {
    const s = newStudy(type);
    await saveStudy(s);
    setStudyId(s.id);
    setView('study');
  };
  const onOpen = (id) => { setStudyId(id); setView('study'); };
  const onExit = () => { setStudyId(null); setView('dashboard'); };
  const onDocs = () => { setView('docs'); };

  if (view === 'docs')      return <DocsPage onExit={() => setView('dashboard')} />;
  if (view === 'dashboard') return <Dashboard onOpen={onOpen} onCreate={onCreate} onDocs={onDocs} />;
  return <Wizard studyId={studyId} onExit={onExit} />;
}

// TabSegments — latent class results panel (referenced from StepAnalysis)
function TabSegments({ a, study, onRunLCA, lcaRunning }) {
  if (!a.lca) {
    return (
      <div className="text-center py-10">
        <div className="text-sm text-slate-500 mb-3">Latent class segmentation has not been run yet.</div>
        <Button onClick={onRunLCA} disabled={lcaRunning}>{lcaRunning ? <><Spinner /> Running K=2–5…</> : 'Run latent class analysis'}</Button>
      </div>
    );
  }
  const lca = a.lca;
  const attrs = study.attributes;
  return (
    <div>
      <Card title="Model selection" className="mb-4">
        <table className="w-full text-xs">
          <thead><tr className="text-slate-500"><th className="text-left p-1">K</th><th className="text-right p-1">Log-Likelihood</th><th className="text-right p-1">BIC</th><th className="text-right p-1">AIC</th><th className="text-left p-1">Segment sizes</th></tr></thead>
          <tbody>
            {lca.all.map((r, i) => (
              <tr key={i} className={`border-t border-slate-100 ${r === lca.best ? 'bg-blue-50' : ''}`}>
                <td className="p-1.5 font-medium">{r.K}</td>
                <td className="p-1.5 text-right tabular">{r.ll.toFixed(1)}</td>
                <td className="p-1.5 text-right tabular">{r.bic.toFixed(1)}</td>
                <td className="p-1.5 text-right tabular">{r.aic.toFixed(1)}</td>
                <td className="p-1.5 text-slate-700">{r.sizes.map(s => s + '%').join(' / ')}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="text-xs text-slate-400 mt-2">Selected (lowest BIC): K = {lca.best.K}</div>
      </Card>

      <div className="space-y-3">
        {lca.best.betas.map((b, k) => {
          const layout = buildParamLayout(attrs, study.choiceConfig.includeNone);
          const perAttr = attrs.map((a0, ai) => {
            const ref = layout.attrRef[ai];
            return a0.levels.map((l, li) => ({
              level: l.name,
              u: li === ref ? 0 : b[layout.offsets[ai] + (li < ref ? li : li - 1)]
            }));
          });
          return (
            <Card key={k} title={`Segment ${k+1} — ${Math.round(lca.best.pi[k]*100)}% of respondents`}>
              <div className="text-xs text-slate-600 mb-3 italic">{lca.narratives[k]}</div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {perAttr.map((la, ai) => (
                  <div key={ai} className="bg-slate-50 rounded p-2">
                    <div className="text-xs font-semibold text-slate-700 mb-1">{attrs[ai].name}</div>
                    <div className="space-y-0.5">
                      {la.map((x, li) => (
                        <div key={li} className="flex items-center gap-2 text-xs">
                          <div className="w-28 truncate text-slate-600">{x.level}</div>
                          <div className="flex-1 h-2 bg-white rounded relative">
                            <div className={`h-2 rounded ${x.u >= 0 ? 'bg-emerald-500' : 'bg-red-500'}`} style={{
                              width: Math.min(100, Math.abs(x.u) * 40) + '%',
                              marginLeft: x.u < 0 ? 'auto' : '0'
                            }} />
                          </div>
                          <div className="w-10 text-right tabular text-slate-500">{x.u.toFixed(2)}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}
