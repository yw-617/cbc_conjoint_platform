<script id="hb-worker-src" type="text/plain">
// === HB-MNL Metropolis-within-Gibbs Worker ================================
// Receives: { type:'run', payload:{ X, yIdx, respStart, respEnd, nPar,
//   iters, burnin, thin, seed, priorVar } }
// Emits: progress / result / error

(function () {
  'use strict';

  // ----- Seeded RNG (Mulberry32, good enough for sampling) -----
  function makeRng(seed) {
    let t = (seed >>> 0) || 1;
    return function () {
      t = (t + 0x6D2B79F5) | 0;
      let r = Math.imul(t ^ (t >>> 15), 1 | t);
      r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }
  // Box-Muller normal
  function randn(rng) {
    let u = 0, v = 0;
    while (u === 0) u = rng();
    while (v === 0) v = rng();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
  }

  // ----- Cholesky decomposition of symmetric PD matrix (row-major Float64) -----
  function chol(A, n) {
    const L = new Float64Array(n * n);
    for (let i = 0; i < n; i++) {
      for (let j = 0; j <= i; j++) {
        let s = A[i * n + j];
        for (let k = 0; k < j; k++) s -= L[i * n + k] * L[j * n + k];
        if (i === j) {
          if (s <= 0) s = 1e-10;
          L[i * n + j] = Math.sqrt(s);
        } else {
          L[i * n + j] = s / L[j * n + j];
        }
      }
    }
    return L;
  }
  // Solve L x = b (forward), then L' x = b (back) — for inverse action
  function solveLowerInPlace(L, b, n) {
    const x = new Float64Array(n);
    for (let i = 0; i < n; i++) {
      let s = b[i];
      for (let k = 0; k < i; k++) s -= L[i * n + k] * x[k];
      x[i] = s / L[i * n + i];
    }
    return x;
  }
  function solveUpperInPlace(L, b, n) {
    // L' x = b
    const x = new Float64Array(n);
    for (let i = n - 1; i >= 0; i--) {
      let s = b[i];
      for (let k = i + 1; k < n; k++) s -= L[k * n + i] * x[k];
      x[i] = s / L[i * n + i];
    }
    return x;
  }
  function invViaChol(A, n) {
    const L = chol(A, n);
    const inv = new Float64Array(n * n);
    for (let j = 0; j < n; j++) {
      const e = new Float64Array(n); e[j] = 1;
      const y = solveLowerInPlace(L, e, n);
      const x = solveUpperInPlace(L, y, n);
      for (let i = 0; i < n; i++) inv[i * n + j] = x[i];
    }
    return inv;
  }

  // Quadratic form (x-m)' S^-1 (x-m) given Cholesky L of S
  function mahaSq(x, m, L, n) {
    const d = new Float64Array(n);
    for (let i = 0; i < n; i++) d[i] = x[i] - m[i];
    const y = solveLowerInPlace(L, d, n);
    let s = 0;
    for (let i = 0; i < n; i++) s += y[i] * y[i];
    return s;
  }

  // Multivariate normal sample: m + L*z
  function mvnSample(m, L, n, rng) {
    const z = new Float64Array(n);
    for (let i = 0; i < n; i++) z[i] = randn(rng);
    const x = new Float64Array(n);
    for (let i = 0; i < n; i++) {
      let s = m[i];
      for (let k = 0; k <= i; k++) s += L[i * n + k] * z[k];
      x[i] = s;
    }
    return x;
  }

  // Inverse-Wishart sample via Bartlett decomposition
  function invWishartSample(df, scale, n, rng) {
    // Returns a sample from IW(df, scale) where scale is the scale matrix.
    // Uses: if W ~ Wishart(df, scale^{-1}), then W^{-1} ~ IW(df, scale).
    const scaleInv = invViaChol(scale, n);
    // Sample W ~ Wishart(df, scaleInv) via Bartlett: W = L A A' L'
    // where L chol(scaleInv), A lower-triangular with A_ii = sqrt(chi2(df-i+1)) and A_ij = N(0,1) for i>j.
    const Lsi = chol(scaleInv, n);
    const A = new Float64Array(n * n);
    for (let i = 0; i < n; i++) {
      // chi-squared via sum of squares of normals
      const dof = df - i; // (df - i + 1) with 1-indexed; we use 0-indexed so df-i
      let c2 = 0;
      const k = Math.max(1, Math.round(dof));
      for (let t = 0; t < k; t++) {
        const z = randn(rng); c2 += z * z;
      }
      A[i * n + i] = Math.sqrt(c2);
      for (let j = 0; j < i; j++) A[i * n + j] = randn(rng);
    }
    // M = L * A
    const M = new Float64Array(n * n);
    for (let i = 0; i < n; i++) {
      for (let j = 0; j <= i; j++) {
        let s = 0;
        for (let k = j; k <= i; k++) s += Lsi[i * n + k] * A[k * n + j];
        M[i * n + j] = s;
      }
    }
    // W = M M'
    const W = new Float64Array(n * n);
    for (let i = 0; i < n; i++) {
      for (let j = 0; j <= i; j++) {
        let s = 0;
        for (let k = 0; k <= Math.min(i, j); k++) s += M[i * n + k] * M[j * n + k];
        W[i * n + j] = s;
        W[j * n + i] = s;
      }
    }
    // Return W^{-1}
    return invViaChol(W, n);
  }

  // ----- Main run -----
  self.onmessage = function (e) {
    const msg = e.data || {};
    if (msg.type !== 'run') return;
    try {
      runHB(msg.payload);
    } catch (err) {
      self.postMessage({ type: 'error', message: String(err && err.message || err), stack: err && err.stack });
    }
  };

  function runHB(P) {
    const {
      X,         // Float32/64 flat: for each respondent r, task t, alternative j, row of nPar dummies
      altCounts, // Int32 per (r,t): number of alternatives in that task (varies if SoC/None)
      chosen,    // Int32 per (r,t): alternative index chosen (0..J-1), or -1 for None
      respOffsets, // Int32 length R+1, offsets into task-level arrays
      taskOffsets, // Int32 length sumTasks+1, offsets into X (in rows), each row is nPar long
      R, nPar, includeNone,
      iters, burnin, thin, seed, priorVar
    } = P;

    const rng = makeRng(seed);

    // Parameter layout: [attribute dummies 0..nAttrPar-1, none-intercept (optional)]
    const pTotal = nPar; // already includes none if present (caller flattens)
    // Individual betas
    const betaFlat = new Float64Array(R * pTotal);
    // Population mean
    const mu = new Float64Array(pTotal);
    // Covariance
    const Sigma = new Float64Array(pTotal * pTotal);
    for (let i = 0; i < pTotal; i++) Sigma[i * pTotal + i] = priorVar || 1;

    // Per-respondent RW step scales (diagonal)
    const rwScale = new Float64Array(R).fill(0.1);
    const accCount = new Int32Array(R);
    const propCount = new Int32Array(R);

    // Prior on mu: MVN(0, 100 I)
    const muPriorVar = 100;

    // Prior on Sigma: IW(df = pTotal + 3, scale = (pTotal+3) * I)
    const iwDf = pTotal + 3;
    const iwScaleFlat = new Float64Array(pTotal * pTotal);
    for (let i = 0; i < pTotal; i++) iwScaleFlat[i * pTotal + i] = iwDf;

    // Retained samples for posterior means (streaming)
    const postBetaMean = new Float64Array(R * pTotal);
    const postBetaM2 = new Float64Array(R * pTotal); // variance (Welford)
    const rlhHistory = new Float32Array(iters);

    // Keep a thinned subsample of draws per respondent for credible intervals
    const nKeptMax = Math.max(40, Math.floor((iters - burnin) / thin / 10));
    const keptBeta = new Float64Array(R * pTotal * nKeptMax);
    const keptIdx = new Int32Array(R);

    // Likelihood of respondent r given beta
    // Returns sum of log-prob of chosen alternatives across tasks.
    function llRespondent(r, beta) {
      const t0 = respOffsets[r], t1 = respOffsets[r + 1];
      let ll = 0;
      for (let t = t0; t < t1; t++) {
        const row0 = taskOffsets[t];
        const nAlt = altCounts[t]; // excluding "None" — None handled via noneIntercept term
        // Compute utilities
        let uNone = includeNone ? beta[pTotal - 1] : -Infinity;
        let maxU = includeNone ? uNone : -Infinity;
        const utils = new Float64Array(nAlt);
        for (let j = 0; j < nAlt; j++) {
          let u = 0;
          const base = (row0 + j) * pTotal;
          // Sum beta * X_row — sparse: X contains dummies, so iterate only non-zero if we stored compact
          // We stored dense per spec; iterate all.
          for (let k = 0; k < (includeNone ? pTotal - 1 : pTotal); k++) {
            u += beta[k] * X[base + k];
          }
          utils[j] = u;
          if (u > maxU) maxU = u;
        }
        // log-sum-exp
        let denom = 0;
        for (let j = 0; j < nAlt; j++) denom += Math.exp(utils[j] - maxU);
        if (includeNone) denom += Math.exp(uNone - maxU);
        const logDenom = maxU + Math.log(denom);
        const c = chosen[t];
        if (c === -1) {
          // None chosen
          ll += (includeNone ? uNone : -1e9) - logDenom;
        } else {
          ll += utils[c] - logDenom;
        }
      }
      return ll;
    }

    // log-prior of beta given (mu, SigmaChol)
    function logPriorBeta(beta, muVec, Linv) {
      // -0.5 * (b - mu)' Sigma^{-1} (b - mu) -- drop constants
      const q = mahaSq(beta, muVec, Linv, pTotal);
      return -0.5 * q;
    }

    // Initialize betas ~ small random around 0
    for (let r = 0; r < R; r++) {
      for (let k = 0; k < pTotal; k++) {
        betaFlat[r * pTotal + k] = 0.05 * randn(rng);
      }
    }

    // Precompute RLH normalization: total number of tasks across respondents
    let totalTasks = 0;
    for (let r = 0; r < R; r++) totalTasks += (respOffsets[r + 1] - respOffsets[r]);

    // Main loop
    let keptN = 0;
    for (let it = 0; it < iters; it++) {
      // --- Step 2/3: update mu and Sigma conditionals using current betas ---
      // Sufficient stats: bbar, S = sum (b - bbar)(b - bbar)'
      const bbar = new Float64Array(pTotal);
      for (let r = 0; r < R; r++) {
        for (let k = 0; k < pTotal; k++) bbar[k] += betaFlat[r * pTotal + k];
      }
      for (let k = 0; k < pTotal; k++) bbar[k] /= R;

      // Sample mu | Sigma, betas: posterior MVN with mean = bbar (w/ prior shrinkage to 0, large var)
      // Posterior Sigma_mu = (R * Sigma^-1 + (1/muPriorVar) I)^-1
      // Posterior mu_mu = Sigma_mu * (R * Sigma^-1 * bbar)
      const SigmaInv = invViaChol(Sigma, pTotal);
      const postPrecMu = new Float64Array(pTotal * pTotal);
      for (let i = 0; i < pTotal; i++) {
        for (let j = 0; j < pTotal; j++) {
          postPrecMu[i * pTotal + j] = R * SigmaInv[i * pTotal + j];
        }
        postPrecMu[i * pTotal + i] += 1 / muPriorVar;
      }
      const postCovMu = invViaChol(postPrecMu, pTotal);
      // mean = postCovMu * R * SigmaInv * bbar
      const tmp = new Float64Array(pTotal);
      for (let i = 0; i < pTotal; i++) {
        let s = 0;
        for (let j = 0; j < pTotal; j++) s += SigmaInv[i * pTotal + j] * bbar[j];
        tmp[i] = R * s;
      }
      const postMean = new Float64Array(pTotal);
      for (let i = 0; i < pTotal; i++) {
        let s = 0;
        for (let j = 0; j < pTotal; j++) s += postCovMu[i * pTotal + j] * tmp[j];
        postMean[i] = s;
      }
      const Lpm = chol(postCovMu, pTotal);
      const muNew = mvnSample(postMean, Lpm, pTotal, rng);
      for (let k = 0; k < pTotal; k++) mu[k] = muNew[k];

      // Sigma | betas, mu: IW(df0 + R, Scale0 + sum(b-mu)(b-mu)')
      const scalePost = new Float64Array(pTotal * pTotal);
      for (let i = 0; i < pTotal * pTotal; i++) scalePost[i] = iwScaleFlat[i];
      for (let r = 0; r < R; r++) {
        for (let i = 0; i < pTotal; i++) {
          const di = betaFlat[r * pTotal + i] - mu[i];
          for (let j = 0; j < pTotal; j++) {
            const dj = betaFlat[r * pTotal + j] - mu[j];
            scalePost[i * pTotal + j] += di * dj;
          }
        }
      }
      const SigmaNew = invWishartSample(iwDf + R, scalePost, pTotal, rng);
      for (let i = 0; i < pTotal * pTotal; i++) Sigma[i] = SigmaNew[i];

      // Cholesky of Sigma (for prior evaluation / proposal)
      const Lsig = chol(Sigma, pTotal);

      // --- Step 1: MH update of each respondent's beta ---
      let iterLogLSum = 0;
      for (let r = 0; r < R; r++) {
        const b = betaFlat.subarray(r * pTotal, (r + 1) * pTotal);
        const llCur = llRespondent(r, b);
        const lpCur = logPriorBeta(b, mu, Lsig);
        // Propose b* = b + s * N(0, I)
        const s = rwScale[r];
        const prop = new Float64Array(pTotal);
        for (let k = 0; k < pTotal; k++) prop[k] = b[k] + s * randn(rng);
        const llProp = llRespondent(r, prop);
        const lpProp = logPriorBeta(prop, mu, Lsig);
        const logAlpha = (llProp + lpProp) - (llCur + lpCur);
        propCount[r]++;
        if (Math.log(rng() + 1e-300) < logAlpha) {
          for (let k = 0; k < pTotal; k++) b[k] = prop[k];
          accCount[r]++;
          iterLogLSum += llProp;
        } else {
          iterLogLSum += llCur;
        }
        // Adaptive RW tuning during burn-in: target 30% acceptance
        if (it < burnin && (it + 1) % 50 === 0) {
          const rate = accCount[r] / Math.max(1, propCount[r]);
          if (rate < 0.2) rwScale[r] *= 0.9;
          else if (rate > 0.45) rwScale[r] *= 1.1;
          if (rwScale[r] < 0.01) rwScale[r] = 0.01;
          if (rwScale[r] > 2.0) rwScale[r] = 2.0;
        }
      }

      // RLH for this iter: exp(mean log-prob-chosen)
      const meanLL = iterLogLSum / totalTasks;
      rlhHistory[it] = Math.exp(meanLL);

      // Retain post-burn-in draws
      if (it >= burnin && ((it - burnin) % thin === 0)) {
        keptN++;
        // Welford online mean/M2 per respondent
        for (let r = 0; r < R; r++) {
          for (let k = 0; k < pTotal; k++) {
            const idx = r * pTotal + k;
            const x = betaFlat[idx];
            const delta = x - postBetaMean[idx];
            postBetaMean[idx] += delta / keptN;
            postBetaM2[idx] += delta * (x - postBetaMean[idx]);
          }
        }
        // Sub-sample draws for CIs (every 10th kept, up to nKeptMax per respondent)
        if (((keptN - 1) % 10) === 0) {
          for (let r = 0; r < R; r++) {
            const idx = keptIdx[r];
            if (idx < nKeptMax) {
              const off = (r * nKeptMax + idx) * pTotal;
              for (let k = 0; k < pTotal; k++) keptBeta[off + k] = betaFlat[r * pTotal + k];
              keptIdx[r] = idx + 1;
            }
          }
        }
      }

      if ((it + 1) % 100 === 0 || it === 0) {
        let totalAcc = 0, totalProp = 0;
        for (let r = 0; r < R; r++) { totalAcc += accCount[r]; totalProp += propCount[r]; }
        self.postMessage({
          type: 'progress',
          iter: it + 1, iters, burnin,
          rlh: rlhHistory[it],
          acceptRate: totalAcc / Math.max(1, totalProp)
        });
      }
    }

    // Compute posterior SDs
    const postBetaSD = new Float64Array(R * pTotal);
    if (keptN > 1) {
      for (let i = 0; i < R * pTotal; i++) postBetaSD[i] = Math.sqrt(postBetaM2[i] / (keptN - 1));
    }

    self.postMessage({
      type: 'result',
      betaMean: postBetaMean,
      betaSD: postBetaSD,
      keptBeta,
      keptPerResp: keptIdx,
      nKeptMax,
      mu,
      Sigma,
      rlhHistory,
      finalRLH: rlhHistory[iters - 1],
      totalTasks,
      R, pTotal
    }, [postBetaMean.buffer, postBetaSD.buffer, keptBeta.buffer, keptIdx.buffer, mu.buffer, Sigma.buffer, rlhHistory.buffer]);
  }
})();
</script>

<!-- ======================================================================
     Design-Optimizer Worker
     Multi-start simulated annealing with balanced initialization.
     Math spec (matches README):
       - Composite score S = w_D·D̂ + w_B·B̂ + w_O·Ô where each term is clamped to [0,1]
         D̂  = min(1, D-eff/100)
         B̂  = max(0, 1 − min(1, maxCV/0.20))
         Ô  = max(0, 1 − min(1, |overlap − 0.30|/0.20))
       - SA acceptance: P(accept) = min(1, exp(ΔS / T))
       - Cooling: T_k = T₀·αᵏ, α = (T_f/T₀)^(1/K), T₀=0.05, T_f=1e-4
       - Balanced init: weight(l) ∝ max(ε, E[count(l)] − observed(l) + 1)
     ====================================================================== -->
<script id="design-worker-src" type="text/plain">
(function () {
  'use strict';

  // ===== RNG and math =====
  function makeRng(seed) {
    let t = (seed >>> 0) || 1;
    return function () {
      t = (t + 0x6D2B79F5) | 0;
      let r = Math.imul(t ^ (t >>> 15), 1 | t);
      r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }
  function mean(a) { if (!a.length) return 0; let s = 0; for (let i=0;i<a.length;i++) s+=a[i]; return s/a.length; }
  function stdev(a) {
    if (a.length < 2) return 0;
    const m = mean(a);
    let s = 0; for (let i=0;i<a.length;i++) s += (a[i]-m)*(a[i]-m);
    return Math.sqrt(s/(a.length-1));
  }

  // ===== Prohibition check =====
  function profileViolatesProhibition(profile, prohibitions) {
    for (const pr of prohibitions) {
      if (profile[pr.attrA] === pr.levelA && profile[pr.attrB] === pr.levelB) return true;
    }
    return false;
  }

  // ===== Parameter layout (no None, design diagnostics only) =====
  function buildLayout(attributes) {
    const offsets = []; const labels = []; const attrRef = [];
    let idx = 0;
    attributes.forEach(attr => {
      offsets.push(idx);
      const ref = attr.levels.length - 1;
      attrRef.push(ref);
      attr.levels.forEach((lv, li) => { if (li !== ref) { labels.push(attr.name+"::"+(lv.name||li)); idx++; } });
    });
    offsets.push(idx);
    return { offsets, labels, nPar: idx, attrRef };
  }
  function profileToDummyRow(profile, attributes, layout) {
    const row = new Float64Array(layout.nPar);
    for (let a = 0; a < attributes.length; a++) {
      const ref = layout.attrRef[a];
      const li = profile[a];
      if (li === ref) continue;
      const paramIdx = layout.offsets[a] + (li < ref ? li : li - 1);
      row[paramIdx] = 1;
    }
    return row;
  }

  // ===== Diagnostics =====
  function computeLevelBalance(tasks, attributes) {
    const counts = attributes.map(a => new Array(a.levels.length).fill(0));
    tasks.forEach(task => task.forEach(profile => profile.forEach((li, a) => { counts[a][li]++; })));
    const cvs = counts.map(c => { const m = mean(c); return m === 0 ? 0 : stdev(c)/m; });
    return { counts, cvs, maxCV: Math.max(...cvs) };
  }
  function computeOverlap(tasks, attributes) {
    const overlaps = attributes.map(() => 0);
    tasks.forEach(task => {
      attributes.forEach((_, a) => {
        const seen = {}; let dup = false;
        for (const p of task) { const k = p[a]; if (seen[k]) { dup = true; break; } seen[k] = 1; }
        if (dup) overlaps[a]++;
      });
    });
    return { perAttr: overlaps.map(v => v/tasks.length), avg: mean(overlaps)/tasks.length };
  }
  function computeInfoMatrix(tasks, attributes, layout) {
    const p = layout.nPar;
    const M = new Float64Array(p*p);
    tasks.forEach(task => {
      const rows = task.map(prof => profileToDummyRow(prof, attributes, layout));
      const J = rows.length;
      const xsum = new Float64Array(p);
      for (let j=0;j<J;j++) for (let k=0;k<p;k++) xsum[k] += rows[j][k];
      for (let j=0;j<J;j++) for (let i=0;i<p;i++) for (let k=0;k<p;k++) M[i*p+k] += rows[j][i]*rows[j][k];
      for (let i=0;i<p;i++) for (let k=0;k<p;k++) M[i*p+k] -= (xsum[i]*xsum[k])/J;
    });
    return { M, p };
  }
  function logDetPD(M, n) {
    const L = new Float64Array(n*n);
    for (let i=0;i<n;i++) {
      for (let j=0;j<=i;j++) {
        let s = M[i*n+j];
        for (let k=0;k<j;k++) s -= L[i*n+k]*L[j*n+k];
        if (i === j) { if (s <= 1e-12) return -Infinity; L[i*n+j] = Math.sqrt(s); }
        else L[i*n+j] = s / L[j*n+j];
      }
    }
    let d = 0; for (let i=0;i<n;i++) d += Math.log(L[i*n+i]);
    return 2*d;
  }
  function computeDEff(tasks, attributes, J) {
    const layout = buildLayout(attributes);
    const { M, p } = computeInfoMatrix(tasks, attributes, layout);
    for (let i=0;i<p;i++) M[i*p+i] += 1e-6;
    const logDet = logDetPD(M, p);
    if (!isFinite(logDet)) return 0;
    const nObs = tasks.reduce((s,t)=>s+t.length, 0);
    const avgL = mean(attributes.map(a => a.levels.length));
    const baseline = Math.log((nObs*(J-1)/J)/avgL);
    return Math.min(100, Math.max(0, 100*Math.exp(logDet/p - baseline)));
  }
  function computeDiagnostics(tasks, attributes, J) {
    const lb = computeLevelBalance(tasks, attributes);
    const ov = computeOverlap(tasks, attributes);
    const dEff = computeDEff(tasks, attributes, J);
    return {
      dEfficiency: dEff,
      maxLevelCV: lb.maxCV,
      levelCounts: lb.counts,
      overlapAvg: ov.avg,
      overlapPerAttr: ov.perAttr,
      totalProfiles: tasks.reduce((s,t)=>s+t.length,0),
      uniqueProfiles: new Set(tasks.flat().map(p=>p.join(','))).size
    };
  }

  // ===== Incremental optimization helpers (version-aware) =====
  // Contribution of a single task to the MNL-at-0 information matrix.
  function taskContribution(task, attributes, layout) {
    const p = layout.nPar;
    const C = new Float64Array(p*p);
    const rows = task.map(prof => profileToDummyRow(prof, attributes, layout));
    const J = rows.length;
    const xsum = new Float64Array(p);
    for (let j=0;j<J;j++) for (let k=0;k<p;k++) xsum[k] += rows[j][k];
    for (let j=0;j<J;j++) for (let i=0;i<p;i++) for (let k=0;k<p;k++) C[i*p+k] += rows[j][i]*rows[j][k];
    for (let i=0;i<p;i++) for (let k=0;k<p;k++) C[i*p+k] -= (xsum[i]*xsum[k])/J;
    return C;
  }
  // D-efficiency proxy directly from a maintained info matrix M.
  function dEffFromM(M, p, nObs, J, avgL) {
    const Mr = M.slice();
    for (let i=0;i<p;i++) Mr[i*p+i] += 1e-6;
    const ld = logDetPD(Mr, p);
    if (!isFinite(ld)) return 0;
    const baseline = Math.log((nObs*(J-1)/J)/avgL);
    return Math.min(100, Math.max(0, 100*Math.exp(ld/p - baseline)));
  }
  // Per-attribute duplicate-level flags for one task (1 if >=2 concepts share a level).
  function taskDupFlags(task, A) {
    const f = new Array(A);
    for (let a=0;a<A;a++) { const seen={}; let dup=false; for (const pf of task){ if(seen[pf[a]]){dup=true;break;} seen[pf[a]]=1; } f[a]=dup?1:0; }
    return f;
  }

  // ===== Balanced initialization =====
  function balancedInit(attributes, prohibitions, J, S, rng) {
    const sizes = attributes.map(a => a.levels.length);
    const counts = attributes.map(a => new Array(a.levels.length).fill(0));
    const tasks = [];
    const eps = 0.05;
    const pickLevel = (a, slotsFilled) => {
      const L = sizes[a];
      const expected = slotsFilled / L;
      const w = counts[a].map(c => Math.max(eps, expected - c + 1));
      const total = w.reduce((s,x)=>s+x, 0);
      let u = rng() * total;
      for (let i = 0; i < L; i++) { u -= w[i]; if (u <= 0) return i; }
      return L - 1;
    };
    for (let t = 0; t < S; t++) {
      const task = [];
      const sigSet = new Set();
      let safety = 0;
      while (task.length < J && safety++ < 300) {
        const prof = [];
        for (let a = 0; a < attributes.length; a++) prof.push(pickLevel(a, t*J + task.length));
        const sig = prof.join(',');
        if (sigSet.has(sig)) continue;
        if (profileViolatesProhibition(prof, prohibitions)) continue;
        sigSet.add(sig);
        task.push(prof);
        prof.forEach((li, a) => { counts[a][li]++; });
      }
      while (task.length < J) {
        const prof = sizes.map(L => Math.floor(rng()*L));
        if (profileViolatesProhibition(prof, prohibitions)) continue;
        task.push(prof);
        prof.forEach((li, a) => { counts[a][li]++; });
      }
      tasks.push(task);
    }
    return tasks;
  }

  // ===== Per-version simulated annealing (incremental scoring) =====
  // Optimizes ONE version (T tasks) as its own small design. Swaps have strong
  // signal at this size, so D-efficiency / overlap / balance all move; the pooled
  // design inherits near-orthogonality from the individually-optimized versions.
  function optimizeVersion(attributes, prohibitions, J, T, weights, swapBudget, rng) {
    const A = attributes.length;
    const sizes = attributes.map(a => a.levels.length);
    const layout = buildLayout(attributes);
    const p = layout.nPar;
    const avgL = mean(sizes);
    const nObs = T*J;
    const avoidable = sizes.map(L => L >= J); // overlap only penalized where it's not forced
    const wD = (weights.dEff != null ? weights.dEff : 0.3);
    const wB = (weights.balance != null ? weights.balance : 0.2);
    const wO = (weights.overlap != null ? weights.overlap : 0.5);

    const tasks = balancedInit(attributes, prohibitions, J, T, rng); // fresh per version

    // running state
    let M = new Float64Array(p*p);
    for (const t of tasks) { const C = taskContribution(t, attributes, layout); for (let i=0;i<p*p;i++) M[i]+=C[i]; }
    const counts = sizes.map(L => new Array(L).fill(0));
    for (const t of tasks) for (const pf of t) pf.forEach((li,a)=>counts[a][li]++);
    const dupFlags = tasks.map(t => taskDupFlags(t, A));
    const overlapCount = new Array(A).fill(0);
    for (const f of dupFlags) for (let a=0;a<A;a++) overlapCount[a]+=f[a];

    const maxCV = () => { let mx=0; for (let a=0;a<A;a++){ const c=counts[a]; const m=mean(c); if(m===0)continue; let ss=0; for(const x of c) ss+=(x-m)*(x-m); const v=Math.sqrt(ss/c.length)/m; if(v>mx)mx=v; } return mx; };
    const avoidOverlap = () => { let s=0,n=0; for (let a=0;a<A;a++) if(avoidable[a]){ s+=overlapCount[a]/T; n++; } return n? s/n : 0; };
    const scoreNow = () => {
      const D = Math.min(1, Math.max(0, dEffFromM(M, p, nObs, J, avgL)/100));
      const B = Math.max(0, 1 - Math.min(1, maxCV()/0.20));
      const O = Math.max(0, 1 - avoidOverlap()); // minimize avoidable overlap (linear gradient)
      return wD*D + wB*B + wO*O;
    };

    const T0 = 0.05, Tf = 1e-4;
    const alpha = Math.pow(Tf/T0, 1/Math.max(1, swapBudget));
    let temp = T0;
    let cur = scoreNow();
    let best = cur;
    let bestTasks = tasks.map(t => t.map(p => p.slice()));

    for (let s = 0; s < swapBudget; s++) {
      temp *= alpha;
      const ti = Math.floor(rng()*T);
      const ji = Math.floor(rng()*J);
      const ai = Math.floor(rng()*A);
      const old = tasks[ti][ji][ai];
      const nw = Math.floor(rng()*sizes[ai]);
      if (nw === old) continue;
      const newProf = tasks[ti][ji].slice(); newProf[ai] = nw;
      if (profileViolatesProhibition(newProf, prohibitions)) continue;
      let dupProf = false;
      for (let q=0;q<J;q++){ if(q===ji)continue; if(tasks[ti][q].join(',')===newProf.join(',')){dupProf=true;break;} }
      if (dupProf) continue;

      // apply with incremental state update
      const oldC = taskContribution(tasks[ti], attributes, layout);
      const savedProf = tasks[ti][ji]; tasks[ti][ji] = newProf;
      const newC = taskContribution(tasks[ti], attributes, layout);
      for (let i=0;i<p*p;i++) M[i] += newC[i]-oldC[i];
      counts[ai][old]--; counts[ai][nw]++;
      const newF = taskDupFlags(tasks[ti], A); const savedF = dupFlags[ti];
      for (let a=0;a<A;a++) overlapCount[a] += newF[a]-savedF[a];
      dupFlags[ti] = newF;

      const trial = scoreNow();
      const delta = trial - cur;
      if (delta > 0 || rng() < Math.exp(delta/temp)) {
        cur = trial;
        if (cur > best) { best = cur; bestTasks = tasks.map(t => t.map(p => p.slice())); }
      } else {
        // revert
        tasks[ti][ji] = savedProf;
        for (let i=0;i<p*p;i++) M[i] -= newC[i]-oldC[i];
        counts[ai][nw]--; counts[ai][old]++;
        for (let a=0;a<A;a++) overlapCount[a] -= newF[a]-savedF[a];
        dupFlags[ti] = savedF;
      }
    }
    return { tasks: bestTasks, score: best };
  }

  // ===== Per-version driver =====
  // Each version is optimized independently (one optimized block per respondent,
  // Sawtooth-style). The pooled design is the concatenation, which keeps the
  // positional version slice in StepAssignment valid.
  function summarize(arr) {
    if (!arr.length) return { min: 0, mean: 0, max: 0 };
    let mn = Infinity, mx = -Infinity, s = 0;
    for (const x of arr) { if (x<mn)mn=x; if (x>mx)mx=x; s+=x; }
    return { min: mn, mean: s/arr.length, max: mx };
  }
  function runOptimize(payload) {
    const {
      attributes, prohibitions, choiceConfig,
      versions, weights, budgetMs, swapBudget, baseSeed
    } = payload;
    const J = choiceConfig.altsPerTask;
    const T = choiceConfig.tasksPerRespondent;
    const V = Math.max(1, versions);
    const A = attributes.length;
    const tStart = Date.now();

    // Per-version swap budget, derived from the effort preset (incoming swapBudget
    // is the legacy total). Scales with version size; cheap because scoring is incremental.
    const factor = swapBudget <= 5000 ? 15 : (swapBudget <= 15000 ? 35 : 60);
    const perVerSwaps = Math.max(800, Math.min(24000, Math.round(factor * T * J * A)));

    const allTasks = [];
    const verScores = [];
    let bestVerScore = -Infinity, bestVer = 0;

    for (let v = 0; v < V; v++) {
      const rng = makeRng((baseSeed + v*9301) & 0x7fffffff);
      const overBudget = (Date.now() - tStart) > budgetMs;
      let vt;
      if (overBudget) {
        // Out of wall-clock budget: emit a balanced (un-annealed) version so the
        // design is still complete. Remaining versions take this fast path.
        vt = balancedInit(attributes, prohibitions, J, T, rng);
        verScores.push(0);
      } else {
        const out = optimizeVersion(attributes, prohibitions, J, T, weights, perVerSwaps, rng);
        vt = out.tasks;
        verScores.push(out.score);
        if (out.score > bestVerScore) { bestVerScore = out.score; bestVer = v; }
      }
      for (const t of vt) allTasks.push(t);

      // progress ping (and a running pooled diagnostic snapshot occasionally)
      const step = Math.max(1, Math.floor(V/20));
      if ((v+1) % step === 0 || v === V-1) {
        const runDiag = computeDiagnostics(allTasks, attributes, J);
        self.postMessage({
          type: 'progress',
          attempt: v+1, maxStarts: V,
          bestScore: bestVerScore === -Infinity ? 0 : bestVerScore,
          bestDiag: runDiag, elapsed: Date.now() - tStart,
          scoreHistory: verScores.slice()
        });
      }
    }

    // Pooled diagnostics over the full assembled design (UI consumes these as today).
    const diag = computeDiagnostics(allTasks, attributes, J);

    // Per-version diagnostic summary for the collapsible UI panel.
    const perVerDEff = [], perVerCV = [], perVerOverlap = [];
    for (let v = 0; v < V; v++) {
      const block = allTasks.slice(v*T, (v+1)*T);
      const d = computeDiagnostics(block, attributes, J);
      perVerDEff.push(d.dEfficiency); perVerCV.push(d.maxLevelCV); perVerOverlap.push(d.overlapAvg);
    }
    const perVersion = {
      dEff: summarize(perVerDEff),
      maxLevelCV: summarize(perVerCV),
      overlap: summarize(perVerOverlap)
    };

    self.postMessage({
      type: 'result',
      design: allTasks,
      diagnostics: diag,
      score: bestVerScore === -Infinity ? 0 : bestVerScore,
      bestAttempt: bestVer,
      attemptsTried: V,
      scoreHistory: verScores,
      perVersion,
      elapsed: Date.now() - tStart,
      versions: V,
      tasksPerVersion: T,
      algorithm: 'Per-version balanced-init + simulated annealing (incremental)'
    });
  }

  self.onmessage = function (e) {
    const msg = e.data || {};
    if (msg.type === 'run') {
      try { runOptimize(msg.payload); }
      catch (err) {
        self.postMessage({ type: 'error', message: String(err && err.message || err) });
      }
    } else if (msg.type === 'stop') {
      // Worker loop checks budgetMs, so the easy stop is to replace budgetMs.
      // We rely on main thread to terminate() for hard stop.
    }
  };
})();
</script>

<script type="text/babel" data-presets="env,react">
// ========================================================================
// CBC PLATFORM — SINGLE-FILE REACT APP
// ========================================================================

const { useState, useEffect, useMemo, useRef, useReducer, useCallback, useContext, createContext } = React;
const R = window.Recharts;

// ========================================================================
// SECTION 1 — CONSTANTS & DEFAULTS (from rulebook)
// ========================================================================
const DEFAULTS = {
  attributeCount: { recommendedMin: 4, recommendedMax: 6, softMin: 3, softMax: 8, hardMax: 10 },
  levelCount: { recommendedMin: 3, recommendedMax: 4, hardMin: 2, softMax: 5, hardMax: 7 },
  alternatives: { default: 3, min: 2, max: 5 },
  tasks: { default: 12, min: 6, max: 20, advisoryLow: 8, advisoryHigh: 15 },
  noneOption: { default: true, label: 'None of these products' },
  socComparator: { default: false, label: 'Current Standard of Care' },
  dualResponse: { default: false },
  hb: { iters: 8000, burnin: 4000, thin: 5, priorVar: 2 },
  lca: { minK: 2, maxK: 5, randomStarts: 40 },
  simulator: { maxProducts: 8 }
};

const THERAPEUTIC_AREAS = [
  'Oncology', 'Immunology', 'Rare Disease', 'Cardiovascular',
  'Neurology', 'Metabolic', 'Respiratory', 'Infectious Disease', 'Other'
];

const CBC_WIZARD_STEPS = [
  { id: 'setup',        label: 'Study Setup',         num: 1 },
  { id: 'attributes',   label: 'Attributes & Levels', num: 2 },
  { id: 'choice',       label: 'Choice Tasks',        num: 3 },
  { id: 'design',       label: 'Experimental Design', num: 4 },
  { id: 'cards',        label: 'Card Preview',        num: 5 },
  { id: 'assignment',   label: 'Assignment',          num: 6 },
  { id: 'data',         label: 'Data Upload',         num: 7 },
  { id: 'analysis',     label: 'Analysis',            num: 8 },
  { id: 'simulator',    label: 'Market Simulator',    num: 9 }
];

const ACBC_WIZARD_STEPS = [
  { id: 'setup',         label: 'Study Setup',           num: 1 },
  { id: 'attributes',    label: 'Attributes & Levels',   num: 2 },
  { id: 'acbc-config',   label: 'ACBC Configuration',    num: 3 },
  { id: 'acbc-spec',     label: 'Design Spec & Export',  num: 4 },
  { id: 'acbc-data',     label: 'Field Data Upload',     num: 5 },
  { id: 'analysis',      label: 'Analysis',              num: 6 },
  { id: 'simulator',     label: 'Market Simulator',      num: 7 }
];

// Default for legacy callers; the wizard uses the right one based on study.studyType.
const WIZARD_STEPS = CBC_WIZARD_STEPS;

function getWizardSteps(study) {
  return (study?.studyType === 'acbc') ? ACBC_WIZARD_STEPS : CBC_WIZARD_STEPS;
}

const ACBC_DEFAULTS = {
  byo: {
    includeAllAttributes: true,
    excludedAttrIds: []
  },
  screener: {
    enabled: true,
    batches: 7,
    profilesPerBatch: 4,
    attrsVariedFromBYO: 2,
    enableMustHaves: true,
    enableUnacceptables: true
  },
  tournament: {
    enabled: true,
    altsPerRound: 3,
    rounds: 4,
    structure: 'best-of'  // 'best-of' | 'round-robin' | 'elimination'
  },
  calibration: {
    enabled: true,
    profileCount: 5,
    scale: 7  // 5 or 7
  }
};

// ========================================================================
// SECTION 2 — UTILITIES (RNG, math, helpers)
// ========================================================================
function uid() {
  return 's_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}
function fmtDate(d) {
  const dt = d instanceof Date ? d : new Date(d);
  return dt.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
}
function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
function range(n) { return Array.from({length:n}, (_,i)=>i); }

// Mulberry32 seeded RNG (browser side; worker has its own)
function makeRng(seed) {
  let t = (seed >>> 0) || 1;
  return function () {
    t = (t + 0x6D2B79F5) | 0;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}
function randn(rng) {
  let u = 0, v = 0;
  while (u === 0) u = rng();
  while (v === 0) v = rng();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}
function shuffleInPlace(a, rng) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor((rng || Math.random)() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function logSumExp(arr) {
  let m = -Infinity;
  for (let i = 0; i < arr.length; i++) if (arr[i] > m) m = arr[i];
  let s = 0;
  for (let i = 0; i < arr.length; i++) s += Math.exp(arr[i] - m);
  return m + Math.log(s);
}
function softmax(arr) {
  const m = Math.max(...arr);
  const ex = arr.map(x => Math.exp(x - m));
  const s = ex.reduce((a,b)=>a+b, 0);
  return ex.map(x => x / s);
}
function mean(a) { return a.length ? a.reduce((s,x)=>s+x,0)/a.length : 0; }
function stdev(a) {
  if (a.length < 2) return 0;
  const m = mean(a);
  return Math.sqrt(a.reduce((s,x)=>s+(x-m)*(x-m),0)/(a.length-1));
}
function sum(a) { return a.reduce((s,x)=>s+x, 0); }

// Percentile
function pct(sorted, p) {
  if (!sorted.length) return NaN;
  const idx = (sorted.length - 1) * p;
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  if (lo === hi) return sorted[lo];
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
}

// Build parameter layout: flat index = attr_offset[a] + level_index (with ref omitted)
function buildParamLayout(attributes, includeNone) {
  // Reference level = last level per attribute (as per rulebook 6.1 default)
  const offsets = [];
  const labels = [];
  const attrRef = [];
  let idx = 0;
  attributes.forEach(attr => {
    offsets.push(idx);
    const ref = attr.levels.length - 1;
    attrRef.push(ref);
    attr.levels.forEach((lv, li) => {
      if (li === ref) return; // skip reference
      labels.push(`${attr.name} :: ${lv.name || lv}`);
      idx++;
    });
  });
  if (includeNone) {
    labels.push('None intercept');
    offsets.push(idx); // sentinel
    idx++;
  } else {
    offsets.push(idx);
  }
  return { offsets, labels, nPar: idx, attrRef };
}

// Given a profile (array of levelIndex per attribute), build dummy row of length nPar.
function profileToDummyRow(profile, attributes, layout) {
  const row = new Float64Array(layout.nPar);
  for (let a = 0; a < attributes.length; a++) {
    const ref = layout.attrRef[a];
    const li = profile[a];
    if (li === ref) continue;
    // levels before ref keep their index; levels after ref shift down by 1
    const paramIdx = layout.offsets[a] + (li < ref ? li : li - 1);
    row[paramIdx] = 1;
  }
  return row;
}

// ========================================================================
// SECTION 3 — PROFILE SPACE / PROHIBITIONS
// ========================================================================
function cartesian(arrs) {
  // Only used for small factorials — we build profile enumerations lazily for design engine
  let acc = [[]];
  arrs.forEach(a => {
    const next = [];
    acc.forEach(p => { a.forEach(x => next.push(p.concat([x]))); });
    acc = next;
  });
  return acc;
}

function fullFactorialSize(attributes) {
  return attributes.reduce((s, a) => s * a.levels.length, 1);
}

function profileViolatesProhibition(profile, prohibitions) {
  for (const pr of prohibitions) {
    if (profile[pr.attrA] === pr.levelA && profile[pr.attrB] === pr.levelB) return true;
  }
  return false;
}

function enumerateFeasibleProfiles(attributes, prohibitions, cap = 4000) {
  // Enumerate full factorial up to cap; if larger, sample
  const sizes = attributes.map(a => a.levels.length);
  const total = sizes.reduce((s, x) => s * x, 1);
  const rng = makeRng(17);
  const out = [];
  if (total <= cap) {
    // Full enumeration
    const stack = attributes.map(() => 0);
    while (true) {
      if (!profileViolatesProhibition(stack, prohibitions)) out.push(stack.slice());
      // increment
      let i = stack.length - 1;
      while (i >= 0) {
        stack[i]++;
        if (stack[i] < sizes[i]) break;
        stack[i] = 0;
        i--;
      }
      if (i < 0) break;
    }
  } else {
    // Random sample unique
    const seen = new Set();
    let safety = 0;
    while (out.length < cap && safety++ < cap * 20) {
      const p = sizes.map(L => Math.floor(rng() * L));
      const key = p.join(',');
      if (seen.has(key)) continue;
      if (profileViolatesProhibition(p, prohibitions)) continue;
      seen.add(key);
      out.push(p);
    }
  }
  return out;
}

function countProhibitedFraction(attributes, prohibitions) {
  const total = fullFactorialSize(attributes);
  if (total === 0) return 0;
  // Count profiles violating any prohibition — cap enumeration
  if (total > 20000) {
    // Sample estimate
    const rng = makeRng(7);
    const N = 2000;
    let v = 0;
    const sizes = attributes.map(a => a.levels.length);
    for (let i = 0; i < N; i++) {
      const p = sizes.map(L => Math.floor(rng() * L));
      if (profileViolatesProhibition(p, prohibitions)) v++;
    }
    return v / N;
  }
  const all = enumerateFeasibleProfiles(attributes, [], 20001);
  let v = 0;
  all.forEach(p => { if (profileViolatesProhibition(p, prohibitions)) v++; });
  return v / all.length;
}

// ========================================================================
// SECTION 4 — DESIGN ENGINE
// ========================================================================
// Generates a set of choice tasks. Each task has J test alternatives (profiles).
// Applies:
//   - Balanced-overlap with swap optimization (default for 7+ attrs or any prohibitions)
//   - Modified Federov for small problems (D-efficient)
// Honors prohibited combinations as hard constraints.

function computeLevelBalance(tasks, attributes) {
  // Returns {per-attr CVs, maxCV}
  const counts = attributes.map(a => new Array(a.levels.length).fill(0));
  let total = 0;
  tasks.forEach(task => {
    task.forEach(profile => {
      total++;
      profile.forEach((li, a) => { counts[a][li]++; });
    });
  });
  const cvs = counts.map(c => {
    const m = mean(c);
    if (m === 0) return 0;
    return stdev(c) / m;
  });
  return { counts, cvs, maxCV: Math.max(...cvs) };
}

function computeOverlap(tasks, attributes) {
  // For each attribute, fraction of tasks where at least 2 alternatives share that level.
  const overlaps = attributes.map(() => 0);
  tasks.forEach(task => {
    attributes.forEach((_, a) => {
      const seen = {};
      let dup = false;
      for (const p of task) {
        const k = p[a];
        if (seen[k]) { dup = true; break; }
        seen[k] = 1;
      }
      if (dup) overlaps[a]++;
    });
  });
  return { perAttr: overlaps.map(v => v / tasks.length), avg: mean(overlaps) / tasks.length };
}

// Compute information matrix for a design (for D-efficiency approx)
// Uses local MNL approximation at beta=0: X'(I - 1/J 11') X summed over tasks, appropriate approx.
function computeInformationMatrix(tasks, attributes, layout) {
  const p = layout.nPar - (layout.labels.includes('None intercept') ? 1 : 0);
  const M = new Float64Array(p * p);
  tasks.forEach(task => {
    const rows = task.map(prof => profileToDummyRow(prof, attributes, layout));
    const J = rows.length;
    // X'(I - 1/J 1 1') X == sum_j x_j x_j' - (1/J)(sum_j x_j)(sum_j x_j)'
    const xsum = new Float64Array(p);
    for (let j = 0; j < J; j++) {
      for (let k = 0; k < p; k++) xsum[k] += rows[j][k];
    }
    for (let j = 0; j < J; j++) {
      for (let i = 0; i < p; i++) {
        for (let k = 0; k < p; k++) M[i * p + k] += rows[j][i] * rows[j][k];
      }
    }
    for (let i = 0; i < p; i++) {
      for (let k = 0; k < p; k++) M[i * p + k] -= (xsum[i] * xsum[k]) / J;
    }
  });
  return { M, p };
}

// log|M| via Cholesky (returns -Infinity if singular/PD-fail)
function logDetPD(M, n) {
  // Cholesky in-place
  const L = new Float64Array(n * n);
  for (let i = 0; i < n; i++) {
    for (let j = 0; j <= i; j++) {
      let s = M[i * n + j];
      for (let k = 0; k < j; k++) s -= L[i * n + k] * L[j * n + k];
      if (i === j) {
        if (s <= 1e-12) return -Infinity;
        L[i * n + j] = Math.sqrt(s);
      } else {
        L[i * n + j] = s / L[j * n + j];
      }
    }
  }
  let d = 0;
  for (let i = 0; i < n; i++) d += Math.log(L[i * n + i]);
  return 2 * d;
}

/** Invert a positive-definite matrix via Cholesky.
 *  Used to compute V = M⁻¹ for parameter SE prediction.
 *  Returns null if M is singular. */
function invertPDFromCholesky(M, n) {
  const L = new Float64Array(n * n);
  for (let i = 0; i < n; i++) {
    for (let j = 0; j <= i; j++) {
      let s = M[i * n + j];
      for (let k = 0; k < j; k++) s -= L[i * n + k] * L[j * n + k];
      if (i === j) {
        if (s <= 1e-12) return null;
        L[i * n + j] = Math.sqrt(s);
      } else {
        L[i * n + j] = s / L[j * n + j];
      }
    }
  }
  // Solve L L^T X = I column by column
  const inv = new Float64Array(n * n);
  for (let j = 0; j < n; j++) {
    const e = new Float64Array(n); e[j] = 1;
    const y = new Float64Array(n);
    // Forward solve L y = e
    for (let i = 0; i < n; i++) {
      let s = e[i];
      for (let k = 0; k < i; k++) s -= L[i * n + k] * y[k];
      y[i] = s / L[i * n + i];
    }
    // Backward solve L^T x = y
    const x = new Float64Array(n);
    for (let i = n - 1; i >= 0; i--) {
      let s = y[i];
      for (let k = i + 1; k < n; k++) s -= L[k * n + i] * x[k];
      x[i] = s / L[i * n + i];
    }
    for (let i = 0; i < n; i++) inv[i * n + j] = x[i];
  }
  return inv;
}

/** Compute predicted standard errors for each non-reference attribute level under the design.
 *  Math: V = M_post⁻¹ where M_post = M + (1/priorVar)·I is the Bayesian-regularized
 *        information matrix at β = 0. (M alone is the Fisher information.)
 *        SE_k = sqrt( versions · V_kk / N )
 *  versions appears because each respondent only sees S/V of the master design.
 *
 *  Bayesian regularization: adding (1/priorVar)·I matches the MAP/HB practice of placing a
 *  N(0, priorVar) prior on β. This regularizes singular or near-singular information matrices
 *  (common in designs with strong prohibitions or low parameter count vs. tasks), and produces
 *  finite SEs even when the OLS information is rank-deficient. priorVar defaults to 2.0 (the
 *  HB default in this platform), which is diffuse — equivalent to one prior pseudo-observation
 *  worth of regularization.
 *
 *  Returns { params: [{attrIdx, attrName, levelIdx, levelName, refLevelName, V_kk, se, ci95, seRatio}],
 *            geoMeanSE, p, regularization }
 *  or null if the regularized info matrix is still singular (effectively never under priorVar > 0).
 */
function computeParameterPrecision(study, design, N, priorVar) {
  if (!design?.tasks || !N || N <= 0) return null;
  const attrs = study.attributes || [];
  const layout = buildParamLayout(attrs, false);
  const p = layout.nPar;
  if (p === 0) return null;
  const { M } = computeInformationMatrix(design.tasks, attrs, layout);
  // Bayesian regularization: M_post = M + (1/priorVar)·I.
  // priorVar = 2.0 matches the HB sampler's default Normal(0, 2) prior on β. With priorVar = 0,
  // falls back to a tiny numerical ridge (1e-6) for compatibility with strict OLS Fisher info.
  const pv = (typeof priorVar === 'number' && priorVar > 0) ? priorVar : null;
  const ridge = pv != null ? (1.0 / pv) : 1e-6;
  for (let i = 0; i < p; i++) M[i * p + i] += ridge;
  const V = invertPDFromCholesky(M, p);
  if (!V) return null;

  const versions = design.versions || 1;
  const params = [];
  for (let a = 0; a < attrs.length; a++) {
    const ref = layout.attrRef[a];
    for (let l = 0; l < attrs[a].levels.length; l++) {
      if (l === ref) continue;
      const paramIdx = layout.offsets[a] + (l < ref ? l : l - 1);
      const V_kk = Math.max(0, V[paramIdx * p + paramIdx]);
      const se = Math.sqrt((versions * V_kk) / N);
      params.push({
        attrIdx: a, attrName: attrs[a].name,
        levelIdx: l, levelName: attrs[a].levels[l].name,
        refLevelName: attrs[a].levels[ref].name,
        paramIdx, V_kk, se, ci95: 1.96 * se
      });
    }
  }

  // Geometric mean SE for ratio
  const eps = 1e-12;
  const meanLogSE = params.reduce((s, x) => s + Math.log(x.se + eps), 0) / Math.max(1, params.length);
  const geoMeanSE = Math.exp(meanLogSE);
  params.forEach(pp => { pp.seRatio = pp.se / (geoMeanSE + eps); });

  return {
    params, geoMeanSE, p, versions,
    regularization: pv != null ? { type: 'bayesian', priorVar: pv } : { type: 'numerical-ridge', value: 1e-6 }
  };
}

/** Smallest sample size N at which every estimated parameter has SE < seTarget under this design.
 *  Derived from SE_k(N) = sqrt(versions · V_kk / N): solving for N gives N = versions · V_kk / SE².
 *  We take the max over levels so the slowest-converging parameter sets the floor.
 *
 *  Returns null when the design is too degenerate to compute precision (computeParameterPrecision
 *  returned null) so callers can fall back to a default.
 *
 *  priorVar defaults to the HB sampler's prior (2.0) — the regularization that produces finite
 *  predictions even when raw Fisher information is singular.
 */
function computeRequiredNForTarget(study, design, seTarget, priorVar) {
  if (!design?.tasks || !(seTarget > 0)) return null;
  // Use a placeholder N = 1 just to get V_kk values; required N doesn't depend on the N we plug in here.
  const prec = computeParameterPrecision(study, design, 1, priorVar != null ? priorVar : DEFAULTS.hb.priorVar);
  if (!prec) return null;
  const versions = prec.versions;
  let maxN = 0;
  prec.params.forEach(p => {
    const reqN = versions * p.V_kk / (seTarget * seTarget);
    if (reqN > maxN) maxN = reqN;
  });
  return Math.max(1, Math.ceil(maxN));
}

function dEfficiency(tasks, attributes, layout) {
  const { M, p } = computeInformationMatrix(tasks, attributes, layout);
  // Add tiny ridge for stability
  for (let i = 0; i < p; i++) M[i * p + i] += 1e-6;
  const logDet = logDetPD(M, p);
  if (!isFinite(logDet)) return 0;
  // D-efficiency rel to |M_ideal|: unknown; report |M|^{1/p} / N where N = S*J
  const nObs = tasks.reduce((s, t) => s + t.length, 0);
  // Normalize by hypothetical uniform ideal — approximate 100% when balanced & orthogonal
  // Use: eff = exp(logDet / p) / nObs, then rescale by theoretical max computed by all-levels-orthogonal target
  return Math.exp(logDet / p) / nObs;
}

function generateBalancedOverlapDesign(attributes, prohibitions, J, S, seed) {
  const rng = makeRng(seed || 42);
  const sizes = attributes.map(a => a.levels.length);
  // Initialize: pick random feasible profiles uniformly
  const feasible = enumerateFeasibleProfiles(attributes, prohibitions, Math.min(6000, fullFactorialSize(attributes)));
  if (feasible.length === 0) throw new Error('No feasible profiles after applying prohibitions.');

  const makeRandomProfile = () => {
    // Favor feasible sampling
    for (let tries = 0; tries < 30; tries++) {
      const p = sizes.map(L => Math.floor(rng() * L));
      if (!profileViolatesProhibition(p, prohibitions)) return p;
    }
    return feasible[Math.floor(rng() * feasible.length)].slice();
  };

  // Build initial: S tasks, each with J unique-ish profiles
  const tasks = [];
  for (let t = 0; t < S; t++) {
    const task = [];
    const sigSet = new Set();
    let safety = 0;
    while (task.length < J && safety++ < 200) {
      const p = makeRandomProfile();
      const sig = p.join(',');
      if (sigSet.has(sig)) continue;
      sigSet.add(sig);
      task.push(p);
    }
    // If couldn't fill with unique, allow duplicates
    while (task.length < J) task.push(makeRandomProfile());
    tasks.push(task);
  }

  // Swap optimization: choose a task/alt/attribute, try swapping level.
  // Score: -maxCV - |avgOverlap - 0.30|*2 (push overlap to ~30%)
  const score = (tk) => {
    const lb = computeLevelBalance(tk, attributes);
    const ov = computeOverlap(tk, attributes);
    return -lb.maxCV - 2 * Math.abs(ov.avg - 0.30);
  };
  let curScore = score(tasks);
  const maxSwaps = Math.min(10000, S * J * 60);
  for (let s = 0; s < maxSwaps; s++) {
    const ti = Math.floor(rng() * S);
    const ji = Math.floor(rng() * J);
    const ai = Math.floor(rng() * attributes.length);
    const curLv = tasks[ti][ji][ai];
    const newLv = Math.floor(rng() * sizes[ai]);
    if (newLv === curLv) continue;
    const prof = tasks[ti][ji].slice();
    prof[ai] = newLv;
    if (profileViolatesProhibition(prof, prohibitions)) continue;
    // avoid making duplicate alternatives within a task
    const taskCopy = tasks[ti].slice();
    taskCopy[ji] = prof;
    const sigSet = new Set(taskCopy.map(p => p.join(',')));
    if (sigSet.size < taskCopy.length) continue;
    const newTasks = tasks.slice();
    newTasks[ti] = taskCopy;
    const newScore = score(newTasks);
    if (newScore >= curScore) {
      tasks[ti] = taskCopy;
      curScore = newScore;
    }
  }
  return tasks;
}

function generateFederovDesign(attributes, prohibitions, J, S, seed, starts) {
  const rng = makeRng(seed || 7);
  const feasible = enumerateFeasibleProfiles(attributes, prohibitions, 4000);
  if (feasible.length === 0) throw new Error('No feasible profiles.');

  // Build layout for info-matrix computation
  const tempLayout = buildParamLayout(attributes, false);

  let bestTasks = null;
  let bestLogDet = -Infinity;
  starts = starts || 40; // reduced from 1000 for browser
  for (let st = 0; st < starts; st++) {
    // Random initial design
    const tasks = [];
    for (let t = 0; t < S; t++) {
      const task = [];
      const picked = new Set();
      while (task.length < J) {
        const p = feasible[Math.floor(rng() * feasible.length)];
        const sig = p.join(',');
        if (picked.has(sig)) continue;
        picked.add(sig);
        task.push(p.slice());
      }
      tasks.push(task);
    }
    // Greedy swap: for each (task, alt), try all candidates, keep best
    let improved = true;
    let iter = 0;
    while (improved && iter++ < 3) {
      improved = false;
      for (let t = 0; t < S; t++) {
        for (let j = 0; j < J; j++) {
          const currentSigs = new Set(tasks[t].map(x => x.join(',')));
          currentSigs.delete(tasks[t][j].join(','));
          let bestCand = tasks[t][j];
          let bestD = logDetPD(computeInformationMatrix(tasks, attributes, tempLayout).M, tempLayout.nPar);
          const sampleSize = Math.min(40, feasible.length);
          for (let c = 0; c < sampleSize; c++) {
            const cand = feasible[Math.floor(rng() * feasible.length)];
            if (currentSigs.has(cand.join(','))) continue;
            tasks[t][j] = cand;
            const { M } = computeInformationMatrix(tasks, attributes, tempLayout);
            for (let i = 0; i < tempLayout.nPar; i++) M[i * tempLayout.nPar + i] += 1e-6;
            const ld = logDetPD(M, tempLayout.nPar);
            if (ld > bestD) { bestD = ld; bestCand = cand; improved = true; }
          }
          tasks[t][j] = bestCand;
        }
      }
    }
    const { M } = computeInformationMatrix(tasks, attributes, tempLayout);
    for (let i = 0; i < tempLayout.nPar; i++) M[i * tempLayout.nPar + i] += 1e-6;
    const ld = logDetPD(M, tempLayout.nPar);
    if (ld > bestLogDet) { bestLogDet = ld; bestTasks = tasks.map(t => t.map(p => p.slice())); }
  }
  return bestTasks;
}

function generateDesign(study, opts) {
  const { attributes, prohibitions, choiceConfig } = study;
  const J = choiceConfig.altsPerTask;
  const T = choiceConfig.tasksPerRespondent;
  const versions = Math.max(1, opts.versions || 1);
  const S = T * versions; // master tasks total = tasks per respondent × versions

  const hasProhibitions = prohibitions.length > 0;
  const useFederov = attributes.length <= 6 && !hasProhibitions && opts.useFederov !== false;

  const seed = opts.seed || Date.now() & 0x7fffffff;

  let tasks;
  if (useFederov) {
    // Federov is expensive; cap starts
    tasks = generateFederovDesign(attributes, prohibitions, J, S, seed, 25);
  } else {
    tasks = generateBalancedOverlapDesign(attributes, prohibitions, J, S, seed);
  }

  // Diagnostics
  const layout = buildParamLayout(attributes, false);
  const lb = computeLevelBalance(tasks, attributes);
  const ov = computeOverlap(tasks, attributes);
  const { M } = computeInformationMatrix(tasks, attributes, layout);
  for (let i = 0; i < layout.nPar; i++) M[i * layout.nPar + i] += 1e-6;
  const logDet = logDetPD(M, layout.nPar);
  const nObs = tasks.reduce((s, t) => s + t.length, 0);

  // Baseline: balanced orthogonal design would have info ~ (N/J) * eye(p) after centering.
  // |M_ideal| ≈ ((N * (J-1) / J) / L_avg)^p approximately; use that for D-eff proxy.
  const avgL = mean(attributes.map(a => a.levels.length));
  const baselineInfo = Math.log((nObs * (J - 1) / J) / avgL);
  const dEff = Math.min(100, Math.max(0, 100 * Math.exp((logDet / layout.nPar) - baselineInfo)));

  const algorithm = useFederov ? 'D-efficient Federov (25 starts)' : 'Balanced-overlap with swap optimization';

  return {
    tasks, seed, algorithm,
    diagnostics: {
      dEfficiency: dEff,
      maxLevelCV: lb.maxCV,
      levelCounts: lb.counts,
      overlapAvg: ov.avg,
      overlapPerAttr: ov.perAttr,
      totalProfiles: nObs,
      uniqueProfiles: new Set(tasks.flat().map(p => p.join(','))).size
    },
    versions,
    tasksPerVersion: T
  };
}

// ========================================================================
// SECTION 4b — DESIGN ADVISOR (rule-based diagnostics)
// Given a study + a generated design, return an ordered list of
// {severity, category, issue, suggestion, action?, jumpTo?} that explain
// why metrics may be suboptimal and what the user can change to improve them.
// ========================================================================
function diagnoseDesign(study, design, N) {
  if (!design?.diagnostics) return [];
  const suggestions = [];
  const attrs = study.attributes || [];
  const cfg = study.choiceConfig || {};
  const proh = study.prohibitions || [];
  const diag = design.diagnostics;
  const J = cfg.altsPerTask;
  const T = cfg.tasksPerRespondent;
  const V = design.versions || 1;
  const totalSlots = T * J * V;
  const nPar = attrs.reduce((s, a) => s + Math.max(0, a.levels.length - 1), 0);

  // Rule 1: J = 2 often ceiling-limits D-efficiency
  if (J === 2 && diag.dEfficiency < 85) {
    suggestions.push({
      severity: 'high',
      category: 'Choice config',
      issue: 'With only 2 alternatives per task, each task provides minimal contrast — a common cause of D-efficiency ceilings.',
      suggestion: 'Increase alternatives per task to 3. Typically gains 15–25% D-efficiency on similar structures.',
      action: { type: 'set_choice_alts', label: 'Set alts = 3', value: 3 }
    });
  }

  // Rule 2: Tasks per respondent low
  if (T < 10 && diag.dEfficiency < 85) {
    suggestions.push({
      severity: 'medium',
      category: 'Choice config',
      issue: `Only ${T} tasks per respondent. Fewer tasks give the optimizer less room to balance levels and reduce parameter estimation precision.`,
      suggestion: 'Increase to at least 12 tasks per respondent if respondent fatigue allows (rulebook default).',
      action: { type: 'set_tasks_per_resp', label: 'Set T = 12', value: 12 }
    });
  }

  // Rule 3: Divisibility — T·J·V not divisible by L_a for some attribute
  attrs.forEach((a, ai) => {
    const L = a.levels.length;
    if (L < 2) return;
    if (totalSlots % L !== 0) {
      const counts = diag.levelCounts?.[ai];
      const m = counts ? (counts.reduce((s,c)=>s+c,0)/counts.length) : 0;
      let sd = 0; if (counts && counts.length > 1) { counts.forEach(c => { sd += (c - m) * (c - m); }); sd = Math.sqrt(sd / (counts.length - 1)); }
      const cv = m === 0 ? 0 : sd / m;
      // Only flag when imbalance is visible; divisibility issues with tiny imbalance are OK
      if (cv > 0.08) {
        // Find nearest T that fixes divisibility
        let target = null;
        for (let t = T + 1; t <= DEFAULTS.tasks.max; t++) if ((t * J * V) % L === 0) { target = t; break; }
        if (target == null) for (let t = T - 1; t >= DEFAULTS.tasks.min; t--) if ((t * J * V) % L === 0) { target = t; break; }
        suggestions.push({
          severity: 'medium',
          category: 'Balance',
          issue: `Attribute "${a.name}" has ${L} levels but total alt-slots T·J·V = ${totalSlots} isn't divisible by ${L} — perfect balance is mathematically impossible at these settings.`,
          suggestion: (target != null && target !== T)
            ? `Set tasks per respondent to ${target} (nearest value where T·J·V divides by ${L}).`
            : `Change the number of versions, or consolidate "${a.name}" to a level count that divides ${J * V}.`,
          action: (target != null && target !== T) ? { type: 'set_tasks_per_resp', label: `Set T = ${target}`, value: target } : null
        });
      }
    }
  });

  // Rule 4: Attribute with too many levels
  attrs.forEach(a => {
    if (a.levels.length > DEFAULTS.levelCount.softMax) {
      suggestions.push({
        severity: 'low',
        category: 'Attributes',
        issue: `"${a.name}" has ${a.levels.length} levels. High level counts inflate the parameter count and make level balance harder.`,
        suggestion: `Consolidate adjacent levels of "${a.name}" to 3–4 levels. Modify in Step 2.`,
        jumpTo: 'attributes'
      });
    }
  });

  // Rule 5: Attribute count outside Federov-applicable band
  if (attrs.length > 6 && proh.length === 0 && diag.dEfficiency < 85) {
    suggestions.push({
      severity: 'medium',
      category: 'Attributes',
      issue: `With ${attrs.length} attributes the tool uses balanced-overlap rather than D-efficient Federov, which typically scores 5–15 points lower.`,
      suggestion: 'If possible, reduce to 6 or fewer attributes to unlock the Federov algorithm. Options: combine related attributes, run a MaxDiff to pre-prioritize, or split into two separate studies.',
      jumpTo: 'attributes'
    });
  }

  // Rule 6: Prohibitions too restrictive
  if (proh.length > 0) {
    const frac = countProhibitedFraction(attrs, proh);
    if (frac > 0.30) {
      suggestions.push({
        severity: frac > 0.50 ? 'high' : 'medium',
        category: 'Prohibitions',
        issue: `Prohibited combinations eliminate ${(frac * 100).toFixed(0)}% of the full factorial. Each prohibition shrinks the feasible design space and drags D-efficiency down.`,
        suggestion: 'Review each prohibition in Step 2. Prohibitions should encode true clinical or technical infeasibility — not merely unlikely combinations.',
        jumpTo: 'attributes'
      });
    }
  }

  // Rule 7: Overlap band
  if (diag.overlapAvg < 0.20) {
    suggestions.push({
      severity: 'low',
      category: 'Choice config',
      issue: `Average overlap is ${(diag.overlapAvg * 100).toFixed(0)}% (target band: 25–35%). Very low overlap weakens identification of the utility scale.`,
      suggestion: `Consider increasing alternatives per task (currently ${J}) or tasks per respondent (currently ${T}).`
    });
  } else if (diag.overlapAvg > 0.40) {
    suggestions.push({
      severity: 'low',
      category: 'Choice config',
      issue: `Average overlap is ${(diag.overlapAvg * 100).toFixed(0)}% (target band: 25–35%). High overlap means respondents see the same levels repeatedly, wasting degrees of freedom.`,
      suggestion: 'Likely too few attributes relative to task count. Add an attribute in Step 2, or reduce tasks per respondent.'
    });
  }

  // Rule 8: Parameter-to-observation ratio
  const obsPerPar = nPar > 0 ? T / nPar : 999;
  if (obsPerPar < 1.5 && diag.dEfficiency < 85) {
    suggestions.push({
      severity: 'medium',
      category: 'Structure',
      issue: `The design has ${nPar} parameters but only ${T} choices per respondent (ratio ${obsPerPar.toFixed(1)}:1). Individual-level HB estimates will be noisy.`,
      suggestion: 'Reduce parameters (fewer attributes or levels), or increase tasks per respondent. Rule of thumb: aim for ≥ 2 observations per parameter.'
    });
  }

  // Rule 9: Effort vs. outcome
  const effort = design.optimization?.effort;
  const bestIdx = design.optimization?.bestAttempt ?? -1;
  const tried = design.optimization?.attemptsTried ?? 0;
  if (effort === 'quick' && diag.dEfficiency < 85) {
    suggestions.push({
      severity: 'medium',
      category: 'Effort',
      issue: 'Quick effort ran 10 starts. The optimizer may not have converged to the best design the structure allows.',
      suggestion: 'Re-run Optimize design with Standard effort (50 starts, ~30 seconds).',
      action: { type: 'rerun_effort', label: 'Rerun Standard', value: 'standard' }
    });
  } else if (effort === 'standard' && diag.dEfficiency < 80 && tried > 0 && bestIdx >= 0 && bestIdx > tried * 0.7) {
    suggestions.push({
      severity: 'low',
      category: 'Effort',
      issue: `Best design was found on attempt ${bestIdx + 1} of ${tried} — the search was still improving late.`,
      suggestion: 'Re-run with Thorough effort (200 starts, ~2 minutes).',
      action: { type: 'rerun_effort', label: 'Rerun Thorough', value: 'thorough' }
    });
  }

  // Rule 10: Per-attribute balance drill-down
  if (diag.levelCounts) {
    attrs.forEach((a, ai) => {
      const counts = diag.levelCounts[ai];
      if (!counts || counts.length === 0) return;
      const m = counts.reduce((s, c) => s + c, 0) / counts.length;
      let sd = 0; if (counts.length > 1) { counts.forEach(c => { sd += (c - m) * (c - m); }); sd = Math.sqrt(sd / (counts.length - 1)); }
      const cv = m === 0 ? 0 : sd / m;
      if (cv > 0.10) {
        const expected = Math.round(totalSlots / a.levels.length);
        const divisible = totalSlots % a.levels.length === 0;
        const countsStr = counts.map((c, li) => `${a.levels[li]?.name || 'L' + (li + 1)}: ${c}`).join(', ');
        // Only add if we haven't already suggested divisibility for this same attribute
        const already = suggestions.some(s => s.category === 'Balance' && s.issue.includes(`"${a.name}"`));
        if (!already) {
          suggestions.push({
            severity: 'medium',
            category: 'Balance',
            issue: `"${a.name}" is imbalanced (CV ${(cv * 100).toFixed(0)}%). Counts: ${countsStr}. Expected under perfect balance: ~${expected} each.`,
            suggestion: divisible
              ? 'Balance is mathematically achievable at these settings — re-run Optimize with Thorough effort to let the optimizer iterate longer.'
              : `Total alt-slots ${totalSlots} isn't divisible by ${a.levels.length}. Adjust tasks per respondent or versions, or consolidate levels.`
          });
        }
      }
    });
  }

  // Rule 11: Weak parameters by predicted SE (requires sample size)
  // Uses Bayesian-regularized info matrix M_post = M + (1/priorVar)·I with priorVar = 2.0
  // (the HB default). This produces finite SEs even for degenerate designs.
  if (N && N > 0) {
    const prec = computeParameterPrecision(study, design, N, DEFAULTS.hb.priorVar);
    if (prec) {
      const weak = prec.params.filter(p => p.se > 0.2);
      if (weak.length > 0) {
        // Group by attribute
        const byAttr = {};
        weak.forEach(w => { (byAttr[w.attrName] = byAttr[w.attrName] || []).push(w); });
        const attrCount = Object.keys(byAttr).length;
        const summary = weak.length === 1
          ? `Level "${weak[0].levelName}" of "${weak[0].attrName}" will be weakly identified at N=${N}: predicted SE = ${weak[0].se.toFixed(2)}.`
          : `${weak.length} parameters across ${attrCount} attribute${attrCount > 1 ? 's' : ''} will be weakly identified at N=${N} (predicted SE > 0.2).`;
        const examples = weak.slice(0, 3)
          .map(w => `${w.attrName} → ${w.levelName} (SE ${w.se.toFixed(2)})`)
          .join('; ');
        suggestions.push({
          severity: 'medium',
          category: 'Precision',
          issue: weak.length > 1
            ? `${summary} Examples: ${examples}.`
            : summary,
          suggestion: 'Raise tasks per respondent, add a version, increase sample size, or consolidate the weakly-identified levels with adjacent ones.'
        });
      }
    }
  }

  // Dedupe by (category + issue start)
  const seen = new Set();
  const out = [];
  for (const s of suggestions) {
    const k = s.category + '|' + (s.issue || '').slice(0, 80);
    if (seen.has(k)) continue;
    seen.add(k);
    out.push(s);
  }

  // Sort by severity
  const sevOrder = { high: 0, medium: 1, low: 2 };
  out.sort((a, b) => (sevOrder[a.severity] ?? 9) - (sevOrder[b.severity] ?? 9));
  return out;
}

const DB_NAME = 'cbc_platform_v1';
const DB_VERSION = 1;
let _db = null;
async function getDB() {
  if (_db) return _db;
  _db = await idb.openDB(DB_NAME, DB_VERSION, {
    upgrade(db) {
      if (!db.objectStoreNames.contains('studies')) {
        const s = db.createObjectStore('studies', { keyPath: 'id' });
        s.createIndex('updatedAt', 'updatedAt');
      }
    }
  });
  return _db;
}
async function listStudies() {
  const db = await getDB();
  return (await db.getAll('studies')).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}
async function loadStudy(id) {
  return (await getDB()).get('studies', id);
}

// External-design import — core logic (auto-detect + build), shared by the
// "Import design + data" dashboard flow. Pure functions; UI lives in
// ExternalImportModal. Validated head-to-head against a hand-built study.
// ============================================================================
function _extNorm(s){ return String(s==null?'':s).trim().toLowerCase().replace(/[\s_\.]+/g,''); }
function _extIsInt(v){ return v!=='' && v!=null && Number.isFinite(Number(v)) && Number.isInteger(Number(v)); }
function _extMean(x){ return x.length? x.reduce((a,b)=>a+b,0)/x.length : 0; }
function _extStdevp(x){ if(x.length<2)return 0; const m=_extMean(x); return Math.sqrt(x.reduce((a,b)=>a+(b-m)*(b-m),0)/x.length); }

// Pick the header row in an array-of-arrays sheet by scanning the first rows for
// version/task/concept-like tokens; falls back to row 0.
function detectHeaderRow(aoa){
  const want=[/version|block/, /task|set/, /concept|^alt|card|option/];
  const lim=Math.min(8, aoa.length);
  for(let i=0;i<lim;i++){
    const cells=(aoa[i]||[]).map(_extNorm);
    if(want.every(re=>cells.some(c=>re.test(c)))) return i;
  }
  return 0;
}
function aoaToObjects(aoa, headerRow){
  const cols=(aoa[headerRow]||[]).map((h,i)=> (h==null||h==='')?`_col${i}`:String(h).trim());
  const rows=[];
  for(let r=headerRow+1;r<aoa.length;r++){
    const a=aoa[r]; if(!a||a.every(c=>c==null||c==='')) continue;
    const o={}; cols.forEach((c,i)=>o[c]=a[i]); rows.push(o);
  }
  return { cols, rows };
}

function detectExternalMapping(designCols, dataCols, designRows){
  const find=(cols,res)=>{ for(const r of res){ const c=cols.find(c=>r.test(_extNorm(c))); if(c) return c; } return null; };
  const dVersion=find(designCols,[/^version$/,/version/,/^block$/,/block/,/^ver$/]);
  const dTask=find(designCols,[/^task$/,/task/,/^set$/,/screen/]);
  const dConcept=find(designCols,[/^concept$/,/concept/,/^alt/,/^card$/,/option/,/^profile$/]);
  const structural=new Set([dVersion,dTask,dConcept].filter(Boolean));
  const candidates=designCols.filter(c=>!structural.has(c)&&!/^_col\d+$/.test(c));
  const numericCols=candidates.filter(c=>{ let n=0,ok=0; for(const r of designRows){ const v=r[c]; if(v===''||v==null)continue; n++; if(_extIsInt(v))ok++; } return n>0&&ok/n>=0.99; });
  const kept=[],sigs=new Set();
  for(const c of numericCols){ const sig=designRows.map(r=>String(r[c])).join('|'); if(sigs.has(sig))continue; sigs.add(sig); kept.push(c); }
  const dropped=numericCols.filter(c=>!kept.includes(c));
  const respId=find(dataCols,[/respnum/,/respondentid/,/^respid$/,/respondent/,/^rid$/,/^id$/]);
  const dataVer=find(dataCols,[/cbcversion/,/^version/,/version/,/^block$/]);
  const choiceCols=[];
  for(const c of dataCols){ const m=c.match(/^(.*?)(\d+)$/); if(!m)continue; if(/none$/i.test(c))continue;
    const key=_extNorm(c); const noneCol=dataCols.find(x=>_extNorm(x)===key+'none')||null; if(noneCol) choiceCols.push({task:Number(m[2]),col:c,noneCol}); }
  choiceCols.sort((a,b)=>a.task-b.task);
  return { design:{versionCol:dVersion,taskCol:dTask,conceptCol:dConcept,attrCols:kept,droppedCols:dropped,allCandidateCols:numericCols},
           data:{respIdCol:respId,versionCol:dataVer,choiceCols,noneMode:(choiceCols.length&&choiceCols[0].noneCol)?'dualNoneCol':'none',noneValue:2} };
}

function _extDesignDiagnostics(tasks, SIZES, J){
  const A=SIZES.length;
  const counts=SIZES.map(s=>new Array(s).fill(0));
  tasks.forEach(tk=>tk.forEach(p=>p.forEach((li,a)=>counts[a][li]++)));
  const cvs=counts.map(c=>{ const m=_extMean(c); return m?_extStdevp(c)/m:0; });
  const ov=new Array(A).fill(0);
  tasks.forEach(tk=>{ for(let a=0;a<A;a++){ const seen={}; let dup=false; for(const p of tk){ if(seen[p[a]]){dup=true;break;} seen[p[a]]=1; } if(dup)ov[a]++; } });
  const overlapPerAttr=ov.map(x=>x/tasks.length);
  const offsets=[]; let idx=0; const ref=SIZES.map(s=>s-1); SIZES.forEach(s=>{offsets.push(idx);idx+=s-1;}); const P=idx;
  const rowOf=p=>{ const r=new Array(P).fill(0); for(let a=0;a<A;a++){ const li=p[a]; if(li===ref[a])continue; r[offsets[a]+(li<ref[a]?li:li-1)]=1; } return r; };
  const M=new Array(P*P).fill(0);
  tasks.forEach(tk=>{ const rows=tk.map(rowOf); const xs=new Array(P).fill(0);
    rows.forEach(rw=>{for(let k=0;k<P;k++)xs[k]+=rw[k];});
    rows.forEach(rw=>{for(let i=0;i<P;i++)for(let k=0;k<P;k++)M[i*P+k]+=rw[i]*rw[k];});
    for(let i=0;i<P;i++)for(let k=0;k<P;k++)M[i*P+k]-=xs[i]*xs[k]/tk.length; });
  for(let i=0;i<P;i++)M[i*P+i]+=1e-6;
  const L=new Array(P*P).fill(0); let okc=true;
  for(let i=0;i<P&&okc;i++)for(let j=0;j<=i;j++){ let s=M[i*P+j]; for(let k=0;k<j;k++)s-=L[i*P+k]*L[j*P+k];
    if(i===j){ if(s<=1e-12){okc=false;break;} L[i*P+j]=Math.sqrt(s);} else L[i*P+j]=s/L[j*P+j]; }
  let deff=0;
  if(okc){ let ld=0; for(let i=0;i<P;i++)ld+=Math.log(L[i*P+i]); ld*=2;
    const nObs=tasks.length*J, avgL=_extMean(SIZES), baseline=Math.log((nObs*(J-1)/J)/avgL);
    deff=Math.min(100,Math.max(0,100*Math.exp(ld/P-baseline))); }
  const uniq=new Set(); tasks.forEach(tk=>tk.forEach(p=>uniq.add(p.join(','))));
  return { dEfficiency:deff, maxLevelCV:Math.max(...cvs), levelCounts:counts, overlapAvg:_extMean(overlapPerAttr),
           overlapPerAttr, totalProfiles:tasks.length*J, uniqueProfiles:uniq.size };
}

function buildStudyFromExternal(designRows, dataRows, mapping, opts){
  opts=opts||{}; const dm=mapping.design, da=mapping.data; const attrCols=dm.attrCols; const A=attrCols.length;
  const levelCodes=attrCols.map(()=>new Set());
  designRows.forEach(r=>attrCols.forEach((c,ai)=>{ const v=r[c]; if(v!==''&&v!=null) levelCodes[ai].add(Number(v)); }));
  const codeArrays=levelCodes.map(s=>Array.from(s).sort((a,b)=>a-b));
  const codeToIdx=codeArrays.map(arr=>{ const m={}; arr.forEach((c,i)=>m[c]=i); return m; });
  const attributes=attrCols.map((c,ai)=>({ id:`a_${ai}`, name:(opts.attrNames&&opts.attrNames[ai])||c, type:'categorical', isPrice:false,
    levels:codeArrays[ai].map((code,li)=>({id:`l_${ai}_${li}`, name:(opts.levelNames&&opts.levelNames[ai]&&opts.levelNames[ai][li])||String(code)})) }));
  const SIZES=attributes.map(a=>a.levels.length);
  const design={}; let maxConcept=0; const versionsSet=new Set();
  designRows.forEach(r=>{ const v=Number(r[dm.versionCol]),t=Number(r[dm.taskCol]),c=Number(r[dm.conceptCol]);
    versionsSet.add(v); if(c>maxConcept)maxConcept=c;
    const prof=attrCols.map((col,ai)=>codeToIdx[ai][Number(r[col])]);
    (design[v]=design[v]||{}); (design[v][t]=design[v][t]||[]); design[v][t].push({c,prof}); });
  Object.values(design).forEach(ts=>Object.keys(ts).forEach(t=>{ ts[t]=ts[t].sort((a,b)=>a.c-b.c).map(x=>x.prof); }));
  const J=maxConcept; const versions=Math.max(...versionsSet);
  const tpv={}; Object.values(design).forEach(ts=>{ const n=Object.keys(ts).length; tpv[n]=(tpv[n]||0)+1; });
  const T=Number(Object.entries(tpv).sort((a,b)=>b[1]-a[1])[0][0]);
  const tasks=[]; Object.keys(design).map(Number).sort((a,b)=>a-b).forEach(v=>{ const ts=design[v]; Object.keys(ts).map(Number).sort((a,b)=>a-b).forEach(t=>tasks.push(ts[t].map(p=>p.slice()))); });
  const diagnostics=_extDesignDiagnostics(tasks,SIZES,J);
  const includeNone=da.noneMode!=='none';
  const asgn=[],resp=[]; let straight=0,noneheavy=0,unmatched=0;
  const choiceByTask={}; da.choiceCols.forEach(cc=>choiceByTask[cc.task]=cc);
  const taskNums=da.choiceCols.map(c=>c.task).sort((a,b)=>a-b);
  dataRows.forEach(r=>{ const rid=String(r[da.respIdCol]); const v=Number(r[da.versionCol]); const tc={}; let nn=0,answered=0;
    taskNums.forEach(t=>{ const cc=choiceByTask[t]; let chosen;
      if(da.noneMode==='dualNoneCol'){ const isNone=Number(r[cc.noneCol])===Number(da.noneValue); chosen=isNone?0:Number(r[cc.col]); }
      else { const raw=Number(r[cc.col]); chosen=(includeNone&&raw===Number(da.noneValue))?0:raw; }
      if(chosen!==''&&!Number.isNaN(chosen)){ tc[String(t)]=chosen; answered++; if(chosen===0)nn++; }
      const vt=design[v]; if(!vt||!vt[t]){ unmatched++; return; }
      vt[t].forEach((prof,ci)=>asgn.push({respId:rid,version:v,subgroup:'',taskNum:t,position:ci+1,originalAltIdx:ci+1,profile:prof.slice()})); });
    const pc={}; Object.values(tc).forEach(p=>{ if(p!==0)pc[p]=(pc[p]||0)+1; });
    const sf=answered?(Math.max(0,...Object.values(pc))/answered):0; const nf=answered?nn/answered:0;
    const fsl=sf>=0.9, fnh=nf>=0.5; if(fsl)straight++; if(fnh)noneheavy++;
    resp.push({respId:rid,tasks:tc,seg:{},nTasks:answered,completeness:answered/(T||taskNums.length),
      straightlineFrac:sf,noneFrac:nf,flagIncomplete:answered<(T||taskNums.length),flagStraightline:fsl,flagNoneHeavy:fnh,exclude:false}); });
  const now=Date.now();
  return { id:uid(), name:opts.name||'Imported external study', createdAt:now, updatedAt:now, status:'Awaiting Data', studyType:'cbc', source:'external',
    setup:{name:opts.name||'Imported external study',client:'',therapeuticArea:opts.therapeuticArea||'',description:'Imported from external design + field data.',targetRespondentType:''},
    attributes, prohibitions:[],
    choiceConfig:{altsPerTask:J,includeNone,noneLabel:'None of these',includeSoC:false,socLabel:'Current Standard of Care',socProfile:null,tasksPerRespondent:T,dualResponse:da.noneMode==='dualNoneCol'},
    design:{tasks,seed:0,algorithm:'Imported external design',diagnostics,versions,tasksPerVersion:T},
    cardStyle:{headerStyle:'letter',customHeaders:[],attributeDisplayNames:{},levelDisplayNames:{},showUnits:true,colorCodedAttrs:{}},
    assignment:{rows:asgn,sampleSize:dataRows.length,versions,subgroups:[],createdAt:now,seed:0},
    responses:{rows:resp,segColumns:[],summary:{total:dataRows.length,complete:resp.filter(r=>!r.flagIncomplete).length,incomplete:resp.filter(r=>r.flagIncomplete).length,straightline:straight,noneHeavy:noneheavy,unmatchedCount:unmatched,unmatchedRespondents:0}},
    analysis:null, scenarios:[],
    _importReport:{attributes:A,droppedCols:dm.droppedCols,J,versions,T,respondents:dataRows.length,unmatched} };
}

async function saveStudy(study) {
  const db = await getDB();
  study.updatedAt = Date.now();
  await db.put('studies', study);
}

  const db = await getDB();

}
