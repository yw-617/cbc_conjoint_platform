// ========================================================================
// SECTION 11c — PYTHON ANALYSIS VIA OPENAI CODE INTERPRETER (Path C)
//
// The browser sends an embedded Python reference implementation + the
// study/response data to OpenAI's Responses API with the code_interpreter
// tool enabled. OpenAI executes Python in its sandbox (full numpy/scipy
// stack), the output is parsed back into the same analysis schema the JS
// engine produces, so the existing analysis tabs render unchanged.
//
// This is the "in-tool Python button" path we documented in the Docs.
// ========================================================================

const PYTHON_HB_REFERENCE = `
"""
HB-MNL Metropolis-within-Gibbs MCMC. Vectorized numpy.
Identical algorithm to the JS hb-worker, head-to-head validated to r=0.986
against per-respondent posteriors on synthetic data (see VALIDATION.md §3).
Data is loaded from a file mounted by OpenAI Code Interpreter at
/mnt/data/study_data.json — uploaded separately via the Files API to bypass
the chat context window.
"""
import json, sys, time, os
import numpy as np
from numpy.linalg import inv, cholesky
from scipy.stats import invwishart

# Locate the data file. The mount path is typically /mnt/data/<filename> but
# the sandbox sometimes drops files at the working directory; check both.
_candidates = ['/mnt/data/study_data.json', './study_data.json', '/tmp/study_data.json']
_data_path = next((p for p in _candidates if os.path.exists(p)), None)
if _data_path is None:
    # Last resort: any *.json under /mnt/data
    if os.path.isdir('/mnt/data'):
        for fn in os.listdir('/mnt/data'):
            if fn.endswith('.json'):
                _data_path = '/mnt/data/' + fn
                break
if _data_path is None:
    print("__RESULT_JSON_START__")
    print(json.dumps({"error": "Could not locate uploaded data file. Looked in /mnt/data/, ./, /tmp/."}))
    print("__RESULT_JSON_END__")
    sys.exit(0)

with open(_data_path, 'r') as _f:
    DATA = json.load(_f)
study      = DATA['study']
responses  = DATA['responses']
assignment = DATA['assignment']
HP         = DATA['hyperparams']   # { iters, burnin, thin, priorVar, seed }

attrs = study['attributes']
cfg   = study['choiceConfig']
include_none = cfg['includeNone']
A = len(attrs)
levels_per_attr = [len(a['levels']) for a in attrs]

# Reference level = last; nPar = sum(L-1) per attribute, +1 if None
ref = [L - 1 for L in levels_per_attr]
attr_offsets = []
idx = 0
for L in levels_per_attr:
    attr_offsets.append(idx)
    idx += (L - 1)
p_attr = idx
p_total = p_attr + (1 if include_none else 0)

def profile_to_row(profile_levels):
    row = np.zeros(p_total)
    for ai, lv in enumerate(profile_levels):
        if lv == ref[ai]: continue
        row[attr_offsets[ai] + (lv if lv < ref[ai] else lv - 1)] = 1.0
    return row

# Build assignment lookup: { respId|taskNum -> [profile_rows by position] }
asgn_by_key = {}
for r in assignment['rows']:
    k = f"{r['respId']}|{r['taskNum']}"
    asgn_by_key.setdefault(k, []).append(r)
for k in asgn_by_key: asgn_by_key[k].sort(key=lambda x: x['position'])

# Convert profile (list of levelIds) to levelIdx per attribute
level_id_to_idx = []
for a in attrs:
    level_id_to_idx.append({l['id']: i for i, l in enumerate(a['levels'])})

def profile_levels(profile_obj):
    if isinstance(profile_obj, list):  # already [levelIdx, ...]
        return profile_obj
    # profile_obj could be { attrId: levelId } map
    levels = []
    for ai, a in enumerate(attrs):
        levels.append(level_id_to_idx[ai].get(profile_obj.get(a['id']), 0))
    return levels

# Build flattened per-respondent task arrays for vectorized MCMC
respondents = [r for r in responses['rows'] if not r.get('exclude')]
R = len(respondents)
if R == 0:
    print("__RESULT_JSON_START__")
    print(json.dumps({"error": "No respondents after exclusions."}))
    print("__RESULT_JSON_END__")
    sys.exit(0)

# For each respondent task, build (X array J×p_total, chosen int, n_alts).
tasks = []  # list of (X_matrix, chosen_idx)
resp_offsets = [0]
for resp in respondents:
    resp_tasks = []
    for tn_str, chosen_pos in resp['tasks'].items():
        tn = int(tn_str)
        alts = asgn_by_key.get(f"{resp['respId']}|{tn}", [])
        if not alts: continue
        chosen_idx = -1 if chosen_pos == 0 else next((i for i, a in enumerate(alts) if a['position'] == chosen_pos), -2)
        if chosen_pos != 0 and chosen_idx == -2: continue
        X = np.array([profile_to_row(profile_levels(a['profile'])) for a in alts])
        resp_tasks.append((X, chosen_idx))
    for t in resp_tasks: tasks.append(t)
    resp_offsets.append(len(tasks))

n_tasks_total = len(tasks)
J_per_task = np.array([t[0].shape[0] for t in tasks], dtype=int)
chosen_per_task = np.array([t[1] for t in tasks], dtype=int)
X_flat = np.stack([t[0] for t in tasks])  # shape: (T, J_max, p_total), padded
# All tasks share J in this design — pad if not
J_max = int(J_per_task.max())
assert (J_per_task == J_max).all(), "All tasks must share J for vectorized MCMC."
# X_flat shape: (T, J, p_total)

# Hyperparams
ITERS    = int(HP.get('iters', 8000))
BURNIN   = int(HP.get('burnin', 4000))
THIN     = int(HP.get('thin', 5))
PRIOR_VAR = float(HP.get('priorVar', 2.0))
MU_PRIOR_VAR = 100.0
IW_DF = p_total + 3
IW_SCALE = IW_DF * np.eye(p_total)
SEED = int(HP.get('seed', 42))
rng = np.random.default_rng(SEED)

# State
beta = rng.normal(0, 0.05, (R, p_total))
mu = np.zeros(p_total)
Sigma = PRIOR_VAR * np.eye(p_total)
rw_scale = np.full(R, 0.1)
acc = np.zeros(R, dtype=int)
prop = np.zeros(R, dtype=int)
postMean = np.zeros((R, p_total))
postM2   = np.zeros((R, p_total))
rlh_hist = np.zeros(ITERS, dtype=np.float32)
kept = 0

# Per-respondent task offsets for indexing
ro = np.array(resp_offsets, dtype=int)

def llh_all(beta_all):
    """Sum log-prob of chosen alt per task, grouped by respondent."""
    U = np.einsum('rp,tjp->rtj', beta_all, X_flat)  # (R, T, J)
    if include_none:
        Un = beta_all[:, -1:][:, :, None] + 0.0 * U[:, :, :1]  # broadcasting None utility
        U = np.concatenate([U, Un], axis=2)
    mx = U.max(axis=2, keepdims=True)
    lse = mx.squeeze(2) + np.log(np.exp(U - mx).sum(axis=2))
    # chosen index per task; respondent grouping handled via masking
    r_idx = np.arange(R)[:, None]
    t_idx = np.arange(n_tasks_total)[None, :]
    # Mask: respondent r owns task t iff ro[r] <= t < ro[r+1]
    own = (t_idx >= ro[:-1, None]) & (t_idx < ro[1:, None])
    chosen_clamped = np.where(chosen_per_task >= 0, chosen_per_task, U.shape[2] - 1)
    U_chosen = U[r_idx, t_idx, chosen_clamped[None, :]]
    none_mask = (chosen_per_task == -1)
    if include_none:
        U_chosen = np.where(none_mask, U[:, :, -1], U_chosen)
    ll_per_task = (U_chosen - lse) * own
    return ll_per_task.sum(axis=1)

print(f"HB starting: R={R}, T={n_tasks_total}, J={J_max}, p={p_total}, iters={ITERS}/{BURNIN}", file=sys.stderr)
t0 = time.time()

for it in range(ITERS):
    bbar = beta.mean(axis=0)
    Sigma_inv = inv(Sigma)
    post_prec_mu = R * Sigma_inv + (1.0 / MU_PRIOR_VAR) * np.eye(p_total)
    post_cov_mu  = inv(post_prec_mu)
    mu = rng.multivariate_normal(post_cov_mu @ (R * Sigma_inv @ bbar), post_cov_mu)
    diffs = beta - mu
    Sigma = invwishart.rvs(df=IW_DF + R, scale=IW_SCALE + diffs.T @ diffs, random_state=rng)
    Sigma_inv_cur = inv(Sigma)
    ll_cur = llh_all(beta)
    d_cur  = beta - mu
    lp_cur = -0.5 * np.einsum('rp,pq,rq->r', d_cur, Sigma_inv_cur, d_cur)
    prop_beta = beta + rw_scale[:, None] * rng.normal(size=(R, p_total))
    ll_pr  = llh_all(prop_beta)
    d_pr   = prop_beta - mu
    lp_pr  = -0.5 * np.einsum('rp,pq,rq->r', d_pr, Sigma_inv_cur, d_pr)
    log_alpha = (ll_pr + lp_pr) - (ll_cur + lp_cur)
    u = rng.uniform(size=R) + 1e-300
    accept = np.log(u) < log_alpha
    beta[accept] = prop_beta[accept]
    acc  += accept.astype(int)
    prop += 1
    total_ll = np.where(accept, ll_pr, ll_cur).sum()
    rlh_hist[it] = float(np.exp(total_ll / max(1, n_tasks_total)))
    if it < BURNIN and (it + 1) % 50 == 0:
        rate = acc / np.maximum(1, prop)
        rw_scale = np.where(rate < 0.2, rw_scale * 0.9, rw_scale)
        rw_scale = np.where(rate > 0.45, rw_scale * 1.1, rw_scale)
        rw_scale = np.clip(rw_scale, 0.01, 2.0)
    if it >= BURNIN and (it - BURNIN) % THIN == 0:
        kept += 1
        delta = beta - postMean
        postMean += delta / kept
        postM2   += delta * (beta - postMean)

elapsed = time.time() - t0
postSD = np.sqrt(postM2 / max(1, kept - 1)) if kept > 1 else np.zeros_like(postM2)

# Reshape posterior means back into per-attribute-level utilities for the analysis tabs
J = X_flat.shape[1] + (1 if include_none else 0)
per_resp = []
for r in range(R):
    utils_by_attr = []
    for ai, L in enumerate(levels_per_attr):
        vec = []
        for li in range(L):
            if li == ref[ai]:
                vec.append(0.0)
            else:
                pidx = attr_offsets[ai] + (li if li < ref[ai] else li - 1)
                vec.append(float(postMean[r, pidx]))
        utils_by_attr.append(vec)
    per_resp.append(utils_by_attr)

mean_per_level = []
sd_per_level = []
for ai, L in enumerate(levels_per_attr):
    mvec, svec = [], []
    for li in range(L):
        vals = [per_resp[r][ai][li] for r in range(R)]
        mvec.append(float(np.mean(vals)))
        svec.append(float(np.std(vals, ddof=1)) if R > 1 else 0.0)
    mean_per_level.append(mvec)
    sd_per_level.append(svec)

# Attribute importance: range per attribute, averaged across respondents
importance = [0.0] * A
for r in range(R):
    ranges = [max(per_resp[r][ai]) - min(per_resp[r][ai]) for ai in range(A)]
    tot = sum(ranges) or 1.0
    for ai in range(A):
        importance[ai] += (ranges[ai] / tot) / R

result = {
    "engine": "python-openai-code-interpreter",
    "elapsedSec": float(elapsed),
    "iters": ITERS, "burnin": BURNIN, "thin": THIN, "priorVar": PRIOR_VAR,
    "finalRLH": float(rlh_hist[-1]),
    "pctCertainty": float((rlh_hist[-1] - 1.0/J) / (1.0 - 1.0/J) * 100),
    "rlhHistory": [float(x) for x in rlh_hist[::max(1, ITERS // 200)]],  # subsample
    "individualUtilities": postMean.flatten().tolist(),
    "individualSDs": postSD.flatten().tolist(),
    "pTotal": p_total,
    "R": R,
    "totalTasks": n_tasks_total,
    "utilityStructure": {
        "perResp": per_resp,
        "noneUtils": ([float(postMean[r, -1]) for r in range(R)] if include_none else None),
        "meanPerLevel": mean_per_level,
        "sdPerLevel": sd_per_level,
        "importance": importance
    },
    "respondents": [{"respId": r['respId'], "seg": r.get('seg', {})} for r in respondents]
}
print("__RESULT_JSON_START__")
print(json.dumps(result))
print("__RESULT_JSON_END__")
`;

// Rough cost + time estimate for the Python HB run. Helps users avoid surprise spend.
// With the Files API approach, the data is uploaded out-of-band (not in the chat
// context), so input tokens are just the Python code (~3.5k tokens). Output tokens
// still scale with respondent count (Python prints posterior means as JSON).
function estimatePythonHBCost(study, model) {
  const responses = study.responses?.rows?.filter(r => !r.exclude) ?? [];
  const R = responses.length;
  const codeTokens = 3500;
  const inputTokens = codeTokens;  // data goes via Files API, not chat input
  const outputTokens = R * 80 + 1500;  // posterior means + diagnostics
  const pricing = {
    'gpt-4o':      { input: 2.50 / 1e6, output: 10.00 / 1e6, session: 0.03 },
    'gpt-4o-mini': { input: 0.15 / 1e6, output: 0.60 / 1e6,  session: 0.03 },
    'gpt-4-turbo': { input: 10.0 / 1e6, output: 30.00 / 1e6, session: 0.03 },
    'o3-mini':     { input: 1.10 / 1e6, output: 4.40 / 1e6,  session: 0.03 }
  }[model] || { input: 2.5 / 1e6, output: 10.0 / 1e6, session: 0.03 };
  const cost = pricing.input * inputTokens + pricing.output * outputTokens + pricing.session;
  // Time estimate from validation runs: 1.6s for 3000 iters × 200 resp, linear scaling
  const iters = 8000;
  const seconds = 1.6 * (iters / 3000) * (R / 200);
  return { inputTokens, outputTokens, cost, seconds: Math.max(5, seconds) };
}

/** Combine multiple AbortSignals into one — fires when any input fires.
 *  Used to layer a fetch timeout on top of a user-cancel signal. */
function anySignal(signals) {
  const controller = new AbortController();
  for (const s of signals) {
    if (!s) continue;
    if (s.aborted) { controller.abort(s.reason); break; }
    s.addEventListener('abort', () => controller.abort(s.reason), { once: true });
  }
  return controller.signal;
}

/** Upload a JSON or text payload to OpenAI's Files API.
 *  Returns the file_id, which Code Interpreter will mount under /mnt/data/. */
async function uploadDataToOpenAI({ apiKey, data, filename = 'study_data.json', onProgress, mimeType = 'application/json' }) {
  const body = typeof data === 'string' ? data : JSON.stringify(data);
  onProgress?.(`Uploading ${filename} to OpenAI (${(body.length / 1024).toFixed(0)} KB)…`);
  const blob = new Blob([body], { type: mimeType });
  const formData = new FormData();
  formData.append('file', blob, filename);
  formData.append('purpose', 'assistants');
  const res = await fetch('https://api.openai.com/v1/files', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}` },
    body: formData
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`File upload failed (${res.status}): ${text.slice(0, 400)}`);
  }
  const out = await res.json();
  return out.id;
}

async function deleteOpenAIFile({ apiKey, fileId }) {
  // Best-effort cleanup. Failure to delete is non-fatal.
  try {
    await fetch(`https://api.openai.com/v1/files/${fileId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${apiKey}` }
    });
  } catch { /* ignore */ }
}

/** Call OpenAI Responses API with code_interpreter tool.
 *  Uploads the data as a file (bypasses context window), attaches it to the
 *  user message as input_file (the standard Responses API pattern), and parses
 *  the JSON result the Python prints between __RESULT_JSON_START__ and
 *  __RESULT_JSON_END__. Cleans up the file afterward.
 *
 *  Supports cancellation via the `signal` AbortController.
 *  If `captureVerbose` is set, the request/response are stashed there for debugging. */
async function callOpenAICodeInterpreter({ apiKey, model, code, data, onProgress, signal, fetchTimeoutMs = 90000, captureVerbose }) {
  // Step 1a: upload data file
  const dataFileId = await uploadDataToOpenAI({ apiKey, data, filename: 'study_data.json', onProgress });
  if (signal?.aborted) { deleteOpenAIFile({ apiKey, fileId: dataFileId }); throw new Error('Cancelled before run started.'); }

  // Step 1b: upload Python script as a file too. Keeps the chat input tiny and
  // sidesteps any JSON-escaping issues with the embedded multi-line Python string.
  const scriptFileId = await uploadDataToOpenAI({
    apiKey, data: code, filename: 'analysis.py', mimeType: 'text/x-python', onProgress
  });
  if (signal?.aborted) {
    deleteOpenAIFile({ apiKey, fileId: dataFileId });
    deleteOpenAIFile({ apiKey, fileId: scriptFileId });
    throw new Error('Cancelled before run started.');
  }
  onProgress?.(`Files uploaded (data=${dataFileId}, script=${scriptFileId}). Calling Responses API…`);

  // Minimum-viable Responses API request:
  //   - small input_text instructing the model to run /mnt/data/analysis.py
  //   - both files mounted in the code_interpreter sandbox via container.file_ids
  //   - no tool_choice — let the model auto-select code_interpreter as natural
  //   - no input_file content (that pattern inlines bytes into context, blowing the limit)
  const requestBody = {
    model,
    input: [
      {
        role: 'user',
        content: [
          {
            type: 'input_text',
            text:
              "Run the Python script at /mnt/data/analysis.py using the code interpreter. " +
              "The script will read its input from /mnt/data/study_data.json and print a JSON result block " +
              "delimited by __RESULT_JSON_START__ and __RESULT_JSON_END__. " +
              "After it finishes, copy the JSON block from the script's stdout verbatim into your reply between those same delimiters " +
              "(no commentary, no formatting changes) so the client can parse it. " +
              "If the script errors, copy the full traceback into your reply between the same delimiters."
          }
        ]
      }
    ],
    tools: [{
      type: 'code_interpreter',
      container: { type: 'auto', file_ids: [dataFileId, scriptFileId] }
    }]
  };
  // Use a single `fileId` alias so the existing cleanup code paths still work
  const cleanup = () => { deleteOpenAIFile({ apiKey, fileId: dataFileId }); deleteOpenAIFile({ apiKey, fileId: scriptFileId }); };

  // Persist a redacted copy for the user's verbose-mode display
  if (captureVerbose) {
    captureVerbose.request = JSON.stringify(requestBody, null, 2);
  }

  // Layer our own fetch timeout on top of the user's cancel signal
  const ourTimeoutController = new AbortController();
  const timeoutHandle = setTimeout(() => ourTimeoutController.abort(new Error('fetch-timeout')), fetchTimeoutMs);
  const combinedSignal = signal ? anySignal([signal, ourTimeoutController.signal]) : ourTimeoutController.signal;

  let data1;
  try {
    const tFetchStart = Date.now();
    const res = await fetch('https://api.openai.com/v1/responses', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody),
      signal: combinedSignal
    });
    clearTimeout(timeoutHandle);
    const fetchMs = Date.now() - tFetchStart;
    onProgress?.(`Response received after ${(fetchMs / 1000).toFixed(1)}s — parsing…`);

    if (!res.ok) {
      const text = await res.text();
      if (captureVerbose) captureVerbose.response = `HTTP ${res.status}\n\n${text}`;
      throw new Error(`OpenAI Responses API ${res.status}: ${text.slice(0, 800)}`);
    }
    data1 = await res.json();
    if (captureVerbose) captureVerbose.response = JSON.stringify(data1, null, 2);

    // Surface high-level status if not 'completed'
    if (data1?.status && data1.status !== 'completed') {
      const errInfo = data1.error || data1.incomplete_details || {};
      throw new Error(`OpenAI returned status='${data1.status}'. Details: ${JSON.stringify(errInfo).slice(0, 400)}`);
    }
  } catch (e) {
    clearTimeout(timeoutHandle);
    cleanup();
    if (e?.name === 'AbortError') {
      if (ourTimeoutController.signal.aborted && !signal?.aborted) {
        throw new Error(`Fetch timed out after ${(fetchTimeoutMs / 1000).toFixed(0)}s waiting for OpenAI. The request was accepted but no response came back. Most likely cause: your API key doesn't have access to code_interpreter via the Responses API on this account tier, OR the model is silently stalled. Try gpt-4o-mini; if that also hangs, the issue is API access (check at https://platform.openai.com/settings/organization/limits).`);
      }
      throw new Error('Cancelled.');
    }
    throw e;
  }
  // Successful cleanup
  cleanup();

  // Extract text from the response. Two places to look: assistant message content,
  // and the code_interpreter_call.outputs (logs/stdout).
  const collectText = (obj) => {
    const parts = [];
    const visit = (n) => {
      if (!n) return;
      if (typeof n === 'string') { parts.push(n); return; }
      if (Array.isArray(n)) { n.forEach(visit); return; }
      if (typeof n === 'object') {
        if (typeof n.text === 'string') parts.push(n.text);
        if (typeof n.logs === 'string') parts.push(n.logs);
        if (typeof n.output === 'string') parts.push(n.output);
        Object.values(n).forEach(visit);
      }
    };
    visit(obj);
    return parts.join('\n');
  };
  const fullText = collectText(data1);

  // Find the delimited JSON block
  const start = fullText.indexOf('__RESULT_JSON_START__');
  const end = fullText.indexOf('__RESULT_JSON_END__');
  if (start < 0 || end < 0) {
    throw new Error('Python ran but did not print the expected __RESULT_JSON_START__/__RESULT_JSON_END__ block. Output excerpt:\n' + fullText.slice(0, 500));
  }
  const jsonStr = fullText.slice(start + '__RESULT_JSON_START__'.length, end).trim();
  let parsed;
  try { parsed = JSON.parse(jsonStr); }
  catch (e) { throw new Error('Result JSON failed to parse: ' + e.message + '\nFirst 300 chars: ' + jsonStr.slice(0, 300)); }
  if (parsed.error) throw new Error('Python error: ' + parsed.error);
  return { result: parsed, raw: data1 };
}

// ---- ACBC constraint-augmented HB Python reference --------------------
// Implements the full likelihood from Docs §2.6.6:
//   L_n(β) = L_tournament · L_screener · L_calibration · L_must · L_unacc
// Same Metropolis-within-Gibbs sampler as CBC, augmented per-respondent
// log-likelihood with screener binary, calibration soft-binary, must-have
// constraint-augmentation tasks (weight w_constraint = 5.0), unacceptable
// constraint tasks (same weight).
const PYTHON_ACBC_HB_REFERENCE = `
import json, sys, time, os
import numpy as np
from numpy.linalg import inv
from scipy.stats import invwishart

# Data is uploaded via the Files API and mounted under /mnt/data/.
_candidates = ['/mnt/data/study_data.json', './study_data.json', '/tmp/study_data.json']
_data_path = next((p for p in _candidates if os.path.exists(p)), None)
if _data_path is None and os.path.isdir('/mnt/data'):
    for fn in os.listdir('/mnt/data'):
        if fn.endswith('.json'):
            _data_path = '/mnt/data/' + fn
            break
if _data_path is None:
    print("__RESULT_JSON_START__")
    print(json.dumps({"error": "Could not locate uploaded data file."}))
    print("__RESULT_JSON_END__")
    sys.exit(0)
with open(_data_path, 'r') as _f:
    DATA = json.load(_f)
study = DATA['study']
acbc_responses = DATA['acbcResponses']
HP = DATA['hyperparams']
W_CONSTRAINT = float(HP.get('w_constraint', 5.0))
ITERS  = int(HP.get('iters', 8000))
BURNIN = int(HP.get('burnin', 4000))
THIN   = int(HP.get('thin', 5))
PRIOR_VAR = float(HP.get('priorVar', 2.0))
SEED = int(HP.get('seed', 42))
rng = np.random.default_rng(SEED)

attrs = study['attributes']
cfg   = study['choiceConfig']
A = len(attrs)
levels_per_attr = [len(a['levels']) for a in attrs]
ref = [L - 1 for L in levels_per_attr]
attr_offsets, idx = [], 0
for L in levels_per_attr:
    attr_offsets.append(idx); idx += L - 1
p_attr = idx
p_total = p_attr + 1  # always include "None" intercept for ACBC

level_id_to_idx = [{l['id']: i for i, l in enumerate(a['levels'])} for a in attrs]
level_name_to_idx = [{l['name']: i for i, l in enumerate(a['levels'])} for a in attrs]
attr_id_to_idx = {a['id']: i for i, a in enumerate(attrs)}

def levels_from_profile(p_obj):
    if isinstance(p_obj, list): return list(p_obj)
    out = []
    for ai, a in enumerate(attrs):
        v = p_obj.get(a['id'])
        out.append(level_id_to_idx[ai].get(v, 0))
    return out

def to_row(levels):
    row = np.zeros(p_total)
    for ai, lv in enumerate(levels):
        if lv == ref[ai]: continue
        row[attr_offsets[ai] + (lv if lv < ref[ai] else lv - 1)] = 1
    return row

def softmax_lse(U):
    m = U.max()
    return m + np.log(np.exp(U - m).sum())

# Build per-respondent task lists in five families: tournament, screener,
# calibration, must-have, unacceptable. Each is a list of (X_alts, chosen_idx, weight)
# where X_alts has shape (J, p_total). For must-have/unacceptable, J=2.

respondents = acbc_responses['rows']
R = len(respondents)
if R == 0:
    print("__RESULT_JSON_START__"); print(json.dumps({"error":"No respondents."})); print("__RESULT_JSON_END__"); sys.exit(0)

per_resp_tasks = [[] for _ in range(R)]  # list of (X, chosen, weight)

for r_idx, resp in enumerate(respondents):
    bucket = per_resp_tasks[r_idx]

    # ---- Tournament: standard MNL choice ----
    for round_rec in (resp.get('tournament') or []):
        alts = round_rec.get('alternatives', [])
        if not alts: continue
        rows = np.stack([to_row(levels_from_profile(a['levels'])) for a in alts])
        # Append "None" row (zero except intercept) so we always have J ≥ 2 with constant size — but actually
        # tournament only has the explicit alts, no None. Don't pad with None here.
        chosen_pid = round_rec.get('chosenProfileId')
        chosen_i = next((i for i, a in enumerate(alts) if a.get('profileId') == chosen_pid), -1)
        if chosen_i < 0: continue
        bucket.append((rows, chosen_i, 1.0))

    # ---- Screener: binary "profile vs None" per profile ----
    None_row = np.zeros(p_total); None_row[-1] = 1
    for batch in ((resp.get('screener') or {}).get('batches') or []):
        for prof in batch.get('profiles', []):
            row = to_row(levels_from_profile(prof['levels']))
            resp_v = (prof.get('response') or '').lower()
            X = np.stack([row, None_row])
            if resp_v == 'yes':
                bucket.append((X, 0, 1.0))   # chose the profile (over None)
            elif resp_v == 'possibly':
                bucket.append((X, 0, 0.5))
            elif resp_v == 'no':
                bucket.append((X, 1, 1.0))   # chose None over the profile

    # ---- Calibration: soft-binary using P_target = (r - 0.5)/S ----
    S_scale = cfg.get('calibration', {}).get('scale', 7) if isinstance(cfg.get('calibration'), dict) else 7
    for cal in (resp.get('calibration') or []):
        rating = float(cal.get('rating', 0))
        if rating <= 0: continue
        row = to_row(levels_from_profile(cal['levels']))
        X = np.stack([row, None_row])
        P_target = (rating - 0.5) / float(S_scale if S_scale > 0 else 7)
        P_target = max(0.001, min(0.999, P_target))
        # Decompose soft choice into 2 weighted hard choices
        bucket.append((X, 0, float(P_target)))       # toward profile
        bucket.append((X, 1, float(1.0 - P_target))) # toward None

    # ---- Must-haves: synthetic 2-alt where the must-have level wins vs every other level ----
    for mh in ((resp.get('screener') or {}).get('mustHaves') or []):
        ai = attr_id_to_idx.get(mh.get('attrId'))
        if ai is None: continue
        li_must = level_id_to_idx[ai].get(mh.get('levelId'))
        if li_must is None: continue
        for li_other in range(levels_per_attr[ai]):
            if li_other == li_must: continue
            # Profiles: vary only this attribute, hold all others at reference
            base = [ref[a_i] for a_i in range(A)]
            p1 = list(base); p1[ai] = li_must
            p2 = list(base); p2[ai] = li_other
            X = np.stack([to_row(p1), to_row(p2)])
            bucket.append((X, 0, W_CONSTRAINT))  # must-have wins

    # ---- Unacceptables: synthetic 2-alt where the bad level loses ----
    for un in ((resp.get('screener') or {}).get('unacceptables') or []):
        ai = attr_id_to_idx.get(un.get('attrId'))
        if ai is None: continue
        li_bad = level_id_to_idx[ai].get(un.get('levelId'))
        if li_bad is None: continue
        for li_other in range(levels_per_attr[ai]):
            if li_other == li_bad: continue
            base = [ref[a_i] for a_i in range(A)]
            p1 = list(base); p1[ai] = li_bad
            p2 = list(base); p2[ai] = li_other
            X = np.stack([to_row(p1), to_row(p2)])
            bucket.append((X, 1, W_CONSTRAINT))  # alternative wins, bad level loses

def respondent_loglik(beta_r, tasks):
    if not tasks: return 0.0
    s = 0.0
    for X, chosen, w in tasks:
        U = X @ beta_r
        lse = softmax_lse(U)
        s += w * (U[chosen] - lse)
    return s

# ---- Run MCMC ----
print(f"ACBC HB: R={R}, mean tasks/resp={np.mean([len(t) for t in per_resp_tasks]):.1f}, p={p_total}", file=sys.stderr)
t0 = time.time()
beta = rng.normal(0, 0.05, (R, p_total))
mu = np.zeros(p_total)
Sigma = PRIOR_VAR * np.eye(p_total)
rw_scale = np.full(R, 0.1)
acc = np.zeros(R, dtype=int); prop = np.zeros(R, dtype=int)
postMean = np.zeros((R, p_total)); postM2 = np.zeros((R, p_total))
rlh_hist = np.zeros(ITERS, dtype=np.float32)
kept = 0
IW_DF = p_total + 3; IW_SCALE = IW_DF * np.eye(p_total); MU_PRIOR_VAR = 100.0

for it in range(ITERS):
    bbar = beta.mean(axis=0)
    Sigma_inv = inv(Sigma)
    post_prec_mu = R * Sigma_inv + (1.0 / MU_PRIOR_VAR) * np.eye(p_total)
    post_cov_mu  = inv(post_prec_mu)
    mu = rng.multivariate_normal(post_cov_mu @ (R * Sigma_inv @ bbar), post_cov_mu)
    diffs = beta - mu
    Sigma = invwishart.rvs(df=IW_DF + R, scale=IW_SCALE + diffs.T @ diffs, random_state=rng)
    Sigma_inv_cur = inv(Sigma)

    ll_total = 0.0
    for r in range(R):
        ll_cur = respondent_loglik(beta[r], per_resp_tasks[r])
        d_cur = beta[r] - mu
        lp_cur = -0.5 * d_cur @ Sigma_inv_cur @ d_cur
        prop_r = beta[r] + rw_scale[r] * rng.normal(size=p_total)
        ll_pr  = respondent_loglik(prop_r, per_resp_tasks[r])
        d_pr   = prop_r - mu
        lp_pr  = -0.5 * d_pr @ Sigma_inv_cur @ d_pr
        log_alpha = (ll_pr + lp_pr) - (ll_cur + lp_cur)
        prop[r] += 1
        if np.log(rng.uniform() + 1e-300) < log_alpha:
            beta[r] = prop_r; acc[r] += 1; ll_total += ll_pr
        else:
            ll_total += ll_cur
        if it < BURNIN and (it + 1) % 50 == 0:
            rate = acc[r] / max(1, prop[r])
            if rate < 0.2: rw_scale[r] *= 0.9
            elif rate > 0.45: rw_scale[r] *= 1.1
            rw_scale[r] = float(np.clip(rw_scale[r], 0.01, 2.0))

    n_obs = sum(len(t) for t in per_resp_tasks)
    rlh_hist[it] = float(np.exp(ll_total / max(1, n_obs)))
    if it >= BURNIN and (it - BURNIN) % THIN == 0:
        kept += 1
        delta = beta - postMean
        postMean += delta / kept
        postM2   += delta * (beta - postMean)

elapsed = time.time() - t0
postSD = np.sqrt(postM2 / max(1, kept - 1)) if kept > 1 else np.zeros_like(postM2)

per_resp = []
for r in range(R):
    by_attr = []
    for ai, L in enumerate(levels_per_attr):
        vec = []
        for li in range(L):
            if li == ref[ai]: vec.append(0.0)
            else:
                pidx = attr_offsets[ai] + (li if li < ref[ai] else li - 1)
                vec.append(float(postMean[r, pidx]))
        by_attr.append(vec)
    per_resp.append(by_attr)

mean_per_level = []; sd_per_level = []
for ai, L in enumerate(levels_per_attr):
    mvec, svec = [], []
    for li in range(L):
        vals = [per_resp[r][ai][li] for r in range(R)]
        mvec.append(float(np.mean(vals))); svec.append(float(np.std(vals, ddof=1)) if R > 1 else 0.0)
    mean_per_level.append(mvec); sd_per_level.append(svec)

importance = [0.0] * A
for r in range(R):
    ranges = [max(per_resp[r][ai]) - min(per_resp[r][ai]) for ai in range(A)]
    tot = sum(ranges) or 1.0
    for ai in range(A):
        importance[ai] += (ranges[ai] / tot) / R

result = {
    "engine": "python-openai-code-interpreter-acbc",
    "elapsedSec": float(elapsed),
    "iters": ITERS, "burnin": BURNIN, "thin": THIN, "priorVar": PRIOR_VAR,
    "wConstraint": W_CONSTRAINT,
    "finalRLH": float(rlh_hist[-1]),
    "pctCertainty": float((rlh_hist[-1] - 0.333) / (1.0 - 0.333) * 100),  # approx — J varies across families
    "rlhHistory": [float(x) for x in rlh_hist[::max(1, ITERS // 200)]],
    "individualUtilities": postMean.flatten().tolist(),
    "individualSDs": postSD.flatten().tolist(),
    "pTotal": p_total,
    "R": R,
    "totalTasks": int(sum(len(t) for t in per_resp_tasks)),
    "utilityStructure": {
        "perResp": per_resp,
        "noneUtils": [float(postMean[r, -1]) for r in range(R)],
        "meanPerLevel": mean_per_level,
        "sdPerLevel": sd_per_level,
        "importance": importance
    },
    "respondents": [{"respId": r.get('respId', f'R{i}'), "seg": r.get('seg', {})} for i, r in enumerate(respondents)]
}
print("__RESULT_JSON_START__"); print(json.dumps(result)); print("__RESULT_JSON_END__")
`;

function estimatePythonACBCCost(study, model) {
  const rows = study.acbcResponses?.rows || [];
  const R = rows.length;
  // Data via Files API; input tokens are just the (larger) ACBC Python code.
  const tasksPerResp = 50;
  const codeTokens = 5000;
  const inputTokens = codeTokens;
  const outputTokens = R * 80 + 2000;
  const pricing = {
    'gpt-4o':      { input: 2.50 / 1e6, output: 10.00 / 1e6, session: 0.03 },
    'gpt-4o-mini': { input: 0.15 / 1e6, output: 0.60 / 1e6,  session: 0.03 },
    'gpt-4-turbo': { input: 10.0 / 1e6, output: 30.00 / 1e6, session: 0.03 },
    'o3-mini':     { input: 1.10 / 1e6, output: 4.40 / 1e6,  session: 0.03 }
  }[model] || { input: 2.5 / 1e6, output: 10.0 / 1e6, session: 0.03 };
  const cost = pricing.input * inputTokens + pricing.output * outputTokens + pricing.session;
  // ACBC has more tasks per respondent; sequential per-resp loop
  const iters = 8000;
  const seconds = 1.6 * (iters / 3000) * (R / 200) * (tasksPerResp / 12);
  return { inputTokens, outputTokens, cost, seconds: Math.max(15, seconds) };
}

async function runPythonACBC({ study, apiKey, model, hyperparams, onProgress, signal, fetchTimeoutMs, captureVerbose }) {
  if (!study.acbcResponses || !study.acbcResponses.rows?.length) {
    throw new Error('Missing prerequisites: ACBC response data (complete the previous step — upload your JSON file from the survey programmer, or click "Generate dataset using AI" for test data).');
  }
  const payload = {
    study: { attributes: study.attributes, choiceConfig: study.acbcConfig?.calibration ? { ...study.choiceConfig, calibration: study.acbcConfig.calibration } : study.choiceConfig },
    acbcResponses: study.acbcResponses,
    hyperparams
  };
  const { result } = await callOpenAICodeInterpreter({
    apiKey, model, code: PYTHON_ACBC_HB_REFERENCE, data: payload, onProgress, signal, fetchTimeoutMs, captureVerbose
  });
  return {
    iters: result.iters, burnin: result.burnin, thin: result.thin, priorVar: result.priorVar,
    rlhHistory: result.rlhHistory, finalRLH: result.finalRLH, pctCertainty: result.pctCertainty,
    convergenceSlope: 0,
    individualUtilities: result.individualUtilities, individualSDs: result.individualSDs,
    pTotal: result.pTotal, respondents: result.respondents,
    utilityStructure: result.utilityStructure, totalTasks: result.totalTasks,
    lca: null, engine: result.engine, elapsedSec: result.elapsedSec,
    keptDraws: null,  // Python pathway does not return per-respondent draws yet
    acbc: { wConstraint: result.wConstraint }
  };
}

/** Public entry point used by the StepAnalysis "Run with Python" button.
 *  Returns an AnalysisBundle in the same shape setAnalysis() expects, so the
 *  existing analysis tabs render unchanged. */
async function runPythonHB({ study, apiKey, model, hyperparams, onProgress, signal, fetchTimeoutMs, captureVerbose }) {
  const missing = [];
  if (!study.assignment) missing.push('respondent assignments (complete Step 6)');
  if (!study.responses || !study.responses.rows?.length) missing.push('response data (complete Step 7 — upload a file or click "Generate synthetic data")');
  if (missing.length) throw new Error('Missing prerequisites: ' + missing.join(' and ') + '. The rigorous Python analysis runs on uploaded response data; without it, there is nothing to estimate.');
  const payload = {
    study: {
      attributes: study.attributes,
      choiceConfig: study.choiceConfig
    },
    responses: study.responses,
    assignment: study.assignment,
    hyperparams
  };
  const { result } = await callOpenAICodeInterpreter({
    apiKey, model, code: PYTHON_HB_REFERENCE, data: payload, onProgress, signal, fetchTimeoutMs, captureVerbose
  });
  // Adapt to AnalysisBundle shape (matches the JS HB result for tab rendering)
  return {
    iters: result.iters, burnin: result.burnin, thin: result.thin, priorVar: result.priorVar,
    rlhHistory: result.rlhHistory,
    finalRLH: result.finalRLH,
    pctCertainty: result.pctCertainty,
    convergenceSlope: 0,  // not tracked from Python (cheap to add later)
    individualUtilities: result.individualUtilities,
    individualSDs: result.individualSDs,
    pTotal: result.pTotal,
    respondents: result.respondents,
    utilityStructure: result.utilityStructure,
    totalTasks: result.totalTasks,
    lca: null,
    engine: result.engine,
    elapsedSec: result.elapsedSec,
    keptDraws: null  // Python pathway does not return per-respondent draws yet
  };
}

// ---- React component: "Run with Python" button + modal ----------------
function PythonAnalysisRunner({ study, onComplete, kind = 'cbc' }) {
  const [open, setOpen] = useState(false);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('cbc_openai_key') || '');
  const [model, setModel] = useState('gpt-4o');
  const [iters, setIters] = useState(DEFAULTS.hb.iters * 2);
  const [burnin, setBurnin] = useState(DEFAULTS.hb.burnin * 2);
  const [thin, setThin] = useState(DEFAULTS.hb.thin);
  const [priorVar, setPriorVar] = useState(DEFAULTS.hb.priorVar);
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState('');
  const [error, setError] = useState(null);
  const [doneMsg, setDoneMsg] = useState(null);
  const [elapsed, setElapsed] = useState(0); // seconds since fetch started
  const [quickTest, setQuickTest] = useState(false);
  const [verbose, setVerbose] = useState(false);
  const [fetchTimeoutSec, setFetchTimeoutSec] = useState(120);
  const [verboseLog, setVerboseLog] = useState({ request: '', response: '' });
  const abortRef = useRef(null);
  const timerRef = useRef(null);
  const hardTimeoutRef = useRef(null);

  const estimate = useMemo(() => estimatePythonHBCost(study, model), [study, model]);

  // Tick elapsed seconds while running
  useEffect(() => {
    if (running) {
      const start = Date.now();
      timerRef.current = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000)), 250);
      return () => { clearInterval(timerRef.current); timerRef.current = null; };
    } else {
      setElapsed(0);
    }
  }, [running]);

  // Auto-abort at the 5-minute hard timeout
  useEffect(() => {
    if (!running) return;
    hardTimeoutRef.current = setTimeout(() => {
      abortRef.current?.abort();
      setError("5 minute hard timeout reached. The OpenAI sandbox usually completes in 30-90s. Common causes: GPT-4o-mini struggling with a large study (try gpt-4o), or transient OpenAI orchestration delay (try again).");
    }, 5 * 60 * 1000);
    return () => clearTimeout(hardTimeoutRef.current);
  }, [running]);

  const run = async () => {
    if (!apiKey) { setError('Enter your OpenAI API key.'); return; }
    localStorage.setItem('cbc_openai_key', apiKey);
    setRunning(true); setError(null); setDoneMsg(null); setVerboseLog({ request: '', response: '' });
    const controller = new AbortController();
    abortRef.current = controller;
    const captureVerbose = verbose ? {} : null;
    try {
      const useHP = quickTest
        ? { iters: 200, burnin: 100, thin: 5, priorVar: 2, seed: 42 }
        : { iters, burnin, thin, priorVar, seed: 42 };
      const bundle = await runPythonHB({
        study, apiKey, model,
        hyperparams: useHP,
        onProgress: setProgress,
        signal: controller.signal,
        fetchTimeoutMs: fetchTimeoutSec * 1000,
        captureVerbose
      });
      onComplete(bundle);
      setDoneMsg(`Done in ${bundle.elapsedSec.toFixed(1)}s of Python time. R=${bundle.respondents.length}, final RLH ${bundle.finalRLH.toFixed(3)}.${quickTest ? ' (Quick test — for production use, untick Quick test and re-run with full chain.)' : ''}`);
      if (!verbose) setTimeout(() => setOpen(false), 2000);
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      if (captureVerbose) {
        setVerboseLog({
          request: captureVerbose.request || '(no request captured — error occurred before request was built)',
          response: captureVerbose.response || '(no response received)'
        });
      }
      setRunning(false);
      abortRef.current = null;
    }
  };

  const cancelRun = () => {
    abortRef.current?.abort();
  };

  const elapsedMins = Math.floor(elapsed / 60);
  const elapsedSecs = elapsed % 60;
  const elapsedStr = `${elapsedMins}:${elapsedSecs.toString().padStart(2, '0')}`;
  const showSoftWarning = running && elapsed >= 120;

  const prereqMsg = !study.assignment
    ? 'Complete Step 6 (Assignment) first.'
    : (!study.responses || !study.responses.rows?.length)
      ? 'Upload response data in Step 7 first (or use "Generate synthetic data" to create test data).'
      : '';

  return (
    <>
      <Button variant="secondary" onClick={() => setOpen(true)} disabled={!!prereqMsg} title={prereqMsg || ''}>
        Run with Python (rigorous mode){prereqMsg ? ' — disabled' : ''}
      </Button>
      {open && (
        <div className="fixed inset-0 z-50 bg-slate-900/50 flex items-center justify-center p-6" onClick={() => !running && setOpen(false)}>
          <div className="bg-white rounded-xl max-w-2xl w-full shadow-xl" onClick={e => e.stopPropagation()}>
            <div className="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
              <div>
                <h3 className="font-semibold text-slate-900">Run analysis with production Python</h3>
                <div className="text-xs text-slate-500">
                  Uploads data + sends numpy HB script to OpenAI's Code Interpreter sandbox.
                  Returns results in the same format as the browser HB so the analysis tabs render normally.
                </div>
              </div>
              <button onClick={() => !running && setOpen(false)} className="text-slate-400 hover:text-slate-700 text-lg">✕</button>
            </div>
            <div className="p-5 space-y-4">
              <Advisory level="warn">
                <strong>Experimental — not currently operational.</strong> This pathway requires OpenAI's Responses API
                with code_interpreter, which has not completed successfully on the current account tier. Requests are
                accepted but no response returns within the 120-second window. The <strong>browser HB button</strong> on
                this same step produces equivalent results (validated head-to-head at r = 0.986 against numpy/scipy) —
                use that for now. See Docs § 2.8 for full status and re-enablement options.
              </Advisory>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                <TextInput label="OpenAI API key" type="password" placeholder="sk-…" value={apiKey} onChange={e => setApiKey(e.target.value)} className="md:col-span-2" disabled={running} />
                <Select label="Model" value={model} onChange={setModel} options={CFA_MODELS} disabled={running} />
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                <NumberInput label="Iterations" value={iters} onChange={v => setIters(Number(v || 0))} disabled={running} />
                <NumberInput label="Burn-in"    value={burnin} onChange={v => setBurnin(Number(v || 0))} disabled={running} />
                <NumberInput label="Thinning"   value={thin}   onChange={v => setThin(Number(v || 1))} disabled={running} />
                <NumberInput label="Prior variance" value={priorVar} step={0.5} onChange={v => setPriorVar(Number(v || 1))} disabled={running} />
              </div>
              <div className="border border-slate-200 rounded-lg p-3 space-y-2 bg-slate-50">
                <div className="text-xs font-medium text-slate-700">Diagnostics</div>
                <label className="flex items-start gap-2 text-xs text-slate-700 cursor-pointer">
                  <input type="checkbox" checked={quickTest} onChange={e => setQuickTest(e.target.checked)} disabled={running} className="mt-0.5" />
                  <span>
                    <strong>Quick test (200 iters / 100 burn-in).</strong> Use this first if the full run hangs. It verifies the OpenAI API round-trip end-to-end in under a minute. If even quick-test hangs &gt; 90s, the API call itself is broken (most likely an access or format issue) — not your study or Python.
                  </span>
                </label>
                <label className="flex items-start gap-2 text-xs text-slate-700 cursor-pointer">
                  <input type="checkbox" checked={verbose} onChange={e => setVerbose(e.target.checked)} disabled={running} className="mt-0.5" />
                  <span>
                    <strong>Verbose mode.</strong> Capture the full request body (API key redacted) and full response from OpenAI in a copyable textarea below. Use this when something looks wrong so we can see exactly what's happening.
                  </span>
                </label>
                <div className="flex items-center gap-2 text-xs text-slate-700">
                  <span><strong>Fetch timeout:</strong></span>
                  <input type="number" value={fetchTimeoutSec} onChange={e => setFetchTimeoutSec(Math.max(30, Number(e.target.value) || 120))} disabled={running} min={30} max={300} className="w-20 px-2 py-1 border border-slate-300 rounded text-xs tabular" />
                  <span className="text-slate-500">seconds (default 120). Below this, the request is aborted with a timeout error.</span>
                </div>
              </div>
              <Advisory level="info">
                <div className="space-y-1">
                  <div><strong>Estimated cost:</strong> ${'≈'} ${(quickTest ? estimate.cost * 0.05 : estimate.cost).toFixed(2)} per run.</div>
                  <div><strong>Estimated runtime:</strong> ~{quickTest ? '5–15' : Math.round(estimate.seconds)}s of Python execution, plus 10–40s of OpenAI sandbox cold-start + orchestration. Typical end-to-end: {quickTest ? '20–60' : '30–120'}s.</div>
                  <div className="text-xs text-slate-600 mt-1">Use rigorous mode for the full rulebook chain length (20k/10k). For prototyping, browser HB is faster and free.</div>
                </div>
              </Advisory>
              {running && (
                <div className="bg-slate-50 rounded-lg p-4 border border-slate-200">
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2 text-sm">
                      <Spinner />
                      <span className="text-slate-700">{progress || 'Working…'}</span>
                    </div>
                    <div className="tabular text-sm text-slate-600">{elapsedStr}</div>
                  </div>
                  <div className="w-full bg-slate-200 rounded-full h-1.5 mb-1">
                    {/* visual heuristic — assume ~60s typical, cap at 100% */}
                    <div className="bg-blue-600 h-1.5 rounded-full transition-all" style={{ width: Math.min(100, (elapsed / 60) * 100) + '%' }} />
                  </div>
                  <div className="text-xs text-slate-500">
                    Typical: 30–90s. 5-minute hard timeout. Phase ordering: upload data → cold-start sandbox → run Python → return result.
                  </div>
                </div>
              )}
              {showSoftWarning && (
                <Advisory level="warn">
                  Still running at {elapsedStr}. This is on the slow end but not necessarily broken — OpenAI's code interpreter can occasionally
                  take 2+ minutes to start on large studies or after a quiet period. If it crosses 3 minutes, cancel and retry; the second attempt almost always works.
                </Advisory>
              )}
              {error && <Advisory level="danger">{error}</Advisory>}
              {doneMsg && <Advisory level="success">{doneMsg}</Advisory>}
              {verbose && (verboseLog.request || verboseLog.response) && (
                <details open className="border border-slate-200 rounded-lg p-3 bg-slate-50">
                  <summary className="text-xs font-medium text-slate-700 cursor-pointer">Verbose log (request + response)</summary>
                  <div className="mt-3 space-y-3">
                    <div>
                      <div className="text-[10px] uppercase tracking-wide text-slate-500 mb-1">Request body</div>
                      <textarea readOnly className="w-full h-32 px-2 py-1 border border-slate-300 rounded text-[10px] font-mono bg-white" value={verboseLog.request} />
                    </div>
                    <div>
                      <div className="text-[10px] uppercase tracking-wide text-slate-500 mb-1">Response body</div>
                      <textarea readOnly className="w-full h-40 px-2 py-1 border border-slate-300 rounded text-[10px] font-mono bg-white" value={verboseLog.response} />
                    </div>
                  </div>
                </details>
              )}
            </div>
            <div className="px-5 py-3 border-t border-slate-200 flex items-center justify-end gap-2">
              {running ? (
                <Button variant="danger" onClick={cancelRun}>Cancel run</Button>
              ) : (
                <>
                  <Button variant="ghost" onClick={() => setOpen(false)}>Close</Button>
                  <Button onClick={run}>{quickTest ? 'Run quick test' : 'Run rigorous HB'}</Button>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ========================================================================
// SECTION 11 — STEP 2: ATTRIBUTES & LEVELS + PROHIBITED PAIRS
// ========================================================================
function StepAttributes() {
  const { study, setAttributes, setProhibitions } = useContext(StudyContext);
  const attrs = study.attributes || [];
  const prohibitions = study.prohibitions || [];
  const [feedbackOpen, setFeedbackOpen] = useState(false);
  const locked = study.source === 'external';

  const addAttribute = () => {
    setAttributes([...attrs, {
      id: uid(), name: '', type: 'categorical',
      isPrice: false, levels: [{ id: uid(), name: '' }, { id: uid(), name: '' }, { id: uid(), name: '' }]
    }]);
  };
  const updateAttr = (id, patch) => setAttributes(attrs.map(a => a.id === id ? { ...a, ...patch } : a));
  const removeAttr = (id) => {
    setAttributes(attrs.filter(a => a.id !== id));
    setProhibitions(prohibitions.filter(p => p.attrA !== idx(id) && p.attrB !== idx(id)));
  };
  const idx = (id) => attrs.findIndex(a => a.id === id);
  const moveAttr = (id, dir) => {
    const i = idx(id);
    const j = i + dir;
    if (j < 0 || j >= attrs.length) return;
    const next = attrs.slice();
    [next[i], next[j]] = [next[j], next[i]];
    setAttributes(next);
    setProhibitions([]); // invalidate indices; user can re-add
  };
  const addLevel = (aid) => {
    const a = attrs.find(x => x.id === aid);
    updateAttr(aid, { levels: [...a.levels, { id: uid(), name: '' }] });
  };
  const removeLevel = (aid, lid) => {
    const a = attrs.find(x => x.id === aid);
    if (a.levels.length <= 2) return;
    updateAttr(aid, { levels: a.levels.filter(l => l.id !== lid) });
  };
  const updateLevel = (aid, lid, name) => {
    const a = attrs.find(x => x.id === aid);
    updateAttr(aid, { levels: a.levels.map(l => l.id === lid ? { ...l, name } : l) });
  };
  const togglePrice = (aid) => {
    setAttributes(attrs.map(a => a.id === aid ? { ...a, isPrice: !a.isPrice } : { ...a, isPrice: false }));
  };
  const setType = (aid, type) => updateAttr(aid, { type });

  const factorial = fullFactorialSize(attrs);
  const prohibFrac = useMemo(() => countProhibitedFraction(attrs, prohibitions), [attrs, prohibitions]);
  const viableCount = Math.round(factorial * (1 - prohibFrac));

  // Advisories
  const advisories = [];
  if (attrs.length > 0 && attrs.length < DEFAULTS.attributeCount.softMin)
    advisories.push({ level: 'warn', msg: 'Studies with fewer than 3 attributes may not provide sufficient discrimination between product profiles. Consider whether additional attributes would better capture the tradeoff decisions your respondents face.' });
  if (attrs.length > DEFAULTS.attributeCount.softMax)
    advisories.push({ level: 'warn', msg: 'Studies with more than 8 attributes can cause respondent cognitive overload and reduce data quality. Consider consolidating related attributes or running a separate MaxDiff study to prioritize attributes before the conjoint.' });
  attrs.forEach(a => {
    if (a.levels.length > DEFAULTS.levelCount.softMax)
      advisories.push({ level: 'warn', msg: `"${a.name || 'Attribute'}" has ${a.levels.length} levels. Attributes with more than 5 levels require more profiles to achieve level balance, which increases respondent burden or reduces design efficiency. Consider whether adjacent levels can be consolidated.` });
  });
  if (factorial > 200)
    advisories.push({ level: 'info', msg: `Your design has ${factorial.toLocaleString()} possible profiles. The tool will generate an efficient fractional factorial design — this is standard practice and does not compromise analysis quality.` });
  if (viableCount < 20 && factorial > 0)
    advisories.push({ level: 'danger', msg: `After applying prohibited combinations, only ~${viableCount} viable profiles remain. This may not be sufficient for a robust experimental design. Consider relaxing some prohibitions.` });
  if (prohibFrac > 0.5)
    advisories.push({ level: 'danger', msg: `More than half of possible profiles are prohibited (${Math.round(prohibFrac*100)}%). The tool may not be able to generate a design with acceptable efficiency. Strongly recommend reducing prohibitions.` });
  else if (prohibFrac > 0.3)
    advisories.push({ level: 'warn', msg: `Prohibited combinations have eliminated ${Math.round(prohibFrac*100)}% of possible profiles. Design efficiency may be significantly reduced. Review your prohibitions to ensure all are strictly necessary.` });

  // Prohibitions editor
  const addProhibition = () => {
    if (attrs.length < 2) return;
    setProhibitions([...prohibitions, {
      id: uid(), attrA: 0, levelA: 0, attrB: 1, levelB: 0, note: ''
    }]);
  };
  const updateProhibition = (id, patch) => setProhibitions(prohibitions.map(p => p.id === id ? { ...p, ...patch } : p));
  const removeProhibition = (id) => setProhibitions(prohibitions.filter(p => p.id !== id));

  return (
    <div>
      <h2 className="text-2xl font-semibold text-slate-900 mb-1">Attributes & Levels</h2>
      <p className="text-slate-500 text-sm mb-6">Define the product attributes respondents will evaluate. Recommended: 4–6 attributes with 3–4 levels each.</p>

      {locked && <Advisory level="info" className="mb-5"><strong>Imported study.</strong> Adding, removing, or reordering attributes and levels is locked to keep the uploaded responses matched to the vendor design. You can still <strong>rename</strong> attributes and levels here, and set display labels on Card Preview.</Advisory>}

      {advisories.length > 0 && (
        <div className="mb-5 space-y-2">
          {advisories.map((a, i) => <Advisory key={i} level={a.level}>{a.msg}</Advisory>)}
        </div>
      )}

      <div className="space-y-4 mb-6">
        {attrs.map((a, ai) => (
          <div key={a.id} className="bg-white border border-slate-200 rounded-xl p-4 card-shadow">
            <div className="flex items-center gap-3 mb-3">
              <div className="flex flex-col">
                <button className="text-slate-400 hover:text-slate-700 text-xs disabled:opacity-30" onClick={() => moveAttr(a.id, -1)} disabled={ai === 0 || locked}>▲</button>
                <button className="text-slate-400 hover:text-slate-700 text-xs disabled:opacity-30" onClick={() => moveAttr(a.id, 1)} disabled={ai === attrs.length - 1 || locked}>▼</button>
              </div>
              <div className="w-8 h-8 rounded-lg bg-slate-100 text-slate-600 text-xs font-semibold flex items-center justify-center">{ai + 1}</div>
              <input
                className="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400"
                placeholder="Attribute name (e.g., Progression-Free Survival)"
                value={a.name} onChange={e => updateAttr(a.id, { name: e.target.value })}
              />
              <Select value={a.type} onChange={v => setType(a.id, v)} options={[
                { value: 'categorical', label: 'Categorical' },
                { value: 'continuous', label: 'Continuous' }
              ]} className="w-36" />
              <label className="flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer">
                <input type="checkbox" checked={!!a.isPrice} onChange={() => togglePrice(a.id)} /> Price
              </label>
              <button className="text-slate-400 hover:text-red-600 disabled:opacity-30" onClick={() => removeAttr(a.id)} disabled={locked} title="Remove">✕</button>
            </div>
            <div className="pl-12 grid grid-cols-1 md:grid-cols-2 gap-2">
              {a.levels.map((l, li) => (
                <div key={l.id} className="flex items-center gap-2">
                  <div className="text-xs text-slate-400 w-6 text-right">{li + 1}.</div>
                  <input
                    className="flex-1 px-3 py-1.5 border border-slate-200 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400"
                    placeholder={`Level ${li + 1} (e.g., 12 months median PFS)`}
                    value={l.name} onChange={e => updateLevel(a.id, l.id, e.target.value)}
                  />
                  <button className="text-slate-300 hover:text-red-500 text-xs disabled:opacity-30" onClick={() => removeLevel(a.id, l.id)} disabled={a.levels.length <= 2 || locked} title="Remove level">✕</button>
                </div>
              ))}
              {!locked && <button className="text-xs text-blue-600 hover:text-blue-700 text-left pl-8" onClick={() => addLevel(a.id)}>+ Add level</button>}
            </div>
          </div>
        ))}
      </div>

      <div className="flex items-center gap-2">
        <Button onClick={addAttribute} variant="secondary" disabled={attrs.length >= DEFAULTS.attributeCount.hardMax || locked}>+ Add attribute</Button>
        <Button onClick={() => setFeedbackOpen(true)} variant="secondary" disabled={locked}>Update from client feedback…</Button>
      </div>
      <ClientFeedbackAgent open={feedbackOpen} onClose={() => setFeedbackOpen(false)} />

      <div className="mt-10">
        <div className="flex items-center justify-between mb-3">
          <div>
            <h3 className="font-semibold text-slate-900">Prohibited combinations</h3>
            <p className="text-xs text-slate-500">Pairs of attribute levels that should never appear together on the same product card.</p>
          </div>
          <Button variant="secondary" onClick={addProhibition} disabled={attrs.length < 2 || locked}>+ Add rule</Button>
        </div>

        {prohibitions.length === 0 ? (
          <div className="text-sm text-slate-400 italic py-4 border border-dashed border-slate-200 rounded-lg text-center">No prohibitions defined.</div>
        ) : (
          <div className="space-y-2">
            {prohibitions.map((p) => (
              <div key={p.id} className="bg-white border border-slate-200 rounded-lg p-3 flex flex-wrap items-center gap-2">
                <span className="text-xs text-slate-500 shrink-0">Cannot combine</span>
                <Select value={String(p.attrA)} onChange={v => updateProhibition(p.id, { attrA: Number(v), levelA: 0 })} options={attrs.map((a, i) => ({ value: String(i), label: a.name || `Attr ${i+1}` }))} className="w-40" />
                <span className="text-xs text-slate-400">=</span>
                <Select value={String(p.levelA)} onChange={v => updateProhibition(p.id, { levelA: Number(v) })} options={(attrs[p.attrA]?.levels || []).map((l, i) => ({ value: String(i), label: l.name || `Level ${i+1}` }))} className="w-40" />
                <span className="text-xs text-slate-500">with</span>
                <Select value={String(p.attrB)} onChange={v => updateProhibition(p.id, { attrB: Number(v), levelB: 0 })} options={attrs.map((a, i) => ({ value: String(i), label: a.name || `Attr ${i+1}` }))} className="w-40" />
                <span className="text-xs text-slate-400">=</span>
                <Select value={String(p.levelB)} onChange={v => updateProhibition(p.id, { levelB: Number(v) })} options={(attrs[p.attrB]?.levels || []).map((l, i) => ({ value: String(i), label: l.name || `Level ${i+1}` }))} className="w-40" />
                <input className="flex-1 min-w-[120px] px-2 py-1 border border-slate-200 rounded text-xs"
                  placeholder="Note / justification (optional)" value={p.note || ''} onChange={e => updateProhibition(p.id, { note: e.target.value })} />
                <button className="text-slate-400 hover:text-red-600" onClick={() => removeProhibition(p.id)}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {attrs.length >= 2 && (
        <div className="mt-8 bg-slate-100 rounded-xl p-4 text-sm">
          <div className="flex items-center gap-6 text-slate-700 tabular">
            <div><span className="text-slate-500 text-xs">Full factorial:</span> <strong>{factorial.toLocaleString()}</strong> profiles</div>
            <div><span className="text-slate-500 text-xs">Viable after prohibitions:</span> <strong>{viableCount.toLocaleString()}</strong> ({Math.round((1-prohibFrac)*100)}%)</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ========================================================================
// SECTION 12 — STEP 3: CHOICE TASK CONFIGURATION + LIVE PREVIEW
// ========================================================================
function ChoiceTaskPreview({ study, sampleProfiles }) {
  const cfg = study.choiceConfig;
  const attrs = study.attributes;
  const cs = study.cardStyle || {};
  const displayName = (attr) => cs.attributeDisplayNames?.[attr.id] || attr.name || 'Attribute';
  const displayLevel = (attr, li) => {
    const ov = cs.levelDisplayNames?.[attr.id]?.[attr.levels[li]?.id];
    return ov || attr.levels[li]?.name || `Level ${li + 1}`;
  };

  const cards = [];
  for (let j = 0; j < cfg.altsPerTask; j++) {
    cards.push({ label: `Product ${String.fromCharCode(65 + j)}`, profile: sampleProfiles[j] });
  }
  if (cfg.includeSoC && cfg.socProfile) cards.push({ label: cfg.socLabel, profile: cfg.socProfile, soc: true });

  return (
    <div className="flex gap-3 overflow-x-auto scroll-thin pb-2">
      {cards.map((c, i) => (
        <div key={i} className={`card-preview p-4 w-60 shrink-0 ${c.soc ? 'border-indigo-300 bg-indigo-50/30' : ''}`}>
          <div className={`text-center font-semibold mb-3 ${c.soc ? 'text-indigo-700' : 'text-slate-800'}`}>{c.label}</div>
          <div className="space-y-2">
            {attrs.map((a, ai) => (
              <div key={a.id} className="text-xs">
                <div className="text-slate-500 uppercase tracking-wide text-[10px]">{displayName(a)}</div>
                <div className="text-slate-800 font-medium">{displayLevel(a, c.profile[ai])}</div>
              </div>
            ))}
          </div>
          <button className="mt-4 w-full py-1.5 text-xs border border-slate-300 rounded hover:bg-slate-100">Select {c.label}</button>
        </div>
      ))}
      {cfg.includeNone && (
        <div className="card-preview p-4 w-48 shrink-0 bg-slate-50 flex flex-col items-center justify-center text-center">
          <div className="text-xs text-slate-500 mb-2">If none are acceptable:</div>
          <button className="py-2 px-3 text-xs border border-slate-300 rounded hover:bg-slate-100">{cfg.noneLabel || 'None of these'}</button>
        </div>
      )}
    </div>
  );
}

function StepChoice() {
  const { study, setChoice } = useContext(StudyContext);
  const cfg = study.choiceConfig;
  const attrs = study.attributes || [];
  const locked = study.source === 'external';

  const advisories = [];
  if (cfg.altsPerTask === 2) advisories.push({ level: 'info', msg: 'Two-alternative forced choice designs are statistically valid but provide less information per task. Consider whether 3 alternatives would be feasible for your respondent population.' });
  if (cfg.altsPerTask === 5) advisories.push({ level: 'warn', msg: 'Choice tasks with 5 alternatives place significant cognitive burden on respondents. Recommended only for respondent populations highly familiar with the product category.' });
  if (cfg.tasksPerRespondent < DEFAULTS.tasks.advisoryLow) advisories.push({ level: 'info', msg: 'Fewer than 8 choice tasks per respondent may reduce the precision of individual-level utility estimates. Consider increasing to at least 10 if respondent fatigue is not a primary concern.' });
  if (cfg.tasksPerRespondent > DEFAULTS.tasks.advisoryHigh) advisories.push({ level: 'warn', msg: 'More than 15 choice tasks may cause respondent fatigue, leading to satisficing behavior in later tasks. Consider reducing to 12–14.' });

  // Generate sample profiles for preview — random but feasible
  const sampleProfiles = useMemo(() => {
    const rng = makeRng(Date.now() & 0xff);
    const out = [];
    for (let j = 0; j < 5; j++) {
      let p, tries = 0;
      do {
        p = attrs.map(a => Math.floor(rng() * a.levels.length));
        tries++;
      } while (tries < 20 && profileViolatesProhibition(p, study.prohibitions || []));
      out.push(p);
    }
    return out;
  }, [attrs.map(a => a.levels.length).join(','), (study.prohibitions || []).length]);

  const setSoCLevel = (ai, li) => {
    const base = cfg.socProfile || attrs.map(() => 0);
    const next = base.slice();
    next[ai] = li;
    setChoice({ socProfile: next });
  };

  return (
    <div>
      <h2 className="text-2xl font-semibold text-slate-900 mb-1">Choice Task Configuration</h2>
      <p className="text-slate-500 text-sm mb-6">Configure the structure of each choice task respondents will see.</p>

      {locked && <Advisory level="info" className="mb-5"><strong>Imported study.</strong> Choice-task structure is locked — it must match the uploaded vendor design and responses.</Advisory>}

      {advisories.length > 0 && <div className="mb-5 space-y-2">{advisories.map((a, i) => <Advisory key={i} level={a.level}>{a.msg}</Advisory>)}</div>}

      <fieldset disabled={locked} className={`border-0 p-0 m-0 ${locked ? 'opacity-60' : ''}`}>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
        <NumberInput label={`Alternatives per choice task (${DEFAULTS.alternatives.min}–${DEFAULTS.alternatives.max})`} value={cfg.altsPerTask} min={DEFAULTS.alternatives.min} max={DEFAULTS.alternatives.max} onChange={v => setChoice({ altsPerTask: clamp(v || 3, DEFAULTS.alternatives.min, DEFAULTS.alternatives.max) })} help="Number of test product cards shown side by side." />
        <NumberInput label={`Tasks per respondent (${DEFAULTS.tasks.min}–${DEFAULTS.tasks.max})`} value={cfg.tasksPerRespondent} min={DEFAULTS.tasks.min} max={DEFAULTS.tasks.max} onChange={v => setChoice({ tasksPerRespondent: clamp(v || 12, DEFAULTS.tasks.min, DEFAULTS.tasks.max) })} help="How many choice tasks each respondent will complete." />

        <div className="space-y-3">
          <Toggle label="Include 'None of these' option" help="Lets respondents reject all presented alternatives." checked={!!cfg.includeNone} onChange={v => setChoice({ includeNone: v })} />
          {cfg.includeNone && <TextInput label="'None' label" value={cfg.noneLabel || ''} onChange={e => setChoice({ noneLabel: e.target.value })} />}
        </div>

        <div className="space-y-3">
          <Toggle label="Include 'Current Standard of Care' comparator" help="A fixed reference product shown in every task." checked={!!cfg.includeSoC} onChange={v => setChoice({ includeSoC: v, socProfile: v ? (cfg.socProfile || attrs.map(() => 0)) : null })} />
          {cfg.includeSoC && <TextInput label="SoC label" value={cfg.socLabel || ''} onChange={e => setChoice({ socLabel: e.target.value })} />}
        </div>

        <Toggle className="md:col-span-2" label="Dual-response format" help="Follow each forced choice with a 5-point purchase intent question for the chosen product (used to calibrate the 'None' threshold)." checked={!!cfg.dualResponse} onChange={v => setChoice({ dualResponse: v })} />
      </div>

      {cfg.includeSoC && (
        <Card title="Standard of Care profile" className="mb-6">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {attrs.map((a, ai) => (
              <Select key={a.id} label={a.name || `Attribute ${ai+1}`}
                value={String((cfg.socProfile || [])[ai] ?? 0)}
                onChange={v => setSoCLevel(ai, Number(v))}
                options={a.levels.map((l, li) => ({ value: String(li), label: l.name || `Level ${li+1}` }))} />
            ))}
          </div>
        </Card>
      )}
      </fieldset>

      <Card title="Live preview of a single choice task">
        {attrs.length < 2 || attrs.some(a => a.levels.length < 2)
          ? <div className="text-sm text-slate-400 italic">Define at least 2 attributes with levels to see a preview.</div>
          : <ChoiceTaskPreview study={study} sampleProfiles={sampleProfiles} />}
      </Card>
    </div>
  );
}

function ProfileCard({ attrs, profile, label, cardStyle }) {

        {attrs.map((a, ai) => (
          <div key={a.id} className="text-xs">

            <div className="text-slate-800">{dl(a, profile[ai])}</div>
          </div>
        ))}

// Effort presets for the optimizer. See README for the math these translate into.
const EFFORT_PRESETS = {

  standard: { label: 'Standard', maxStarts: 50,  swapBudget: 15000, budgetMs: 30000,  desc: '~30s, 50 starts' },

function buildDesignWorker() {
  const src = document.getElementById('design-worker-src').textContent;
  const blob = new Blob([src], { type: 'application/javascript' });
