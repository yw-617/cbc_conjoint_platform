function buildHBPayload(study) {
  const attrs = study.attributes;
  const cfg = study.choiceConfig;
  const layout = buildParamLayout(attrs, cfg.includeNone);
  const includeNone = cfg.includeNone;
  const pTotal = layout.nPar;

  // Include only respondents with exclude === false
  const respondents = study.responses.rows.filter(r => !r.exclude);
  // Build assignment lookup: respId|taskNum -> {alts ordered by position, socOffset}
  const asgnByKey = {};
  study.assignment.rows.forEach(r => {
    const k = `${r.respId}|${r.taskNum}`;
    if (!asgnByKey[k]) asgnByKey[k] = [];
    asgnByKey[k].push(r);
  });

  const respOffsets = [0];
  const taskAlts = []; // each element: array of dummy rows, plus chosen index
  const chosen = [];
  const altCounts = [];
  let totalTasks = 0;

  respondents.forEach(resp => {
    const keys = Object.keys(resp.tasks).map(tn => `${resp.respId}|${tn}`);
    keys.forEach(k => {
      const alts = asgnByKey[k] || [];
      if (alts.length === 0) return;
      // Sort by position
      alts.sort((a, b) => a.position - b.position);
      const chosenPos = resp.tasks[Number(k.split('|')[1])];
      const chosenIdx = chosenPos === 0 ? -1 : alts.findIndex(a => a.position === chosenPos);
      if (chosenIdx === -2 || (chosenPos !== 0 && chosenIdx < 0)) return; // skip
      const rows = alts.map(a => profileToDummyRow(a.profile, attrs, layout));
      taskAlts.push(rows);
      chosen.push(chosenIdx);
      altCounts.push(rows.length);
      totalTasks++;
    });
    respOffsets.push(totalTasks);
  });

  // Flatten X
  let totalAlts = 0;
  altCounts.forEach(n => totalAlts += n);
  const X = new Float64Array(totalAlts * pTotal);
  const taskOffsets = new Int32Array(totalTasks + 1);
  let rowPtr = 0;
  taskAlts.forEach((rows, ti) => {
    taskOffsets[ti] = rowPtr;
    rows.forEach(r => {
      for (let k = 0; k < pTotal; k++) X[rowPtr * pTotal + k] = r[k];
      rowPtr++;
    });
  });
  taskOffsets[totalTasks] = rowPtr;

  return {
    X, altCounts: new Int32Array(altCounts), chosen: new Int32Array(chosen),
    respOffsets: new Int32Array(respOffsets), taskOffsets,
    R: respondents.length, nPar: pTotal, includeNone,
    respondents: respondents.map(r => ({ respId: r.respId, seg: r.seg }))
  };
}

// ----- Latent Class EM (main thread) -----
function runLCA(study, K, opts) {
  opts = opts || {};
  const attrs = study.attributes;
  const cfg = study.choiceConfig;
  const layout = buildParamLayout(attrs, cfg.includeNone);
  const nPar = layout.nPar;
  const respondents = study.responses.rows.filter(r => !r.exclude);
  const R = respondents.length;
  if (R === 0) return null;

  const asgnByKey = {};
  study.assignment.rows.forEach(r => {
    const k = `${r.respId}|${r.taskNum}`;
    if (!asgnByKey[k]) asgnByKey[k] = [];
    asgnByKey[k].push(r);
  });

  // For each respondent, build task matrices
  const respTasks = respondents.map(resp => {
    const tasks = [];
    Object.keys(resp.tasks).forEach(tn => {
      const alts = (asgnByKey[`${resp.respId}|${tn}`] || []).slice().sort((a, b) => a.position - b.position);
      if (!alts.length) return;
      const chosenPos = resp.tasks[Number(tn)];
      const chosenIdx = chosenPos === 0 ? -1 : alts.findIndex(a => a.position === chosenPos);
      if (chosenPos !== 0 && chosenIdx < 0) return;
      const rows = alts.map(a => profileToDummyRow(a.profile, attrs, layout));
      tasks.push({ rows, chosen: chosenIdx });
    });
    return tasks;
  });

  const rng = makeRng(opts.seed || 31337);

  const logProbTask = (task, beta) => {
    const u = task.rows.map(r => {
      let s = 0;
      for (let k = 0; k < nPar; k++) s += (cfg.includeNone && k === nPar - 1 ? 0 : beta[k] * r[k]);
      return s;
    });
    if (cfg.includeNone) u.push(beta[nPar - 1]);
    const lse = logSumExp(u);
    if (task.chosen === -1) return (cfg.includeNone ? u[u.length - 1] : -30) - lse;
    return u[task.chosen] - lse;
  };

  let best = null;

  const nStarts = opts.starts || 16;
  for (let st = 0; st < nStarts; st++) {
    // Initialize class betas with small random
    let betas = [];
    for (let k = 0; k < K; k++) {
      const b = new Float64Array(nPar);
      for (let j = 0; j < nPar; j++) b[j] = randn(rng) * 0.3;
      betas.push(b);
    }
    let pi = new Array(K).fill(1 / K);

    let prevLL = -Infinity;
    let ll = -Infinity;
    for (let iter = 0; iter < 80; iter++) {
      // E-step: compute log-likelihood of each respondent under each class
      const post = []; // R x K posterior probs
      let totalLL = 0;
      for (let r = 0; r < R; r++) {
        const logLikByK = new Array(K).fill(0);
        for (let k = 0; k < K; k++) {
          let sum = 0;
          respTasks[r].forEach(t => { sum += logProbTask(t, betas[k]); });
          logLikByK[k] = Math.log(pi[k] + 1e-300) + sum;
        }
        const lse = logSumExp(logLikByK);
        totalLL += lse;
        const p = logLikByK.map(x => Math.exp(x - lse));
        post.push(p);
      }
      ll = totalLL;

      // M-step (for class probs): pi_k = mean(post_k)
      const newPi = new Array(K).fill(0);
      for (let r = 0; r < R; r++) for (let k = 0; k < K; k++) newPi[k] += post[r][k];
      for (let k = 0; k < K; k++) newPi[k] /= R;
      pi = newPi;

      // M-step for betas: maximize sum_r post_r,k * LL(respondent r | beta_k)
      // Gradient step on each beta_k: closed-form MNL update is hard; use gradient ascent (a few Newton-like steps).
      for (let k = 0; k < K; k++) {
        for (let gstep = 0; gstep < 4; gstep++) {
          const grad = new Float64Array(nPar);
          const hess = new Float64Array(nPar); // diagonal Hessian approx
          for (let r = 0; r < R; r++) {
            const w = post[r][k];
            if (w < 1e-10) continue;
            respTasks[r].forEach(t => {
              const u = t.rows.map(row => {
                let s = 0;
                for (let j = 0; j < nPar; j++) s += (cfg.includeNone && j === nPar - 1 ? 0 : betas[k][j] * row[j]);
                return s;
              });
              if (cfg.includeNone) u.push(betas[k][nPar - 1]);
              const m = Math.max(...u);
              const ex = u.map(x => Math.exp(x - m));
              const denom = ex.reduce((s,x)=>s+x, 0);
              const p = ex.map(x => x / denom);
              // gradient for chosen c: x_c - sum_i p_i * x_i
              for (let j = 0; j < nPar; j++) {
                let eX = 0;
                for (let i = 0; i < t.rows.length; i++) {
                  const xij = (j === nPar - 1 && cfg.includeNone) ? 0 : t.rows[i][j];
                  eX += p[i] * xij;
                }
                if (cfg.includeNone) {
                  const xj = (j === nPar - 1) ? 1 : 0;
                  eX += p[p.length - 1] * xj;
                }
                let xc;
                if (t.chosen === -1) {
                  xc = (j === nPar - 1 && cfg.includeNone) ? 1 : 0;
                } else {
                  xc = (j === nPar - 1 && cfg.includeNone) ? 0 : t.rows[t.chosen][j];
                }
                grad[j] += w * (xc - eX);
                // Hess_{jj} += -w * (E[x^2] - E[x]^2)
                let eX2 = 0;
                for (let i = 0; i < t.rows.length; i++) {
                  const xij = (j === nPar - 1 && cfg.includeNone) ? 0 : t.rows[i][j];
                  eX2 += p[i] * xij * xij;
                }
                if (cfg.includeNone) {
                  const xj = (j === nPar - 1) ? 1 : 0;
                  eX2 += p[p.length - 1] * xj * xj;
                }
                hess[j] += -w * (eX2 - eX * eX);
              }
            });
          }
          // Update with damped Newton
          for (let j = 0; j < nPar; j++) {
            const h = hess[j];
            const step = (h < -1e-8) ? -grad[j] / h : grad[j] * 0.1;
            betas[k][j] += clamp(step, -1, 1);
          }
        }
      }
      if (Math.abs(ll - prevLL) < 0.001 * Math.abs(prevLL + 1)) break;
      prevLL = ll;
    }

    if (!best || ll > best.ll) {
      // Final assignment
      const post = [];
      for (let r = 0; r < R; r++) {
        const logLikByK = new Array(K).fill(0);
        for (let k = 0; k < K; k++) {
          let sum = 0;
          respTasks[r].forEach(t => { sum += logProbTask(t, betas[k]); });
          logLikByK[k] = Math.log(pi[k] + 1e-300) + sum;
        }
        const lse = logSumExp(logLikByK);
        post.push(logLikByK.map(x => Math.exp(x - lse)));
      }
      best = { K, betas: betas.map(b => Array.from(b)), pi, ll, post };
    }
  }

  // BIC / AIC
  const N = R;
  const nParTotal = K * nPar + (K - 1);
  best.bic = -2 * best.ll + nParTotal * Math.log(N);
  best.aic = -2 * best.ll + 2 * nParTotal;
  best.sizes = best.pi.map(p => Math.round(p * 100));
  return best;
}

function buildHBWorker() {
  const src = document.getElementById('hb-worker-src').textContent;
  const blob = new Blob([src], { type: 'application/javascript' });
  return new Worker(URL.createObjectURL(blob));
}

function utilityStructure(study, betaFlat, pTotal) {
  // Returns: perRespondent utility per level, including reference=0, for each attribute.
  const attrs = study.attributes;
  const layout = buildParamLayout(attrs, study.choiceConfig.includeNone);
  const R = Math.floor(betaFlat.length / pTotal);
  const perResp = []; // [R][attr][level] = utility
  for (let r = 0; r < R; r++) {
    const utils = attrs.map((a, ai) => {
      const ref = layout.attrRef[ai];
      const out = a.levels.map((_, li) => {
        if (li === ref) return 0;
        const paramIdx = layout.offsets[ai] + (li < ref ? li : li - 1);
        return betaFlat[r * pTotal + paramIdx];
      });
      return out;
    });
    perResp.push(utils);
  }
  const noneUtils = study.choiceConfig.includeNone
    ? range(R).map(r => betaFlat[r * pTotal + pTotal - 1])
    : null;
  // Aggregate means
  const meanPerLevel = attrs.map((a, ai) => a.levels.map((_, li) => mean(perResp.map(u => u[ai][li]))));
  const sdPerLevel = attrs.map((a, ai) => a.levels.map((_, li) => stdev(perResp.map(u => u[ai][li]))));
  // Importance per respondent then aggregate
  const importance = attrs.map(() => 0);
  perResp.forEach(utils => {
    const ranges = utils.map(u => Math.max(...u) - Math.min(...u));
    const tot = sum(ranges) || 1;
    ranges.forEach((r, ai) => { importance[ai] += (r / tot) / perResp.length; });
  });
  return { perResp, noneUtils, meanPerLevel, sdPerLevel, importance };
}

function StepAnalysis() {
  const { study, setAnalysis, setStatus } = useContext(StudyContext);
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(null);
  const [error, setError] = useState(null);
  const [iters, setIters] = useState(DEFAULTS.hb.iters);
  const [burnin, setBurnin] = useState(DEFAULTS.hb.burnin);
  const [thin, setThin] = useState(DEFAULTS.hb.thin);
  const [priorVar, setPriorVar] = useState(DEFAULTS.hb.priorVar);
  const [advancedOpen, setAdvancedOpen] = useState(false);
  const [activeTab, setActiveTab] = useState('importance');
  const [baseProfile, setBaseProfile] = useState(null);
  const [lcaRunning, setLcaRunning] = useState(false);

  const a = study.analysis;

  const runHB = async () => {
    setRunning(true); setError(null); setProgress(null);
    try {
      const payload = buildHBPayload(study);
      if (payload.R === 0) throw new Error('No respondents after exclusions.');
      const worker = buildHBWorker();
      worker.onmessage = (e) => {
        const m = e.data;
        if (m.type === 'progress') {
          setProgress({ iter: m.iter, rlh: m.rlh, acceptRate: m.acceptRate, iters });
        } else if (m.type === 'result') {
          // Compute utility structure, importance, RLH
          const us = utilityStructure(study, m.betaMean, m.pTotal);
          const J = study.choiceConfig.altsPerTask + (study.choiceConfig.includeNone ? 1 : 0);
          const pctCertainty = ((m.finalRLH - 1/J) / (1 - 1/J)) * 100;
          // Convergence check: slope of last 2000 burn-in iters
          const burnInSlice = Array.from(m.rlhHistory.subarray(Math.max(0, burnin - 2000), burnin));
          const slope = (() => {
            const n = burnInSlice.length;
            if (n < 10) return 0;
            const xs = range(n);
            const mx = mean(xs), my = mean(burnInSlice);
            let num = 0, den = 0;
            for (let i = 0; i < n; i++) { num += (xs[i] - mx) * (burnInSlice[i] - my); den += (xs[i] - mx) ** 2; }
            return num / (den || 1);
          })();

          // Convert posterior draws to Float32 (half the memory, plenty of precision for CIs)
          // m.keptBeta is Float64Array of size R * pTotal * nKeptMax (sparse — m.keptPerResp[r] is the count actually stored for resp r)
          let keptDraws = null;
          if (m.keptBeta && m.keptPerResp && m.nKeptMax) {
            const f32 = new Float32Array(m.keptBeta.length);
            for (let i = 0; i < m.keptBeta.length; i++) f32[i] = m.keptBeta[i];
            keptDraws = {
              beta: f32,
              keptPerResp: new Int32Array(m.keptPerResp),
              nKeptMax: m.nKeptMax,
              pTotal: m.pTotal,
              respondents: payload.respondents.length
            };
          }
          setAnalysis({
            iters, burnin, thin, priorVar,
            rlhHistory: Array.from(m.rlhHistory).filter((_, i) => i % 10 === 0),
            finalRLH: m.finalRLH,
            pctCertainty,
            convergenceSlope: slope,
            individualUtilities: Array.from(m.betaMean),
            individualSDs: Array.from(m.betaSD),
            pTotal: m.pTotal,
            respondents: payload.respondents,
            utilityStructure: us,
            totalTasks: m.totalTasks,
            keptDraws,
            lca: null
          });
          setStatus('Analysis Complete');
          setRunning(false);
          worker.terminate();
        } else if (m.type === 'error') {
          setError(m.message);
          setRunning(false);
          worker.terminate();
        }
      };
      worker.onerror = (e) => { setError(e.message || 'Worker error'); setRunning(false); };
      worker.postMessage({ type: 'run', payload: { ...payload, iters, burnin, thin, seed: 42, priorVar } });
    } catch (e) {
      setError(e.message); setRunning(false);
    }
  };

  const runLatentClass = async () => {
    setLcaRunning(true);
    try {
      await new Promise(r => setTimeout(r, 30));
      const results = [];
      for (let K = DEFAULTS.lca.minK; K <= DEFAULTS.lca.maxK; K++) {
        const r = runLCA(study, K, { starts: 8, seed: 17 + K });
        if (r) results.push(r);
      }
      // Pick lowest BIC
      results.sort((a, b) => a.bic - b.bic);
      const best = results[0];
      // Generate narratives
      const attrs = study.attributes;
      const layout = buildParamLayout(attrs, study.choiceConfig.includeNone);
      const narratives = best.betas.map((b, k) => {
        // Importance per class
        const imps = attrs.map((a, ai) => {
          const ref = layout.attrRef[ai];
          const vals = a.levels.map((_, li) => {
            if (li === ref) return 0;
            const idx = layout.offsets[ai] + (li < ref ? li : li - 1);
            return b[idx];
          });
          return { attr: a, ai, range: Math.max(...vals) - Math.min(...vals), vals };
        });
        imps.sort((x, y) => y.range - x.range);
        const top = imps.slice(0, 2);
        const topLevel = (x) => x.attr.levels[x.vals.indexOf(Math.max(...x.vals))]?.name;
        return `Segment ${k+1} (${Math.round(best.pi[k]*100)}%): ${top[0].attr.name}-driven — strongest preference for "${topLevel(top[0])}"; secondary importance on ${top[1]?.attr.name || ''}.`;
      });
      setAnalysis({ ...a, lca: { all: results, best, narratives } });
    } finally { setLcaRunning(false); }
  };

  // Build a default base profile for sensitivity/tornado
  useEffect(() => {
    if (!baseProfile && study.attributes?.length) {
      setBaseProfile(study.attributes.map(a => Math.floor(a.levels.length / 2)));
    }
  }, [study.attributes]);

  const exportIndividualUtilities = () => {
    if (!a) return;
    const attrs = study.attributes;
    const layout = buildParamLayout(attrs, study.choiceConfig.includeNone);
    const header = ['Respondent_ID'];
    attrs.forEach(attr => { attr.levels.forEach(l => header.push(`${attr.name} :: ${l.name}`)); });
    if (study.choiceConfig.includeNone) header.push('None_intercept');
    // Include seg columns
    const segCols = study.responses.segColumns;
    segCols.forEach(c => header.push(c));
    const rows = [header];
    a.utilityStructure.perResp.forEach((u, ri) => {
      const line = [a.respondents[ri].respId];
      attrs.forEach((a0, ai) => { a0.levels.forEach((_, li) => line.push(u[ai][li].toFixed(4))); });
      if (study.choiceConfig.includeNone) line.push((a.utilityStructure.noneUtils?.[ri] || 0).toFixed(4));
      segCols.forEach(c => line.push(a.respondents[ri].seg[c] ?? ''));
      rows.push(line);
    });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Individual Utilities');
    // Aggregate
    const aggRows = [['Attribute', 'Level', 'Mean Utility', 'SD']];
    attrs.forEach((a0, ai) => a0.levels.forEach((l, li) => aggRows.push([a0.name, l.name, a.utilityStructure.meanPerLevel[ai][li].toFixed(4), a.utilityStructure.sdPerLevel[ai][li].toFixed(4)])));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aggRows), 'Aggregate Utilities');
    // Importance
    const impRows = [['Attribute', 'Importance %']];
    attrs.forEach((a0, ai) => impRows.push([a0.name, (a.utilityStructure.importance[ai] * 100).toFixed(1)]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(impRows), 'Attribute Importance');
    XLSX.writeFile(wb, `${(study.setup?.name || 'study').replace(/[^a-z0-9-_]+/gi,'_')}_utilities.xlsx`);
  };

  return (
    <div>
      <h2 className="text-2xl font-semibold text-slate-900 mb-1">Analysis</h2>
      <p className="text-slate-500 text-sm mb-6">Hierarchical Bayes estimation of individual-level part-worth utilities, plus optional latent class segmentation.</p>

      <Card title="HB estimation" className="mb-6">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-start">
          <div>
            <div className="text-xs text-slate-500 mb-2">The model estimates a multivariate-normal hierarchical prior and draws individual part-worths via Metropolis-within-Gibbs.</div>
            <details open={advancedOpen} onToggle={e => setAdvancedOpen(e.target.open)} className="border border-slate-200 rounded-lg p-3">
              <summary className="text-xs font-medium text-slate-700">Advanced settings</summary>
              <div className="grid grid-cols-2 gap-3 mt-3">
                <NumberInput label="Iterations" value={iters} onChange={v => setIters(v || 0)} />
                <NumberInput label="Burn-in" value={burnin} onChange={v => setBurnin(v || 0)} />
                <NumberInput label="Thinning" value={thin} onChange={v => setThin(v || 1)} />
                <NumberInput label="Prior variance" value={priorVar} onChange={v => setPriorVar(v || 1)} step={0.5} />
              </div>
              <div className="text-xs text-slate-400 mt-2">Rulebook defaults: 20k iters / 10k burn-in. In-browser default is reduced to {DEFAULTS.hb.iters}/{DEFAULTS.hb.burnin} for performance — override above.</div>
            </details>
          </div>
          <div>
            <div className="flex flex-wrap gap-2 items-center">
              <Button onClick={runHB} disabled={running}>{running ? <><Spinner /> Estimating…</> : (a ? 'Re-run HB (browser)' : 'Run HB estimation (browser)')}</Button>
              <PythonAnalysisRunner
                study={study}
                onComplete={(bundle) => { setAnalysis(bundle); setStatus('Analysis Complete'); }}
              />
            </div>
            <div className="text-xs text-slate-500 mt-2">
              Browser mode is fast and free; rigorous mode runs the same MCMC in Python (numpy/scipy) via OpenAI's code interpreter for longer chains and head-to-head precision.
            </div>
            {progress && (
              <div className="mt-3 bg-slate-50 rounded-lg p-3 text-xs">
                <div className="flex justify-between mb-1">
                  <span>Iteration {progress.iter} / {progress.iters}</span>
                  <span>RLH = {progress.rlh.toFixed(3)}</span>
                </div>
                <div className="w-full bg-slate-200 rounded-full h-1.5">
                  <div className="bg-blue-600 h-1.5 rounded-full transition-all" style={{ width: (progress.iter/progress.iters*100) + '%' }} />
                </div>
                <div className="text-slate-500 mt-1">Acceptance rate: {(progress.acceptRate*100).toFixed(1)}%</div>
              </div>
            )}
            {error && <Advisory level="danger" className="mt-3">{error}</Advisory>}
          </div>
        </div>
      </Card>

      {a && (
        <>
          <Card title="Convergence & fit" className="mb-6">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
              <div className="bg-slate-50 rounded p-3"><div className="text-xs text-slate-500">Final RLH</div><div className="text-xl font-semibold tabular">{a.finalRLH.toFixed(3)}</div></div>
              <div className="bg-slate-50 rounded p-3"><div className="text-xs text-slate-500">Percent certainty</div><div className="text-xl font-semibold tabular">{a.pctCertainty.toFixed(1)}%</div></div>
              <div className="bg-slate-50 rounded p-3"><div className="text-xs text-slate-500">Respondents analyzed</div><div className="text-xl font-semibold tabular">{a.respondents.length}</div></div>
              <div className="bg-slate-50 rounded p-3"><div className="text-xs text-slate-500">Total observations</div><div className="text-xl font-semibold tabular">{a.totalTasks}</div></div>
            </div>
            {Math.abs(a.convergenceSlope) > 0 && Math.abs(a.convergenceSlope) * 2000 > 0.02 && (
              <Advisory level="warn">The RLH slope in late burn-in is {a.convergenceSlope.toExponential(2)}. The model may not have fully converged — consider increasing iterations.</Advisory>
            )}
            <div className="chart-wrap h-56">
              <R.ResponsiveContainer>
                <R.LineChart data={a.rlhHistory.map((v, i) => ({ iter: i * 10, rlh: v }))}>
                  <R.CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                  <R.XAxis dataKey="iter" tick={{ fontSize: 10 }} label={{ value: 'Iteration', position: 'insideBottom', offset: -5, fontSize: 11 }} />
                  <R.YAxis domain={['dataMin - 0.02', 'dataMax + 0.02']} tick={{ fontSize: 10 }} />
                  <R.Tooltip formatter={(v) => v.toFixed(3)} />
                  <R.Line type="monotone" dataKey="rlh" stroke="#2563eb" strokeWidth={1.5} dot={false} />
                  <R.ReferenceLine x={a.burnin} stroke="#f59e0b" strokeDasharray="4 3" label={{ value: 'End burn-in', position: 'top', fontSize: 10 }} />
                </R.LineChart>
              </R.ResponsiveContainer>
            </div>
          </Card>

          <div className="flex items-center gap-1 mb-4 border-b border-slate-200">
            {[
              { id: 'importance', label: 'Attribute Importance' },
              { id: 'utilities',  label: 'Part-Worth Utilities' },

/**
 * Build a Sawtooth-style detailed utility report from the analysis bundle.
 *
 * One row per non-reference attribute level (the parameters actually estimated by HB) plus
 * one row per reference level (constrained to 0; no SE) for completeness. Columns:
 *   coefficient (population mean across respondents)
 *   SE          (sampling variability of the population mean)
 *   t-value     (= coefficient / SE; |t| > 1.96 ≈ 95% significance)
 *   95% CI      (Bayesian credible interval when posterior draws are available, else ±1.96·SE)
 *   pctVar      (range-based variance contribution for the level: |coef - mean(attr)| / Σ similar)
 *
 * Math:
 *  - If keptDraws present: SE = SD over draws d of pop_mean^{(d)} = (1/R) Σ_r β_{r,d,k}.
 *    CI = posterior 2.5%/97.5% percentiles of pop_mean^{(d)}. This is a proper Bayesian
 *    credible interval on the population mean utility for the level.
 *  - Else: SE = stdev across respondents of β_{r,k} / sqrt(R) (cross-sectional SE).
 *    CI = coefficient ± 1.96 · SE (normal approximation).
 *
 *  - pctVar (per-level variance contribution): mean(|β_{r,ai,li} - mean over levels|) /
 *    sum across levels of same. This decomposes attribute importance to the level.
 *    (The attribute-level rollup matches the existing range-based attribute importance.)
 */
function computeDetailedUtilityReport(study, analysis) {
  const a = analysis || study.analysis;
  if (!a || !a.utilityStructure) return null;
  const attrs = study.attributes;
  const layout = buildParamLayout(attrs, study.choiceConfig.includeNone);
  const R = a.utilityStructure.perResp.length;
  if (R === 0) return null;

  const hasDraws = !!a.keptDraws;
  const draws = hasDraws ? a.keptDraws : null;

  const percentile = (arr, q) => {
    const s = Array.from(arr).sort((x, y) => x - y);
    const idx = Math.min(s.length - 1, Math.max(0, Math.round(q * (s.length - 1))));
    return s[idx];
  };

  // Determine D (common number of draws across all respondents)
  let D = 0;
  if (hasDraws) {
    D = Infinity;
    for (let r = 0; r < R; r++) D = Math.min(D, draws.keptPerResp[r] | 0);
    if (!Number.isFinite(D) || D < 4) D = 0;  // Not enough for Bayesian SE
  }

  const rows = [];
  attrs.forEach((attr, ai) => {
    const ref = layout.attrRef[ai];
    attr.levels.forEach((lv, li) => {
      const isRef = li === ref;
      const coefByResp = a.utilityStructure.perResp.map(u => u[ai][li]);
      const coef = coefByResp.reduce((s, v) => s + v, 0) / R;

      let se, ciLo, ciHi, source;
      if (isRef) {
        se = 0; ciLo = 0; ciHi = 0;
        source = 'reference';
      } else if (D > 0) {
        // Bayesian SE: SD over draws of population mean
        // For ref level, β = 0 always, so this would be 0.
        const paramIdx = layout.offsets[ai] + (li < ref ? li : li - 1);
        const popMeanByDraw = new Float32Array(D);
        for (let d = 0; d < D; d++) {
          let s = 0;
          for (let r = 0; r < R; r++) {
            s += draws.beta[(r * draws.nKeptMax + d) * draws.pTotal + paramIdx];
          }
          popMeanByDraw[d] = s / R;
        }
        const meanD = popMeanByDraw.reduce((s, v) => s + v, 0) / D;
        let sq = 0;
        for (let d = 0; d < D; d++) sq += (popMeanByDraw[d] - meanD) * (popMeanByDraw[d] - meanD);
        se = Math.sqrt(sq / Math.max(1, D - 1));
        ciLo = percentile(popMeanByDraw, 0.025);
        ciHi = percentile(popMeanByDraw, 0.975);
        source = 'bayesian';
      } else {
        // Cross-sectional SE fallback
        const m = coef;
        let sq = 0;
        for (let i = 0; i < R; i++) sq += (coefByResp[i] - m) * (coefByResp[i] - m);
        const sdPop = Math.sqrt(sq / Math.max(1, R - 1));
        se = sdPop / Math.sqrt(R);
        ciLo = coef - 1.96 * se;
        ciHi = coef + 1.96 * se;
        source = 'cross-sectional';
      }
      const tVal = (se > 0) ? coef / se : null;

      rows.push({
        attrIdx: ai,
        attrName: attr.name,
        levelIdx: li,
        levelName: lv.name || `L${li+1}`,
        isReference: isRef,
        coef,
        se,
        tValue: tVal,
        ciLo, ciHi,
        source
      });
    });
  });

  // Per-level variance contribution: |coef - mean(attr)| within attribute → normalize
  attrs.forEach((attr, ai) => {
    const inAttr = rows.filter(r => r.attrIdx === ai);
    const meanAttr = inAttr.reduce((s, r) => s + r.coef, 0) / inAttr.length;
    const devs = inAttr.map(r => Math.abs(r.coef - meanAttr));
    const tot = devs.reduce((s, v) => s + v, 0) || 1;
    inAttr.forEach((r, i) => { r.pctVar = (devs[i] / tot) * 100; });
  });

  // Attribute-level importance rollup (range-based, same as existing utilityStructure.importance)
  const attrImportance = attrs.map((attr, ai) => {
    const inAttr = rows.filter(r => r.attrIdx === ai);
    return {
      attrIdx: ai,
      attrName: attr.name,
      importance: a.utilityStructure.importance[ai] * 100,  // %
      range: Math.max(...inAttr.map(r => r.coef)) - Math.min(...inAttr.map(r => r.coef))
    };
  });
  // Add % importance share
  const totRange = attrImportance.reduce((s, r) => s + r.range, 0) || 1;
  attrImportance.forEach(r => { r.rangeShare = (r.range / totRange) * 100; });

  return {
    rows,
    attrImportance,
    R,
    nDraws: D || null,
    source: D > 0 ? 'bayesian' : 'cross-sectional'
  };
}

function TabDetailedReport({ a, study }) {
  const report = useMemo(() => computeDetailedUtilityReport(study, a), [study, a]);
  if (!report) return <div className="text-sm text-slate-500">Not enough data for the detailed report.</div>;

  const exportDetailedReport = () => {
    const header = ['Attribute', 'Level', 'Coefficient', 'SE', 't-value', '95% CI Low', '95% CI High', 'Variance share (%)', 'Reference'];
    const rows = [header];
    report.rows.forEach(r => {
      rows.push([
        r.attrName, r.levelName,
        r.coef.toFixed(4),
        r.isReference ? '—' : r.se.toFixed(4),
        r.isReference || r.tValue === null ? '—' : r.tValue.toFixed(2),
        r.isReference ? '—' : r.ciLo.toFixed(4),
        r.isReference ? '—' : r.ciHi.toFixed(4),
        r.pctVar.toFixed(1) + '%',
        r.isReference ? 'YES (β = 0)' : ''
      ]);
    });
    rows.push([]);
    rows.push(['Source:', report.source === 'bayesian'
      ? `Bayesian (${report.nDraws} posterior draws per respondent, n=${report.R})`
      : `Cross-sectional approximation (no posterior draws; n=${report.R})`]);
    // Attribute-importance summary tab
    const impRows = [['Attribute', 'Range-based Importance (%)', 'Utility Range', 'Range Share (%)']];
    report.attrImportance.forEach(r => impRows.push([r.attrName, r.importance.toFixed(1) + '%', r.range.toFixed(3), r.rangeShare.toFixed(1) + '%']));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Detailed Utilities');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(impRows), 'Attribute Importance');
    XLSX.writeFile(wb, `${(study.setup?.name || 'study').replace(/[^a-z0-9-_]+/gi,'_')}_detailed_utility_report.xlsx`);
  };

  // Group rows by attribute for layout
  const grouped = {};
  report.rows.forEach(r => { (grouped[r.attrIdx] = grouped[r.attrIdx] || []).push(r); });
  const groupKeys = Object.keys(grouped).sort((a, b) => Number(a) - Number(b));

  return (
    <div>
      <div className="flex items-start gap-3 mb-4">
        <div className="flex-1 text-xs text-slate-500 max-w-3xl">
          Sawtooth-style coefficient table. <b>Coefficient</b> is the mean utility across respondents; the
          reference level of each attribute is constrained to 0. <b>SE</b> is the {report.source === 'bayesian'
            ? <>posterior standard deviation of the population mean (from {report.nDraws} MCMC draws per respondent)</>
            : <>cross-sectional standard error of the population mean (no posterior draws available — re-run the HB analysis to get Bayesian SEs)</>}.
          <b> 95% CI</b> is the {report.source === 'bayesian' ? 'credible interval (2.5%/97.5% percentiles of the draw distribution)' : 'normal-approximation interval (coef ± 1.96·SE)'}.
          <b> t-value</b> &gt; 1.96 in absolute value is the conventional cutoff for significance.
          <b> Variance share</b> attributes each level's contribution to within-attribute spread.
        </div>
        <Button variant="secondary" onClick={exportDetailedReport}>Export report (Excel)</Button>
      </div>

      <div className="overflow-x-auto scroll-thin border border-slate-200 rounded-lg">
        <table className="w-full text-xs tabular">
          <thead className="bg-slate-50 text-slate-600">
            <tr>
              <th className="text-left p-2 font-medium">Attribute</th>
              <th className="text-left p-2 font-medium">Level</th>
              <th className="text-right p-2 font-medium">Coefficient</th>
              <th className="text-right p-2 font-medium">SE</th>
              <th className="text-right p-2 font-medium">t-value</th>
              <th className="text-right p-2 font-medium">95% CI Low</th>
              <th className="text-right p-2 font-medium">95% CI High</th>
              <th className="text-right p-2 font-medium">Var share</th>
            </tr>
          </thead>
          <tbody>
            {groupKeys.map(gk => {
              const group = grouped[gk];
              return group.map((r, i) => {
                const sigClass = r.isReference ? 'text-slate-400'
                  : (Math.abs(r.tValue || 0) > 1.96 ? 'text-slate-900' : 'text-slate-500');
                return (
                  <tr key={`${gk}-${i}`} className={`border-t ${i === 0 ? 'border-slate-300' : 'border-slate-100'} ${sigClass}`}>
                    <td className="p-2 font-medium">{i === 0 ? r.attrName : ''}</td>
                    <td className="p-2">{r.levelName}{r.isReference && <span className="ml-1.5 text-[10px] uppercase tracking-wide text-slate-400">ref</span>}</td>
                    <td className="p-2 text-right">{r.coef.toFixed(3)}</td>
                    <td className="p-2 text-right">{r.isReference ? '—' : r.se.toFixed(3)}</td>
                    <td className="p-2 text-right">{r.isReference || r.tValue === null ? '—' : (
                      <span className={Math.abs(r.tValue) > 1.96 ? 'font-semibold' : ''}>{r.tValue.toFixed(2)}</span>
                    )}</td>
                    <td className="p-2 text-right">{r.isReference ? '—' : r.ciLo.toFixed(3)}</td>
                    <td className="p-2 text-right">{r.isReference ? '—' : r.ciHi.toFixed(3)}</td>
                    <td className="p-2 text-right">{r.pctVar.toFixed(1)}%</td>
                  </tr>
                );
              });
            })}
          </tbody>
        </table>
      </div>

      <div className="mt-5">
        <div className="text-sm font-semibold text-slate-800 mb-2">Attribute importance (range-based)</div>
        <div className="overflow-x-auto scroll-thin border border-slate-200 rounded-lg">
          <table className="w-full text-xs tabular">
            <thead className="bg-slate-50 text-slate-600">
              <tr>
                <th className="text-left p-2 font-medium">Attribute</th>
                <th className="text-right p-2 font-medium">Importance %</th>
                <th className="text-right p-2 font-medium">Utility range (best − worst)</th>
                <th className="text-right p-2 font-medium">Range share %</th>
              </tr>
            </thead>
            <tbody>
              {report.attrImportance.sort((x, y) => y.importance - x.importance).map((r, i) => (
                <tr key={i} className="border-t border-slate-100">
                  <td className="p-2 font-medium text-slate-800">{r.attrName}</td>
                  <td className="p-2 text-right text-slate-900">{r.importance.toFixed(1)}%</td>
                  <td className="p-2 text-right text-slate-700">{r.range.toFixed(3)}</td>
                  <td className="p-2 text-right text-slate-500">{r.rangeShare.toFixed(1)}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function TabTornadoAnalysis({ a, study, baseProfile, setBaseProfile }) {
  const attrs = study.attributes;
  if (!baseProfile) return <div className="text-sm text-slate-400">Loading…</div>;
  // Tornado: for each attribute, impact on aggregate SoP when moving from worst to best level, holding others constant.
  // Compute aggregate share assuming this single product alone (meaningless) — better: compute against a fixed competitor.
  // We compute each attribute's range contribution to product utility as a proxy.
  const data = attrs.map((attr, ai) => {
    const utils = attr.levels.map((_, li) => mean(a.utilityStructure.perResp.map(u => u[ai][li])));
    const best = Math.max(...utils), worst = Math.min(...utils);
    const baseU = utils[baseProfile[ai]];
    return { name: attr.name, worst: worst - baseU, best: best - baseU, range: best - worst };
  }).sort((x, y) => y.range - x.range);

  const setLevel = (ai, li) => { const c = baseProfile.slice(); c[ai] = li; setBaseProfile(c); };

  return (
    <div>
      <div className="chart-wrap mb-4">
        <div className="text-xs text-slate-500 mb-2">Tornado chart — impact of each attribute, holding others at base</div>
        <div style={{ height: Math.max(200, attrs.length * 36) }}>
          <R.ResponsiveContainer>
            <R.BarChart data={data} layout="vertical" margin={{ left: 20, right: 40, top: 10, bottom: 10 }} stackOffset="sign">
              <R.CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" horizontal={false} />
              <R.XAxis type="number" tick={{ fontSize: 10 }} />
              <R.YAxis type="category" dataKey="name" tick={{ fontSize: 11 }} width={140} />
              <R.Tooltip formatter={v => v.toFixed(3)} />
              <R.ReferenceLine x={0} stroke="#94a3b8" />
              <R.Bar dataKey="worst" stackId="a" fill="#ef4444" />
              <R.Bar dataKey="best" stackId="a" fill="#10b981" />
            </R.BarChart>
          </R.ResponsiveContainer>
        </div>
      </div>

      <Card title="Base profile">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {attrs.map((a0, ai) => (
            <Select key={a0.id} label={a0.name} value={String(baseProfile[ai])} onChange={v => setLevel(ai, Number(v))}
              options={a0.levels.map((l, li) => ({ value: String(li), label: l.name }))} />
          ))}
        </div>
      </Card>
    </div>
  );
}

// ========================================================================
// SECTION 18 — STEP 9: MARKET SIMULATOR
// ========================================================================
function simulateShares(study, products, opts) {
  // products: array of { name, profile (array of levelIndex per attribute) }
  // opts: { includeNone, subgroupFilter, subgroupPred, priceAttrIndex }
  const a = study.analysis;
  if (!a) return null;
  const attrs = study.attributes;
  const layout = buildParamLayout(attrs, study.choiceConfig.includeNone);
  const pTotal = a.pTotal;
  const utilityPerRespForProduct = (rIdx, profile) => {
    let u = 0;
    const us = a.utilityStructure.perResp[rIdx];
    for (let ai = 0; ai < attrs.length; ai++) u += us[ai][profile[ai]];
    return u;
  };
  const includeNone = !!opts.includeNone && study.choiceConfig.includeNone;
  // Subgroup filter
  const respIdxs = a.respondents.map((r, i) => ({ i, seg: r.seg }))
    .filter(x => opts.subgroupPred ? opts.subgroupPred(x.seg) : true)
    .map(x => x.i);
  const N = respIdxs.length;
  if (N === 0) return { shares: products.map(() => 0), noneShare: 0, firstChoice: products.map(() => 0), N: 0 };

  // For each respondent in subset, compute probs
  const sumP = new Array(products.length).fill(0);
  let sumNone = 0;
  const firstCounts = new Array(products.length).fill(0);
  let firstNone = 0;
  respIdxs.forEach(ri => {
    const U = products.map(p => utilityPerRespForProduct(ri, p.profile));
    if (includeNone) U.push(a.utilityStructure.noneUtils?.[ri] || 0);
    const m = Math.max(...U);
    const ex = U.map(x => Math.exp(x - m));
    const sm = ex.reduce((s, v) => s + v, 0);
    const probs = ex.map(v => v / sm);
    for (let p = 0; p < products.length; p++) sumP[p] += probs[p];
    if (includeNone) sumNone += probs[products.length];
    // First choice
    let best = 0;
    for (let i = 1; i < U.length; i++) if (U[i] > U[best]) best = i;
    if (includeNone && best === products.length) firstNone++;
    else firstCounts[best]++;
  });
  return {
    shares: sumP.map(s => s / N),
    noneShare: includeNone ? sumNone / N : 0,
    firstChoice: firstCounts.map(c => c / N),
    firstNone: firstNone / N,
    N
  };
}

/**
 * Posterior-draw simulator. Returns posterior credible intervals on share-of-preference
 * by recomputing share at each of the D retained MCMC draws (per respondent),
 * then taking percentiles across draws.
 *
 * Requires study.analysis.keptDraws (Float32Array R * pTotal * nKeptMax laid out as
 * (r * nKeptMax + d) * pTotal + k). Returns null if draws aren't available.
 *
 * Output per product p:
 *   shares:      posterior MEAN share (same as point-estimate simulator, ≈ a.individualUtilities path)
 *   sharesCI:    { p025, p50, p975 } per product
 *   firstChoice: posterior MEAN first-choice (point-estimate)
 *   pBeats[i][j]: posterior probability product i has higher share than product j
 *   nDraws:      number of posterior draws used (min over respondents)
 *
 * Math notes:
 *   - Each draw d gives one population-share vector: share_p^{(d)} = (1/N) Σ_r softmax(β_{r,d}ᵀ x_p)
 *   - 95% CI = [percentile(2.5%, share^{(d)}), percentile(97.5%, share^{(d)})]
 *   - This is a posterior credible interval over the *population* share, which is the
 *     right uncertainty band for a Sawtooth-style simulator (not individual-level CI).
 */
function simulateSharesWithDraws(study, products, opts) {
  const a = study.analysis;
  if (!a || !a.keptDraws) return null;
  const { beta, keptPerResp, nKeptMax, pTotal } = a.keptDraws;
  const attrs = study.attributes;
  const includeNone = !!opts.includeNone && study.choiceConfig.includeNone;
  const layout = buildParamLayout(attrs, study.choiceConfig.includeNone);

  // Subgroup filter (same as point-estimate simulator)
  const respIdxs = a.respondents.map((r, i) => ({ i, seg: r.seg }))
    .filter(x => opts.subgroupPred ? opts.subgroupPred(x.seg) : true)
    .map(x => x.i);
  const N = respIdxs.length;
  if (N === 0) return null;

  // Number of draws per respondent — use the minimum so every draw index has every respondent
  let D = Infinity;
  for (const r of respIdxs) D = Math.min(D, keptPerResp[r] | 0);
  if (!Number.isFinite(D) || D < 4) return null; // need enough draws to estimate a CI

  // Pre-compute dummy rows for each product (length nPar = pTotal when includeNone is false;
  // when includeNone is true, the None intercept is at index pTotal-1 and applies only to the "None" alt)
  const productRows = products.map(p => profileToDummyRow(p.profile, attrs, layout));
  const P = products.length;

  // For each draw, accumulate population share across respondents
  const drawShares = []; // length D, each is Float32Array(P)  (and noneShare scalar)
  const drawNoneShare = new Float32Array(D);

  // Iterate draws (outer) so we vectorize over respondents
  for (let d = 0; d < D; d++) {
    const sharesThisDraw = new Float32Array(P);
    let noneThisDraw = 0;
    for (let ri = 0; ri < respIdxs.length; ri++) {
      const r = respIdxs[ri];
      const base = (r * nKeptMax + d) * pTotal;
      // Utility per product = β · row
      let maxU = -Infinity;
      const U = new Array(P + (includeNone ? 1 : 0));
      for (let p = 0; p < P; p++) {
        let u = 0;
        const row = productRows[p];
        for (let k = 0; k < layout.nPar; k++) {
          if (row[k] !== 0) u += beta[base + k] * row[k];
        }
        U[p] = u;
        if (u > maxU) maxU = u;
      }
      if (includeNone) {
        // None intercept is parameter at offsets[attrs.length] === pTotal-1 in the with-None layout
        const noneU = beta[base + pTotal - 1];
        U[P] = noneU;
        if (noneU > maxU) maxU = noneU;
      }
      // Softmax
      let sumE = 0;
      const E = new Array(U.length);
      for (let i = 0; i < U.length; i++) { E[i] = Math.exp(U[i] - maxU); sumE += E[i]; }
      for (let p = 0; p < P; p++) sharesThisDraw[p] += E[p] / sumE;
      if (includeNone) noneThisDraw += E[P] / sumE;
    }
    for (let p = 0; p < P; p++) sharesThisDraw[p] /= N;
    drawShares.push(sharesThisDraw);
    drawNoneShare[d] = includeNone ? noneThisDraw / N : 0;
  }

  // Posterior summaries
  const percentile = (arr, q) => {
    const s = Array.from(arr).sort((x, y) => x - y);
    const idx = Math.min(s.length - 1, Math.max(0, Math.round(q * (s.length - 1))));
    return s[idx];
  };
  const productSharesByDraw = new Array(P).fill(null).map((_, p) => drawShares.map(d => d[p]));
  const meanShare = productSharesByDraw.map(arr => arr.reduce((s, v) => s + v, 0) / arr.length);
  const sharesCI = productSharesByDraw.map(arr => ({
    p025: percentile(arr, 0.025),
    p50:  percentile(arr, 0.5),
    p975: percentile(arr, 0.975)
  }));
  const noneMean = drawNoneShare.reduce((s, v) => s + v, 0) / D;
  const noneCI = {
    p025: percentile(drawNoneShare, 0.025),
    p50:  percentile(drawNoneShare, 0.5),
    p975: percentile(drawNoneShare, 0.975)
  };

  // Posterior probability i beats j: count draws where share_i^{(d)} > share_j^{(d)}
  const pBeats = new Array(P).fill(null).map(() => new Array(P).fill(0));
  for (let d = 0; d < D; d++) {
    const sh = drawShares[d];
    for (let i = 0; i < P; i++) {
      for (let j = 0; j < P; j++) {
        if (i !== j && sh[i] > sh[j]) pBeats[i][j]++;
      }
    }
  }
  for (let i = 0; i < P; i++) for (let j = 0; j < P; j++) pBeats[i][j] /= D;

  return {
    shares: meanShare,
    sharesCI,
    noneShare: noneMean,
    noneCI,
    pBeats,
    nDraws: D,
    N
  };
}

function sensitivityAcrossLevels(study, baseProducts, targetIdx, attrIdx, opts) {
  const attrs = study.attributes;
  const levels = attrs[attrIdx].levels;
  return levels.map((_, li) => {
    const products = baseProducts.map((p, i) => ({
      ...p, profile: i === targetIdx ? p.profile.slice().map((v, ai) => ai === attrIdx ? li : v) : p.profile
    }));
    const res = simulateShares(study, products, opts);
    return { level: levels[li].name || `L${li+1}`, share: res.shares[targetIdx] * 100 };
  });
}

// Display-name resolvers: honor Card Preview overrides (cardStyle), fall back to base names.
// Shared by the simulator view and its exports so user-entered labels flow through everywhere.
function attrDisplayName(study, a) {
  return study.cardStyle?.attributeDisplayNames?.[a.id] || a.name || 'Attribute';
}
function levelDisplayName(study, a, li) {
  return study.cardStyle?.levelDisplayNames?.[a.id]?.[a.levels[li]?.id] || a.levels[li]?.name || `Level ${li + 1}`;
}

function StepSimulator() {
  const { study, setScenarios } = useContext(StudyContext);
  const a = study.analysis;
  const attrs = study.attributes;
  const dn = (a0) => attrDisplayName(study, a0);
  const dl = (a0, li) => levelDisplayName(study, a0, li);
  const [products, setProducts] = useState(() => {
    if (study.scenarios?.[0]?.products) return study.scenarios[0].products;
    return [
      { name: 'Our TPP', profile: attrs.map(a0 => 0) },
      { name: 'Competitor A', profile: attrs.map(a0 => a0.levels.length - 1) }
    ];
  });
  const [includeNone, setIncludeNone] = useState(true);
  const [subgroupFilters, setSubgroupFilters] = useState({});
  const [sensAttr, setSensAttr] = useState(0);
  const [sensTarget, setSensTarget] = useState(0);
  const [scenarioName, setScenarioName] = useState('Base case');
  const [compareIds, setCompareIds] = useState([]);
  const [showCI, setShowCI] = useState(true);
  const chartRef = useRef(null);

  const segCols = study.responses?.segColumns || [];
  const segValues = useMemo(() => {
    const map = {};
    segCols.forEach(c => {
      const vals = new Set();
      a.respondents.forEach(r => { const v = r.seg?.[c]; if (v !== undefined && v !== null && v !== '') vals.add(String(v)); });
      map[c] = Array.from(vals).sort();
    });
    return map;
  }, [segCols, a]);

  const subgroupPred = useMemo(() => {
    const filters = Object.entries(subgroupFilters).filter(([_, v]) => v && v !== '__all__');
    if (filters.length === 0) return null;
    return (seg) => filters.every(([c, v]) => String(seg?.[c] ?? '') === v);
  }, [subgroupFilters]);

  const result = useMemo(() => simulateShares(study, products, { includeNone, subgroupPred }), [study, products, includeNone, subgroupPred]);
  // Posterior-draw simulation (null if HB ran without keptDraws — e.g. imported studies)
  const posterior = useMemo(
    () => simulateSharesWithDraws(study, products, { includeNone, subgroupPred }),
    [study, products, includeNone, subgroupPred]
  );
  const hasCI = !!posterior;

  const updateProduct = (idx, patch) => setProducts(products.map((p, i) => i === idx ? { ...p, ...patch } : p));
  const setProductLevel = (pIdx, ai, li) => {
    const prof = products[pIdx].profile.slice();
    prof[ai] = li;
    updateProduct(pIdx, { profile: prof });
  };
  const addProduct = () => {
    if (products.length >= DEFAULTS.simulator.maxProducts) return;
    setProducts([...products, { name: `Product ${products.length + 1}`, profile: attrs.map(() => 0) }]);
  };
  const removeProduct = (idx) => setProducts(products.filter((_, i) => i !== idx));

  const saveScenario = () => {
    const sc = {
      id: uid(), name: scenarioName || `Scenario ${(study.scenarios?.length || 0) + 1}`,
      products: JSON.parse(JSON.stringify(products)),
      includeNone, subgroupFilters: { ...subgroupFilters },
      result: { shares: result.shares, noneShare: result.noneShare, firstChoice: result.firstChoice, firstNone: result.firstNone, N: result.N },
      // Snapshot posterior summaries (numeric only — drop draws for portability)
      posterior: hasCI ? {
        sharesCI: posterior.sharesCI.map(ci => ({ p025: ci.p025, p50: ci.p50, p975: ci.p975 })),
        noneCI: posterior.noneCI ? { p025: posterior.noneCI.p025, p50: posterior.noneCI.p50, p975: posterior.noneCI.p975 } : null,
        nDraws: posterior.nDraws
      } : null
    };
    setScenarios([...(study.scenarios || []), sc]);
  };
  const loadScenario = (sc) => {
    setProducts(sc.products);
    setIncludeNone(sc.includeNone);
    setSubgroupFilters(sc.subgroupFilters || {});
    setScenarioName(sc.name);
  };
  const deleteScenario = (id) => {
    setScenarios(study.scenarios.filter(s => s.id !== id));
    setCompareIds(compareIds.filter(x => x !== id));
  };

  const shareData = products.map((p, i) => {
    const row = {
      name: p.name,
      share: result.shares[i] * 100,
      firstChoice: result.firstChoice[i] * 100
    };
    if (hasCI && posterior.sharesCI[i]) {
      // Recharts ErrorBar takes [errBelow, errAbove] (distance from value, not absolute)
      const ci = posterior.sharesCI[i];
      row.shareCILo = (ci.p025 * 100);
      row.shareCIHi = (ci.p975 * 100);
      row.errY = [row.share - row.shareCILo, row.shareCIHi - row.share];
    }
    return row;
  });
  if (includeNone) {
    const noneRow = { name: 'None', share: result.noneShare * 100, firstChoice: result.firstNone * 100 };
    if (hasCI && posterior.noneCI) {
      noneRow.shareCILo = posterior.noneCI.p025 * 100;
      noneRow.shareCIHi = posterior.noneCI.p975 * 100;
      noneRow.errY = [noneRow.share - noneRow.shareCILo, noneRow.shareCIHi - noneRow.share];
    }
    shareData.push(noneRow);
  }

  // Sensitivity line
  const sensData = useMemo(() => {
    if (!products[sensTarget]) return [];
    const raw = sensitivityAcrossLevels(study, products, sensTarget, sensAttr, { includeNone, subgroupPred });
    return raw.map((d, li) => ({ ...d, level: dl(attrs[sensAttr], li) }));
  }, [sensTarget, sensAttr, products, includeNone, subgroupPred, study]);

  // Tornado data
  const tornadoData = useMemo(() => {
    if (!products[sensTarget]) return [];
    return attrs.map((attr, ai) => {
      const shares = attr.levels.map((_, li) => {
        const prods = products.map((p, i) => ({
          ...p, profile: i === sensTarget ? p.profile.slice().map((v, j) => j === ai ? li : v) : p.profile
        }));
        return simulateShares(study, prods, { includeNone, subgroupPred }).shares[sensTarget] * 100;
      });
      const best = Math.max(...shares), worst = Math.min(...shares);
      const baseU = shares[products[sensTarget].profile[ai]];
      return { name: dn(attr), worst: worst - baseU, best: best - baseU, range: best - worst };
    }).sort((x, y) => y.range - x.range);
  }, [products, sensTarget, attrs, includeNone, subgroupPred, study]);

  // Price attribute handling
  const priceAttrIdx = attrs.findIndex(a0 => a0.isPrice);

  // Export options
  const exportSimExcel = () => {
    const header = hasCI
      ? ['Product', 'Share of Preference (%)', '95% CI Low (%)', '95% CI High (%)', 'First Choice Share (%)']
      : ['Product', 'Share of Preference (%)', 'First Choice Share (%)'];
    const rows = [header];
    shareData.forEach(d => {
      if (hasCI) {
        rows.push([
          d.name,
          d.share.toFixed(2),
          d.shareCILo !== undefined ? d.shareCILo.toFixed(2) : '',
          d.shareCIHi !== undefined ? d.shareCIHi.toFixed(2) : '',
          d.firstChoice.toFixed(2)
        ]);
      } else {
        rows.push([d.name, d.share.toFixed(2), d.firstChoice.toFixed(2)]);
      }
    });
    if (hasCI) rows.push([], [`Posterior credible intervals from ${posterior.nDraws} MCMC draws per respondent (n = ${posterior.N}).`]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Current Scenario');
    // Posterior P(beats) matrix when available
    if (hasCI && products.length >= 2) {
      const pHeader = [''].concat(products.map(p => p.name));
      const pRows = [pHeader];
      products.forEach((p, i) => {
        const row = [p.name];
        products.forEach((q, j) => row.push(i === j ? '—' : (posterior.pBeats[i][j] * 100).toFixed(0) + '%'));
        pRows.push(row);
      });
      pRows.push([], ['Each cell = posterior probability the row product has a higher share than the column product.']);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(pRows), 'Posterior P(beats)');
    }
    // Product profiles
    const pRows = [['Product', ...attrs.map(a0 => dn(a0))]];
    products.forEach(p => pRows.push([p.name, ...p.profile.map((li, ai) => dl(attrs[ai], li))]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(pRows), 'Product Profiles');
    // Scenarios
    if (study.scenarios?.length) {
      const sRows = [['Scenario', 'Product', 'Share (%)', 'First Choice (%)']];
      study.scenarios.forEach(s => {
        s.products.forEach((p, i) => sRows.push([s.name, p.name, (s.result.shares[i]*100).toFixed(2), (s.result.firstChoice[i]*100).toFixed(2)]));
        if (s.includeNone) sRows.push([s.name, 'None', (s.result.noneShare*100).toFixed(2), (s.result.firstNone*100).toFixed(2)]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sRows), 'Saved Scenarios');
    }
    XLSX.writeFile(wb, `${(study.setup?.name || 'study').replace(/[^a-z0-9-_]+/gi,'_')}_simulator.xlsx`);
  };

  return (
    <div>
      <h2 className="text-2xl font-semibold text-slate-900 mb-1">Market Simulator</h2>
      <p className="text-slate-500 text-sm mb-6">Define competing products; see predicted preference shares update in real time.</p>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* Left: product editor + filters */}
        <div className="lg:col-span-1 space-y-4">
          <Card title="Products">
            <div className="space-y-3">
              {products.map((p, pi) => (
                <div key={pi} className="border border-slate-200 rounded-lg p-3 bg-slate-50">
                  <div className="flex items-center gap-2 mb-2">
                    <input className="flex-1 px-2 py-1 text-sm font-medium border border-slate-300 rounded" value={p.name} onChange={e => updateProduct(pi, { name: e.target.value })} />
                    {products.length > 1 && <button className="text-slate-400 hover:text-red-600 text-xs" onClick={() => removeProduct(pi)}>✕</button>}
                  </div>
                  <div className="space-y-1.5">
                    {attrs.map((a0, ai) => (
                      <div key={a0.id} className="flex items-center gap-2">
                        <div className="text-[10px] text-slate-500 uppercase tracking-wide w-24 truncate">{dn(a0)}</div>
                        <select className="flex-1 px-2 py-1 text-xs border border-slate-300 rounded bg-white"
                          value={p.profile[ai]} onChange={e => setProductLevel(pi, ai, Number(e.target.value))}>
                          {a0.levels.map((l, li) => <option key={li} value={li}>{dl(a0, li)}</option>)}
                        </select>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <Button variant="secondary" onClick={addProduct} disabled={products.length >= DEFAULTS.simulator.maxProducts} className="mt-3 w-full">+ Add product</Button>
            {study.choiceConfig.includeNone && (
              <div className="mt-3 pt-3 border-t border-slate-100">
                <Toggle label="Include 'None'" checked={includeNone} onChange={setIncludeNone} />
              </div>
            )}
          </Card>

          {segCols.length > 0 && (
            <Card title="Subgroup filter">
              <div className="space-y-2">
                {segCols.map(c => (
                  <div key={c}>
                    <div className="text-xs text-slate-500 mb-1">{c}</div>
                    <select className="w-full px-2 py-1 text-xs border border-slate-300 rounded bg-white"
                      value={subgroupFilters[c] || '__all__'}
                      onChange={e => setSubgroupFilters({ ...subgroupFilters, [c]: e.target.value })}>
                      <option value="__all__">All respondents</option>
                      {(segValues[c] || []).map(v => <option key={v} value={v}>{v}</option>)}
                    </select>
                  </div>
                ))}
                {result.N < 30 && (
                  <Advisory level="warn">Filtered subgroup n = {result.N}. Results may be unreliable.</Advisory>
                )}
                <div className="text-xs text-slate-500 tabular">Subgroup n = {result.N}</div>
              </div>
            </Card>
          )}
        </div>

        {/* Right: charts and analysis */}
        <div className="lg:col-span-2 space-y-4">
          <Card title="Share of preference">
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs text-slate-500">
                {hasCI ? (
                  <>Posterior credible intervals from {posterior.nDraws} MCMC draws per respondent (n = {posterior.N}).</>
                ) : (
                  <>Point estimate only — re-run the HB analysis to enable posterior credible intervals.</>
                )}
              </div>
              {hasCI && (
                <label className="text-xs text-slate-600 flex items-center gap-1.5 cursor-pointer">
                  <input type="checkbox" checked={showCI} onChange={e => setShowCI(e.target.checked)} className="accent-blue-600" />
                  Show 95% CI
                </label>
              )}
            </div>
            <div className="h-72" ref={chartRef}>
              <R.ResponsiveContainer>
                <R.BarChart data={shareData} margin={{ top: 10, right: 30, left: 0, bottom: 30 }}>
                  <R.CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                  <R.XAxis dataKey="name" tick={{ fontSize: 11 }} interval={0} angle={-15} textAnchor="end" />
                  <R.YAxis tickFormatter={v => v.toFixed(0)+'%'} tick={{ fontSize: 10 }} />
                  <R.Tooltip formatter={(v, name, p) => {
                    if (name === 'Share of Preference' && p?.payload?.shareCILo !== undefined) {
                      return [v.toFixed(1) + '% (95% CI ' + p.payload.shareCILo.toFixed(1) + '–' + p.payload.shareCIHi.toFixed(1) + '%)', name];
                    }
                    return [v.toFixed(1) + '%', name];
                  }} />
                  <R.Legend wrapperStyle={{ fontSize: 11 }} />
                  <R.Bar dataKey="share" name="Share of Preference" fill="#2563eb" radius={[4,4,0,0]}>

            </div>
            {hasCI && showCI && products.length >= 2 && (
              <details className="mt-3 text-xs">
                <summary className="cursor-pointer text-slate-600 hover:text-slate-900">Posterior probability — row beats column (share<sub>row</sub> &gt; share<sub>col</sub>)</summary>

                            if (i === j) return <td key={j} className="text-center p-1.5 text-slate-300">—</td>;
                            const pp = posterior.pBeats[i][j];
                            const strong = pp > 0.95 || pp < 0.05;
                            return <td key={j} className={'text-center p-1.5 ' + (strong ? 'font-semibold text-slate-900' : 'text-slate-600')}>{(pp * 100).toFixed(0)}%</td>;
                          })}

            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                  <R.LineChart data={sensData} margin={{ top: 10, right: 10, left: 0, bottom: 20 }}>
                    <R.CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                    <R.XAxis dataKey="level" tick={{ fontSize: 10 }} />
                    <R.YAxis tickFormatter={v => v.toFixed(0)+'%'} tick={{ fontSize: 10 }} />
                    <R.Tooltip formatter={v => v.toFixed(1)+'%'} />
                    <R.Line type="monotone" dataKey="share" stroke="#10b981" strokeWidth={2} dot={{ r: 3 }} />
                  </R.LineChart>
                </R.ResponsiveContainer>
                {priceAttrIdx === sensAttr && attrs[priceAttrIdx] && (
                  <div className="text-xs text-slate-500 mt-2">Elasticity (Δshare/Δprice): {(() => {
                    if (sensData.length < 2) return '—';
                    const s0 = sensData[0].share, s1 = sensData[sensData.length-1].share;

              </div>
              <div style={{ height: Math.max(200, attrs.length * 30) }}>
                <div className="text-xs text-slate-500 mb-1">Tornado — impact on {products[sensTarget]?.name} share</div>

                  <R.BarChart data={tornadoData} layout="vertical" margin={{ left: 10, right: 20 }}>

                    <R.YAxis type="category" dataKey="name" tick={{ fontSize: 10 }} width={100} />
                    <R.Tooltip formatter={v => v.toFixed(1)+'%'} />
                    <R.ReferenceLine x={0} stroke="#94a3b8" />
                    <R.Bar dataKey="worst" stackId="a" fill="#ef4444" />

            {(study.scenarios || []).length > 0 && (
              <div className="space-y-2">

                    <div className="flex-1">

    </div>
  );
}

async function exportPNG(el, name) {
  if (!el) return alert('Chart not ready.');
  try {
    const dataUrl = await htmlToImage.toPng(el, { backgroundColor: '#ffffff', pixelRatio: 2 });
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = name.replace(/[^a-z0-9-_]+/gi,'_') + '.png';
    a.click();
  } catch (e) { alert('Export failed: ' + e.message); }
}

async function exportPPT(study, products, shareData, tornadoData) {
  try {
    const pres = new PptxGenJS();
    pres.layout = 'LAYOUT_WIDE';
    const titleOpts = { x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: '1e293b', fontFace: 'Calibri' };
    const srcOpts = { x: 0.5, y: 7.1, w: 12, h: 0.3, fontSize: 9, italic: true, color: '94a3b8' };

    // Title slide
    let s = pres.addSlide();
    s.addText(study.setup?.name || 'Conjoint Analysis', { x: 1, y: 2.5, w: 11, h: 1, fontSize: 36, bold: true, color: '0f172a' });
    s.addText((study.setup?.client || '') + (study.setup?.client ? ' • ' : '') + new Date().toLocaleDateString(), { x: 1, y: 3.7, w: 11, h: 0.5, fontSize: 14, color: '64748b' });
    s.addText(study.setup?.description || '', { x: 1, y: 4.3, w: 11, h: 2, fontSize: 11, color: '475569' });

    // Attribute importance
    if (study.analysis?.utilityStructure) {

      study.attributes.forEach((a, i) => rows.push([attrDisplayName(study, a), (study.analysis.utilityStructure.importance[i]*100).toFixed(1) + '%']));
      s.addTable(rows, { x: 1, y: 1.2, w: 8, colW: [4, 2], fontSize: 11 });
      // Bar chart (native)
      const barData = study.attributes.map((a, i) => ({ name: attrDisplayName(study, a), labels: [attrDisplayName(study, a)], values: [study.analysis.utilityStructure.importance[i]*100] }));
      s.addChart(pres.ChartType.bar, [{ name: 'Importance', labels: study.attributes.map(a => attrDisplayName(study, a)), values: study.attributes.map((a, i) => study.analysis.utilityStructure.importance[i]*100) }],
        { x: 9.5, y: 1.2, w: 4, h: 4.5, barDir: 'bar', showLegend: false, showValue: true, catAxisLabelFontSize: 9, valAxisLabelFontSize: 9 });
      s.addText(`Source: CBC Market Simulator — ${study.setup?.name || ''} • n = ${study.analysis.respondents.length}`, srcOpts);
    }

    // Share of preference
    s = pres.addSlide();
    s.addText('Share of Preference', titleOpts);
    const labels = shareData.map(d => d.name);
    const vals = shareData.map(d => d.share);
    s.addChart(pres.ChartType.bar, [{ name: 'Share', labels, values: vals }], {
      x: 1, y: 1.2, w: 12, h: 5.5, showLegend: false, showValue: true, valueFormatCode: '0.0\"%\"'
    });
    const pRows = [[{ text: 'Product', options: { bold: true }}, ...study.attributes.map(a => ({ text: attrDisplayName(study, a), options: { bold: true }}))]];
    products.forEach(p => pRows.push([p.name, ...p.profile.map((li, ai) => levelDisplayName(study, study.attributes[ai], li))]));
    s.addText(`Source: CBC Market Simulator — ${study.setup?.name || ''} • n = ${study.analysis?.respondents.length || 'N/A'}`, srcOpts);

    // Tornado
    s = pres.addSlide();
    s.addText('Tornado — Impact on Share', titleOpts);
    s.addChart(pres.ChartType.bar, [
      { name: 'Worst → Base', labels: tornadoData.map(d => d.name), values: tornadoData.map(d => d.worst) },
      { name: 'Base → Best', labels: tornadoData.map(d => d.name), values: tornadoData.map(d => d.best) }
    ], {
      x: 1, y: 1.2, w: 12, h: 5.5, barDir: 'bar', barGrouping: 'stacked', showLegend: true, showValue: false, valueFormatCode: '0.0\"%\"'
    });
    s.addText(`Source: CBC Market Simulator — ${study.setup?.name || ''}`, srcOpts);

    // Saved scenarios
    if (study.scenarios?.length) {
      study.scenarios.forEach(sc => {
        s = pres.addSlide();
        s.addText(`Scenario: ${sc.name}`, titleOpts);
        const lb = sc.products.map(p => p.name);
        const vv = sc.result.shares.map(x => x*100);
        if (sc.includeNone) { lb.push('None'); vv.push(sc.result.noneShare*100); }
        s.addChart(pres.ChartType.bar, [{ name: 'Share', labels: lb, values: vv }], {

  } catch (e) { alert('PPT export failed: ' + e.message); console.error(e); }
}

function exportStandaloneSimulator(study) {
  // Generate a self-contained HTML page that embeds utilities and offers a simulator.
  const a = study.analysis;
  if (!a) return alert('Run analysis first.');
  const payload = {
    name: study.setup?.name || 'Study',
    client: study.setup?.client || '',
    createdAt: new Date().toISOString(),
    attributes: study.attributes.map(at => ({ id: at.id, name: attrDisplayName(study, at), isPrice: !!at.isPrice, levels: at.levels.map((l, li) => ({ id: l.id, name: levelDisplayName(study, at, li) })) })),
    includeNone: study.choiceConfig.includeNone,
    utilityStructure: {
      perResp: a.utilityStructure.perResp,
      noneUtils: a.utilityStructure.noneUtils,
      importance: a.utilityStructure.importance,
      meanPerLevel: a.utilityStructure.meanPerLevel
    },
    respondents: a.respondents,
    scenarios: study.scenarios || []
  };
  const json = JSON.stringify(payload);
  const html = `<!doctype html><html><head><meta charset="utf-8"><title>${study.setup?.name || 'Simulator'} — Standalone</title><script src="https://cdn.tailwindcss.com"><\/script><script src="https://unpkg.com/react@18/umd/react.production.min.js"><\/script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"><\/script><script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"><\/script><script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"><\/script><script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"><\/script></head><body class="bg-slate-50"><div id="r"></div>
<script>window.__DATA__=${json};<\/script>
<script type="text/babel" data-presets="env,react">
const D=window.__DATA__;const R=window.Recharts;const {useState,useMemo}=React;
function softmax(u){const m=Math.max(...u);const e=u.map(x=>Math.exp(x-m));const s=e.reduce((a,b)=>a+b,0);return e.map(x=>x/s);}
function sim(products, includeNone){
  const N=D.utilityStructure.perResp.length;
  const res=products.map(()=>0);let none=0;const fc=products.map(()=>0);let fcn=0;
  for(let r=0;r<N;r++){
    const us=D.utilityStructure.perResp[r];
    const U=products.map(p=>p.profile.reduce((s,li,ai)=>s+us[ai][li],0));
    if(includeNone&&D.includeNone)U.push(D.utilityStructure.noneUtils?.[r]||0);
    const p=softmax(U);for(let i=0;i<products.length;i++)res[i]+=p[i];
    if(includeNone&&D.includeNone)none+=p[products.length];
    let b=0;for(let i=1;i<U.length;i++)if(U[i]>U[b])b=i;
    if(includeNone&&D.includeNone&&b===products.length)fcn++;else fc[b]++;
  }
  return{shares:res.map(x=>x/N),noneShare:none/N,firstChoice:fc.map(x=>x/N),firstNone:fcn/N,N};
}

  const data=products.map((p,i)=>({name:p.name,share:result.shares[i]*100,firstChoice:result.firstChoice[i]*100}));

    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div className="lg:col-span-1 space-y-3">

          {D.attributes.map((a,ai)=><div key={ai} className="mb-1"><div className="text-[10px] uppercase text-slate-500">{a.name}</div><select className="w-full text-xs p-1 border rounded" value={p.profile[ai]} onChange={e=>{const c=products.slice();const prof=c[pi].profile.slice();prof[ai]=Number(e.target.value);c[pi]={...c[pi],profile:prof};setProducts(c);}}>{a.levels.map((l,li)=><option key={li} value={li}>{l.name}</option>)}</select></div>)}
          {products.length>1 && <button className="text-xs text-red-500" onClick={()=>setProducts(products.filter((_,i)=>i!==pi))}>Remove</button>}
        </div>)}
        <button className="w-full py-2 border border-slate-300 rounded-lg bg-white hover:bg-slate-50 text-sm" onClick={()=>setProducts([...products,{name:'Product '+(products.length+1),profile:D.attributes.map(()=>0)}])}>+ Add product</button>
        {D.includeNone && <label className="flex items-center gap-2 text-sm"><input type="checkbox" checked={includeNone} onChange={e=>setIncludeNone(e.target.checked)}/>Include None</label>}
      </div>
      <div className="lg:col-span-2 bg-white border rounded-lg p-4"><h3 className="font-semibold mb-2">Share of preference</h3><div style={{height:400}}><R.ResponsiveContainer><R.BarChart data={data}><R.CartesianGrid strokeDasharray="3 3"/><R.XAxis dataKey="name" tick={{fontSize:11}}/><R.YAxis tickFormatter={v=>v.toFixed(0)+'%'}/><R.Tooltip formatter={v=>v.toFixed(1)+'%'}/><R.Legend/><R.Bar dataKey="share" name="Share" fill="#2563eb"/><R.Bar dataKey="firstChoice" name="First Choice" fill="#94a3b8"/></R.BarChart></R.ResponsiveContainer></div></div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('r')).render(<App/>);
<\/script></body></html>`;
  const blob = new Blob([html], { type: 'text/html' });
  const a0 = document.createElement('a');
  a0.href = URL.createObjectURL(blob);
  a0.download = `${(study.setup?.name || 'study').replace(/[^a-z0-9-_]+/gi,'_')}_simulator.html`;
  a0.click();

}
