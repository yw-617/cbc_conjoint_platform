const StudyContext = createContext(null);

function studyReducer(state, action) {
  switch (action.type) {
    case 'LOAD': return { ...action.payload };
    case 'UPDATE': return { ...state, ...action.patch, updatedAt: Date.now() };
    case 'SET_SETUP': return { ...state, setup: { ...state.setup, ...action.patch }, updatedAt: Date.now() };
    case 'SET_ATTRIBUTES': return { ...state, attributes: action.attributes, updatedAt: Date.now() };
    case 'SET_PROHIBITIONS': return { ...state, prohibitions: action.prohibitions, updatedAt: Date.now() };
    case 'SET_CHOICE': return { ...state, choiceConfig: { ...state.choiceConfig, ...action.patch }, updatedAt: Date.now() };
    case 'SET_DESIGN': return { ...state, design: action.design, updatedAt: Date.now() };
    case 'SET_CARD_STYLE': return { ...state, cardStyle: { ...state.cardStyle, ...action.patch }, updatedAt: Date.now() };
    case 'SET_ASSIGNMENT': return { ...state, assignment: action.assignment, updatedAt: Date.now() };
    case 'SET_RESPONSES': return { ...state, responses: action.responses, updatedAt: Date.now() };
    case 'SET_ANALYSIS': return { ...state, analysis: action.analysis, updatedAt: Date.now() };
    case 'SET_SCENARIOS': return { ...state, scenarios: action.scenarios, updatedAt: Date.now() };
    case 'SET_STATUS': return { ...state, status: action.status, updatedAt: Date.now() };
    case 'SET_ACBC_CONFIG': return { ...state, acbcConfig: { ...state.acbcConfig, ...action.patch }, updatedAt: Date.now() };
    case 'SET_ACBC_RESPONSES': return { ...state, acbcResponses: action.responses, updatedAt: Date.now() };
    default: return state;
  }
}

    setup: {
      name: '', client: '', therapeuticArea: 'Oncology',
      description: '', targetRespondentType: ''
    },
    attributes: [],
    prohibitions: [],
    choiceConfig: {
      altsPerTask: DEFAULTS.alternatives.default,
      includeNone: DEFAULTS.noneOption.default,
      noneLabel: DEFAULTS.noneOption.label,
      includeSoC: false,
      socLabel: DEFAULTS.socComparator.label,
      socProfile: null,
      tasksPerRespondent: DEFAULTS.tasks.default,
      dualResponse: false
    },
    design: null,
    cardStyle: {
      headerStyle: 'letter', // 'letter' | 'custom'
      customHeaders: [],
      attributeDisplayNames: {},
      levelDisplayNames: {}, // attrId -> levelId -> display
      showUnits: true,
      colorCodedAttrs: {}
    },
    assignment: null,
    responses: null,
    analysis: null,

  }
  return base;
}

  const styles = {
    primary: 'bg-blue-600 hover:bg-blue-700 text-white focus:ring-blue-400',
    secondary: 'bg-white hover:bg-slate-50 text-slate-800 border border-slate-300 focus:ring-slate-300',

    success: 'bg-emerald-600 hover:bg-emerald-700 text-white focus:ring-emerald-400'

  return <button className={`${base} ${styles[variant]} ${className}`} {...rest}>{children}</button>;
}

// Parse a CSV/XLSX file into an array-of-arrays (rows of cells).
async function parseSheetAOA(file) {
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  const data = ext === 'csv' ? await file.text() : await file.arrayBuffer();
  const wb = XLSX.read(data, { type: ext === 'csv' ? 'string' : 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
}

// Import a vendor design file + fielded data file, with auto-detect + override.
function ExternalImportModal({ onClose, onDone }) {
  const [designAOA, setDesignAOA] = useState(null);
  const [dataAOA, setDataAOA] = useState(null);
  const [designHdr, setDesignHdr] = useState(1); // 1-based header row
  const [dataHdr, setDataHdr] = useState(1);
  const [name, setName] = useState('Imported external study');
  const [vCol, setVCol] = useState(''); const [tCol, setTCol] = useState(''); const [cCol, setCCol] = useState('');
  const [attrSel, setAttrSel] = useState({}); // colName -> bool
  const [respCol, setRespCol] = useState(''); const [dVerCol, setDVerCol] = useState('');
  const [noneMode, setNoneMode] = useState('dualNoneCol'); const [noneValue, setNoneValue] = useState(2);
  const [err, setErr] = useState(null); const [busy, setBusy] = useState(false);

  const designParsed = useMemo(() => designAOA ? aoaToObjects(designAOA, designHdr - 1) : null, [designAOA, designHdr]);
  const dataParsed = useMemo(() => dataAOA ? aoaToObjects(dataAOA, dataHdr - 1) : null, [dataAOA, dataHdr]);

  // auto-detect when both files parsed
  useEffect(() => {
    if (!designParsed || !dataParsed) return;
    const m = detectExternalMapping(designParsed.cols, dataParsed.cols, designParsed.rows);
    setVCol(m.design.versionCol || ''); setTCol(m.design.taskCol || ''); setCCol(m.design.conceptCol || '');
    const sel = {}; m.design.allCandidateCols.forEach(c => sel[c] = m.design.attrCols.includes(c)); setAttrSel(sel);
    setRespCol(m.data.respIdCol || ''); setDVerCol(m.data.versionCol || '');
    setNoneMode(m.data.noneMode); setNoneValue(m.data.noneValue);
  }, [designParsed, dataParsed]);

  const onFile = (which) => async (ev) => {
    const f = ev.target.files?.[0]; if (!f) return;
    try {
      const aoa = await parseSheetAOA(f);
      if (which === 'design') { setDesignAOA(aoa); setDesignHdr(detectHeaderRow(aoa) + 1); }
      else { setDataAOA(aoa); setDataHdr(detectHeaderRow(aoa) + 1); }
      setErr(null);
    } catch (e) { setErr('Could not read ' + f.name + ': ' + e.message); }
    ev.target.value = '';
  };

  const buildMapping = () => {
    const dataCols = dataParsed.cols;
    const choiceCols = [];
    for (const c of dataCols) {
      const mm = c.match(/^(.*?)(\d+)$/); if (!mm || /none$/i.test(c)) continue;
      const key = _extNorm(c); const noneCol = dataCols.find(x => _extNorm(x) === key + 'none') || null;
      if (noneMode === 'dualNoneCol' ? noneCol : true) {
        // include task columns; in dual mode require a none companion, else any base+int that isn't a none col
        if (noneMode === 'dualNoneCol' && !noneCol) continue;
        choiceCols.push({ task: Number(mm[2]), col: c, noneCol });
      }
    }
    choiceCols.sort((a, b) => a.task - b.task);
    return {
      design: { versionCol: vCol, taskCol: tCol, conceptCol: cCol, attrCols: Object.keys(attrSel).filter(c => attrSel[c]), droppedCols: Object.keys(attrSel).filter(c => !attrSel[c]) },
      data: { respIdCol: respCol, versionCol: dVerCol, choiceCols, noneMode, noneValue: Number(noneValue) },
    };
  };

  const preview = useMemo(() => {
    if (!designParsed || !dataParsed || !vCol || !tCol || !cCol || !respCol || !dVerCol) return null;
    try {
      const study = buildStudyFromExternal(designParsed.rows, dataParsed.rows, buildMapping(), { name });
      return { study, rep: study._importReport, diag: study.design.diagnostics };
    } catch (e) { return { error: e.message }; }
  }, [designParsed, dataParsed, vCol, tCol, cCol, respCol, dVerCol, attrSel, noneMode, noneValue, name]);

  const create = async () => {
    if (!preview || preview.error) return;
    setBusy(true);
    try {
      const study = JSON.parse(JSON.stringify(preview.study)); // drop _importReport-safe copy
      delete study._importReport;
      await saveStudy(study);
      onDone(study.id);
    } catch (e) { setErr(e.message); setBusy(false); }
  };

  const Sel = ({ value, set, cols, placeholder }) => (
    <select value={value} onChange={e => set(e.target.value)} className="w-full text-sm border border-slate-300 rounded px-2 py-1.5 bg-white">
      <option value="">{placeholder || '— select —'}</option>
      {cols.map(c => <option key={c} value={c}>{c}</option>)}
    </select>
  );

  return (
    <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto scroll-thin p-6" onClick={e => e.stopPropagation()}>

          <button className="text-slate-400 hover:text-slate-700 text-xl leading-none" onClick={onClose}>×</button>
        </div>
        <p className="text-sm text-slate-500 mb-5">Upload a vendor design file (versions × tasks × concepts) and your fielded response file. Columns are auto-detected; adjust below if needed.</p>

        {err && <div className="mb-4 text-sm bg-red-50 text-red-700 border border-red-200 rounded p-2">{err}</div>}

        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
          <div className="border border-slate-200 rounded-lg p-3">
            <div className="text-xs font-semibold text-slate-700 mb-2">1. Design file (.csv / .xlsx)</div>
            <label className="cursor-pointer inline-block">
              <input type="file" accept=".csv,.xlsx,.xls" className="hidden" onChange={onFile('design')} />
              <span className="px-3 py-1.5 rounded-lg text-sm bg-blue-600 text-white cursor-pointer">{designAOA ? 'Replace file' : 'Choose file'}</span>
            </label>
            {designParsed && <div className="mt-2 text-xs text-slate-500">{designParsed.rows.length} rows · {designParsed.cols.length} cols
              <span className="ml-2">Header row <input type="number" min={1} value={designHdr} onChange={e => setDesignHdr(Math.max(1, Number(e.target.value) || 1))} className="w-12 border border-slate-300 rounded px-1 tabular" /></span></div>}
          </div>
          <div className="border border-slate-200 rounded-lg p-3">
            <div className="text-xs font-semibold text-slate-700 mb-2">2. Field data file (.csv / .xlsx)</div>
            <label className="cursor-pointer inline-block">
              <input type="file" accept=".csv,.xlsx,.xls" className="hidden" onChange={onFile('data')} />
              <span className="px-3 py-1.5 rounded-lg text-sm bg-blue-600 text-white cursor-pointer">{dataAOA ? 'Replace file' : 'Choose file'}</span>
            </label>
            {dataParsed && <div className="mt-2 text-xs text-slate-500">{dataParsed.rows.length} rows · {dataParsed.cols.length} cols
              <span className="ml-2">Header row <input type="number" min={1} value={dataHdr} onChange={e => setDataHdr(Math.max(1, Number(e.target.value) || 1))} className="w-12 border border-slate-300 rounded px-1 tabular" /></span></div>}
          </div>
        </div>

        {designParsed && dataParsed && (
          <>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <div>
                <div className="text-xs font-semibold text-slate-700 mb-2">Design columns</div>
                <div className="space-y-2">
                  <div><div className="text-xs text-slate-500 mb-0.5">Version</div><Sel value={vCol} set={setVCol} cols={designParsed.cols} /></div>
                  <div><div className="text-xs text-slate-500 mb-0.5">Task</div><Sel value={tCol} set={setTCol} cols={designParsed.cols} /></div>
                  <div><div className="text-xs text-slate-500 mb-0.5">Concept / position</div><Sel value={cCol} set={setCCol} cols={designParsed.cols} /></div>
                  <div>
                    <div className="text-xs text-slate-500 mb-0.5">Attributes (collinear duplicates auto-unchecked)</div>
                    <div className="max-h-32 overflow-y-auto scroll-thin border border-slate-200 rounded p-2 space-y-1">
                      {Object.keys(attrSel).map(c => (
                        <label key={c} className="flex items-center gap-2 text-xs text-slate-700">
                          <input type="checkbox" checked={attrSel[c]} onChange={e => setAttrSel(s => ({ ...s, [c]: e.target.checked }))} />
                          <span className="truncate">{c}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
              <div>
                <div className="text-xs font-semibold text-slate-700 mb-2">Data columns</div>
                <div className="space-y-2">
                  <div><div className="text-xs text-slate-500 mb-0.5">Respondent ID</div><Sel value={respCol} set={setRespCol} cols={dataParsed.cols} /></div>
                  <div><div className="text-xs text-slate-500 mb-0.5">Version</div><Sel value={dVerCol} set={setDVerCol} cols={dataParsed.cols} /></div>
                  <div>
                    <div className="text-xs text-slate-500 mb-0.5">None handling</div>
                    <select value={noneMode} onChange={e => setNoneMode(e.target.value)} className="w-full text-sm border border-slate-300 rounded px-2 py-1.5 bg-white">
                      <option value="dualNoneCol">Dual-response (separate _none column)</option>

function Dashboard({ onOpen, onCreate, onDocs }) {

  const [q, setQ] = useState('');
  const reload = async () => {
    setLoading(true);
    const rows = await listStudies();
    setStudies(rows);
    setLoading(false);
  };
  useEffect(() => { reload(); }, []);

  // Strip non-JSON-serializable fields (typed arrays) before round-tripping through JSON.
  // keptDraws (posterior draws Float32Array) is volatile — re-run analysis after import to regenerate.
  const stripVolatile = (s) => {
    const copy = { ...s };
    if (copy.analysis) {
      copy.analysis = { ...copy.analysis };
      if (copy.analysis.keptDraws) copy.analysis.keptDraws = null;
    }
    return copy;
  };
  const onDuplicate = async (s) => {
    // Use stripVolatile so JSON.stringify doesn't choke on typed arrays
    const copy = JSON.parse(JSON.stringify(stripVolatile(s)));
    copy.id = uid();
    copy.name = (s.setup?.name || s.name || 'Study') + ' (copy)';
    copy.setup.name = copy.name;
    copy.createdAt = Date.now();
    copy.updatedAt = Date.now();
    await saveStudy(copy);
    reload();
  };
  const onArchive = async (s) => {
    if (!confirm(`Delete study "${s.setup?.name || s.name}"? This cannot be undone.`)) return;
    await deleteStudy(s.id);
    reload();
  };
  const onExport = (s) => {
    // Strip non-JSON-serializable typed arrays (keptDraws). Recipient re-runs analysis after import.
    const blob = new Blob([JSON.stringify(stripVolatile(s), null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (s.setup?.name || s.name || 'study').replace(/[^a-z0-9-_]+/gi, '_') + '.json';

    URL.revokeObjectURL(a.href);

        reload();

                  <span className="text-slate-300">•</span>
                  <button className="text-xs text-slate-600 hover:text-blue-700" onClick={() => onDuplicate(s)}>Duplicate</button>
                  <span className="text-slate-300">•</span>
                  <button className="text-xs text-slate-600 hover:text-blue-700" onClick={() => onExport(s)}>Export</button>
                  <span className="flex-1" />
                  <button className="text-xs text-red-600 hover:text-red-700" onClick={() => onArchive(s)}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <footer className="mt-12 text-xs text-slate-400 text-center">CBC Platform • All study data stays local in this browser.</footer>
    </div>
  );
}

function stepGate(study, stepId) {
  const isACBC = study.studyType === 'acbc';
  switch (stepId) {
    case 'setup':       return { ok: true };
    case 'attributes':  return study.setup?.name ? { ok: true } : { ok: false, reason: 'Enter a study name first.' };
    case 'choice':      return (study.attributes || []).length >= 2 ? { ok: true } : { ok: false, reason: 'Define at least 2 attributes first.' };
    case 'design':      return (study.attributes || []).length >= 2 ? { ok: true } : { ok: false, reason: 'Define attributes before generating the design.' };
    case 'cards':       return study.design ? { ok: true } : { ok: false, reason: 'Generate the experimental design first.' };
    case 'assignment':  return study.design ? { ok: true } : { ok: false, reason: 'Generate the design first.' };
    case 'data':        return study.assignment ? { ok: true } : { ok: false, reason: 'Generate respondent assignments first.' };
    case 'acbc-config': return (study.attributes || []).length >= 2 ? { ok: true } : { ok: false, reason: 'Define attributes first.' };
    case 'acbc-spec':   return (study.attributes || []).length >= 2 ? { ok: true } : { ok: false, reason: 'Define attributes first.' };
    case 'acbc-data':   return !!study.acbcConfig ? { ok: true } : { ok: false, reason: 'Configure ACBC stages first.' };
    case 'analysis':
      if (isACBC) return study.acbcResponses ? { ok: true } : { ok: false, reason: 'Upload ACBC field data first.' };
      return (study.responses?.rows?.length) ? { ok: true } : { ok: false, reason: 'Upload response data first.' };
    case 'simulator':   return study.analysis?.individualUtilities ? { ok: true } : { ok: false, reason: 'Run the analysis first.' };
    default: return { ok: true };
  }
}

function stepComplete(study, stepId) {
  switch (stepId) {
    case 'setup':       return !!study.setup?.name;
    case 'attributes':  return (study.attributes || []).length >= 2 && study.attributes.every(a => a.levels.length >= 2);
    case 'choice':      return !!study.choiceConfig;
    case 'design':      return !!study.design;
    case 'cards':       return !!study.design;
    case 'assignment':  return !!study.assignment;
    case 'data':        return !!(study.responses?.rows?.length);
    case 'acbc-config': return !!study.acbcConfig;
    case 'acbc-spec':   return !!study.acbcConfig;  // spec is derived; "complete" once config exists
    case 'acbc-data':   return !!study.acbcResponses;
    case 'analysis':    return !!study.analysis?.individualUtilities;
    case 'simulator':   return (study.scenarios || []).length > 0;
    default: return false;
  }
}

function Wizard({ studyId, onExit }) {
  const [study, dispatch] = useReducer(studyReducer, null);
  const [stepId, setStepId] = useState('setup');
  const [saving, setSaving] = useState(false);
  const saveTimer = useRef(null);

  useEffect(() => {
    (async () => {
      const s = await loadStudy(studyId);
      if (s) dispatch({ type: 'LOAD', payload: s });
    })();
  }, [studyId]);

  useEffect(() => {
    if (!study) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current = setTimeout(async () => {
      await saveStudy(study);
      setSaving(false);
    }, 400);
    return () => {};
  }, [study]);

  const ctx = useMemo(() => ({
    study, dispatch,
    update: patch => dispatch({ type: 'UPDATE', patch }),
    setSetup: patch => dispatch({ type: 'SET_SETUP', patch }),
    setAttributes: attrs => dispatch({ type: 'SET_ATTRIBUTES', attributes: attrs }),
    setProhibitions: p => dispatch({ type: 'SET_PROHIBITIONS', prohibitions: p }),
    setChoice: patch => dispatch({ type: 'SET_CHOICE', patch }),
    setDesign: d => dispatch({ type: 'SET_DESIGN', design: d }),
    setCardStyle: patch => dispatch({ type: 'SET_CARD_STYLE', patch }),
    setAssignment: a => dispatch({ type: 'SET_ASSIGNMENT', assignment: a }),
    setResponses: r => dispatch({ type: 'SET_RESPONSES', responses: r }),
    setAnalysis: a => dispatch({ type: 'SET_ANALYSIS', analysis: a }),
    setScenarios: s => dispatch({ type: 'SET_SCENARIOS', scenarios: s }),
    setACBCConfig: patch => dispatch({ type: 'SET_ACBC_CONFIG', patch }),
    setACBCResponses: responses => dispatch({ type: 'SET_ACBC_RESPONSES', responses }),
    setStatus: s => dispatch({ type: 'SET_STATUS', status: s })
  }), [study]);

  if (!study) return <div className="p-10 text-slate-500 flex items-center gap-2"><Spinner /> Loading…</div>;

  const wizardSteps = getWizardSteps(study);
  const idx = wizardSteps.findIndex(s => s.id === stepId);
  const next = () => { if (idx < wizardSteps.length - 1) setStepId(wizardSteps[idx + 1].id); };
  const prev = () => { if (idx > 0) setStepId(wizardSteps[idx - 1].id); };

  return (
    <StudyContext.Provider value={ctx}>
      <div className="min-h-screen flex flex-col">
        {/* Top bar */}
        <div className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-4">
          <button onClick={onExit} className="text-sm text-slate-500 hover:text-slate-800">← Studies</button>
          <div className="flex-1">
            <input
              value={study.setup?.name || ''}
              placeholder="Untitled study"
              onChange={e => ctx.setSetup({ name: e.target.value })}
              className="text-lg font-semibold text-slate-900 bg-transparent border-0 outline-none w-full focus:bg-slate-50 rounded px-1"
            />
            <div className="text-xs text-slate-500">
              {study.setup?.therapeuticArea || 'No area'}
              {study.setup?.client && <span> • {study.setup.client}</span>}
              <span> • {saving ? 'Saving…' : 'Saved'}</span>
            </div>
          </div>
          <StatusPill status={study.status || 'Setup'} />
        </div>

        <div className="flex-1 flex bg-slate-50">
          {/* Sidebar */}
          <nav className="w-64 shrink-0 bg-white border-r border-slate-200 py-4">
            {study.studyType === 'acbc' && (
              <div className="px-5 pb-3 border-b border-slate-200 mb-2">
                <span className="inline-block px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded text-[10px] font-semibold tracking-wide uppercase">Adaptive CBC</span>
              </div>
            )}
            {wizardSteps.map((s, i) => {
              const gate = stepGate(study, s.id);
              const done = stepComplete(study, s.id);
              const active = s.id === stepId;
              return (
                <button
                  key={s.id}
                  onClick={() => { if (gate.ok) setStepId(s.id); else alert(gate.reason); }}
                  className={`w-full flex items-center gap-3 px-5 py-2.5 text-left transition-colors ${active ? 'bg-blue-50 border-r-2 border-blue-500' : 'hover:bg-slate-50'}`}
                >
                  <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-semibold shrink-0 ${done ? 'bg-emerald-500 text-white' : active ? 'bg-blue-500 text-white' : gate.ok ? 'bg-slate-200 text-slate-600' : 'bg-slate-100 text-slate-400'}`}>
                    {done ? '✓' : s.num}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className={`text-sm truncate ${active ? 'font-semibold text-slate-900' : gate.ok ? 'text-slate-700' : 'text-slate-400'}`}>{s.label}</div>
                    {!gate.ok && <div className="text-[10px] text-slate-400 truncate">{gate.reason}</div>}
                  </div>
                </button>
              );
            })}
          </nav>

          {/* Main */}
          <main className="flex-1 overflow-auto">
            <div className="max-w-5xl mx-auto p-8 step-enter" key={stepId}>
              {stepId === 'setup'        && <StepSetup />}
              {stepId === 'attributes'   && <StepAttributes />}
              {stepId === 'choice'       && <StepChoice />}
              {stepId === 'design'       && <StepDesign />}
              {stepId === 'cards'        && <StepCards />}
              {stepId === 'assignment'   && <StepAssignment />}
              {stepId === 'data'         && <StepData />}
              {stepId === 'analysis'     && (study.studyType === 'acbc' ? <StepACBCAnalysisStub /> : <StepAnalysis />)}
              {stepId === 'simulator'    && (study.studyType === 'acbc' ? <StepACBCSimulatorStub /> : <StepSimulator />)}
              {stepId === 'acbc-config'  && <StepACBCConfig />}
              {stepId === 'acbc-spec'    && <StepACBCSpec />}
              {stepId === 'acbc-data'    && <StepACBCData />}

              <div className="flex items-center justify-between mt-10 pt-6 border-t border-slate-200">
                <Button variant="ghost" onClick={prev} disabled={idx === 0}>← Back</Button>
                <div className="text-xs text-slate-400">Step {idx + 1} of {wizardSteps.length}</div>
                <Button onClick={next} disabled={idx === wizardSteps.length - 1}>Next →</Button>
              </div>
            </div>
          </main>
        </div>
      </div>
    </StudyContext.Provider>
  );
}

// ========================================================================
// SECTION 11a — CLIENT FEEDBACK AGENT
// Parses docx/txt/md client feedback, calls GPT-4o via the OpenAI Chat Completions API
// to emit a structured list of attribute/level edit operations, shows a
// per-op diff, and applies the accepted ops to the study.
// ========================================================================

// ---- File parsing ----
async function parseFeedbackFile(file) {
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (ext === 'txt' || ext === 'md' || ext === 'csv') {
    return await file.text();
  }
  if (ext === 'docx') {
    if (!window.mammoth) throw new Error('mammoth.js failed to load');
    const ab = await file.arrayBuffer();
    const { value } = await window.mammoth.extractRawText({ arrayBuffer: ab });
    return value || '';
  }
  if (ext === 'pptx') {
    if (!window.JSZip) throw new Error('JSZip failed to load');
    const ab = await file.arrayBuffer();
    const zip = await window.JSZip.loadAsync(ab);
    const slides = Object.keys(zip.files).filter(k => /^ppt\/slides\/slide\d+\.xml$/i.test(k)).sort();
    const texts = [];
    for (const k of slides) {
      const xml = await zip.files[k].async('string');
      // Extract <a:t>...</a:t> text runs in order.
      const parts = [];
      const re = /<a:t[^>]*>([\s\S]*?)<\/a:t>/g;
      let m; while ((m = re.exec(xml))) parts.push(m[1]);
      texts.push(`--- Slide ${slides.indexOf(k) + 1} ---\n${parts.join('\n')}`);
    }
    return texts.join('\n\n');
  }
  throw new Error(`Unsupported file type: .${ext}. Use .docx, .pptx, .txt, or .md, or paste text directly.`);
}

// ---- Op schema (human-readable renderers) ----
function describeOp(op, attrs) {
  const p = op.params || {};
  const q = (s) => `"${s}"`;
  switch (op.op) {
    case 'add_attribute':
      return `Add attribute ${q(p.name)} with ${p.levels?.length || 0} levels: ${(p.levels || []).map(q).join(', ')}`;
    case 'remove_attribute':
      return `Remove attribute ${q(p.name)}`;
    case 'rename_attribute':
      return `Rename attribute ${q(p.old_name)} → ${q(p.new_name)}`;
    case 'reorder_attributes':
      return `Reorder attributes to: ${(p.order || []).map(q).join(' → ')}`;
    case 'change_attribute_type':
      return `Change ${q(p.name)} type → ${p.new_type}`;
    case 'add_level':
      return `Add level ${q(p.level_name)} to ${q(p.attribute)}` + (p.position != null ? ` at position ${p.position + 1}` : '');
    case 'remove_level':
      return `Remove level ${q(p.level_name)} from ${q(p.attribute)}`;
    case 'rename_level':
      return `Rename level ${q(p.old_level_name)} → ${q(p.new_level_name)} in ${q(p.attribute)}`;
    case 'reorder_levels':
      return `Reorder levels of ${q(p.attribute)} to: ${(p.order || []).map(q).join(' → ')}`;
    default:
      return `Unknown op: ${op.op}`;
  }
}

// ---- Apply ops to attributes ----
function applyOps(attrs, ops) {
  // Returns { newAttrs, results: [{op, ok, error?}, ...] }
  const findAttr = (list, name) => {
    const lower = String(name || '').toLowerCase().trim();
    return list.findIndex(a => (a.name || '').toLowerCase().trim() === lower);
  };
  const findLevel = (attr, name) => {
    const lower = String(name || '').toLowerCase().trim();
    return (attr.levels || []).findIndex(l => (l.name || '').toLowerCase().trim() === lower);
  };

  let list = attrs.map(a => ({ ...a, levels: a.levels.map(l => ({ ...l })) }));
  const results = [];

  for (const op of ops) {
    const p = op.params || {};
    try {
      switch (op.op) {
        case 'add_attribute': {
          if (!p.name) throw new Error('Missing attribute name');
          if (findAttr(list, p.name) >= 0) throw new Error(`Attribute "${p.name}" already exists`);
          const levels = (p.levels || []).map(n => ({ id: uid(), name: String(n) }));
          if (levels.length < 2) throw new Error('At least 2 levels required');
          const newAttr = {
            id: uid(), name: p.name, type: p.type || 'categorical',
            isPrice: !!p.is_price, levels
          };
          const pos = (p.position != null) ? Math.max(0, Math.min(list.length, p.position)) : list.length;
          list.splice(pos, 0, newAttr);
          break;
        }
        case 'remove_attribute': {
          const i = findAttr(list, p.name);
          if (i < 0) throw new Error(`Attribute "${p.name}" not found`);
          list.splice(i, 1);
          break;
        }
        case 'rename_attribute': {
          const i = findAttr(list, p.old_name);
          if (i < 0) throw new Error(`Attribute "${p.old_name}" not found`);
          const clash = findAttr(list, p.new_name);
          if (clash >= 0 && clash !== i) throw new Error(`Attribute "${p.new_name}" already exists`);
          list[i].name = p.new_name;
          break;
        }
        case 'reorder_attributes': {
          if (!Array.isArray(p.order) || p.order.length !== list.length) throw new Error('Order must list every attribute exactly once');
          const next = [];
          for (const n of p.order) {
            const i = findAttr(list, n);
            if (i < 0) throw new Error(`Attribute "${n}" not found`);
            next.push(list[i]);
          }
          if (new Set(next).size !== list.length) throw new Error('Duplicate attributes in order');
          list = next;
          break;
        }
        case 'change_attribute_type': {
          const i = findAttr(list, p.name);
          if (i < 0) throw new Error(`Attribute "${p.name}" not found`);
          if (p.new_type !== 'categorical' && p.new_type !== 'continuous') throw new Error('Invalid type');
          list[i].type = p.new_type;
          break;
        }
        case 'add_level': {
          const i = findAttr(list, p.attribute);
          if (i < 0) throw new Error(`Attribute "${p.attribute}" not found`);
          if (findLevel(list[i], p.level_name) >= 0) throw new Error(`Level "${p.level_name}" already exists`);
          const lvl = { id: uid(), name: String(p.level_name) };
          const pos = (p.position != null) ? Math.max(0, Math.min(list[i].levels.length, p.position)) : list[i].levels.length;
          list[i].levels.splice(pos, 0, lvl);
          if (list[i].levels.length > DEFAULTS.levelCount.hardMax)
            throw new Error(`Attribute "${p.attribute}" would exceed ${DEFAULTS.levelCount.hardMax} levels`);
          break;
        }
        case 'remove_level': {
          const i = findAttr(list, p.attribute);
          if (i < 0) throw new Error(`Attribute "${p.attribute}" not found`);
          const li = findLevel(list[i], p.level_name);
          if (li < 0) throw new Error(`Level "${p.level_name}" not found in "${p.attribute}"`);
          if (list[i].levels.length <= 2) throw new Error(`"${p.attribute}" already at minimum of 2 levels`);
          list[i].levels.splice(li, 1);
          break;
        }
        case 'rename_level': {
          const i = findAttr(list, p.attribute);
          if (i < 0) throw new Error(`Attribute "${p.attribute}" not found`);
          const li = findLevel(list[i], p.old_level_name);
          if (li < 0) throw new Error(`Level "${p.old_level_name}" not found in "${p.attribute}"`);
          const clash = findLevel(list[i], p.new_level_name);
          if (clash >= 0 && clash !== li) throw new Error(`Level "${p.new_level_name}" already exists`);
          list[i].levels[li].name = p.new_level_name;
          break;
        }
        case 'reorder_levels': {
          const i = findAttr(list, p.attribute);
          if (i < 0) throw new Error(`Attribute "${p.attribute}" not found`);
          if (!Array.isArray(p.order) || p.order.length !== list[i].levels.length) throw new Error('Order must list every level once');
          const next = [];
          for (const n of p.order) {
            const li = findLevel(list[i], n);
            if (li < 0) throw new Error(`Level "${n}" not found in "${p.attribute}"`);
            next.push(list[i].levels[li]);
          }
          list[i].levels = next;
          break;
        }
        default:
          throw new Error(`Unsupported op: ${op.op}`);
      }
      results.push({ op, ok: true });
    } catch (e) {
      results.push({ op, ok: false, error: e.message || String(e) });
    }
  }

  return { newAttrs: list, results };
}

// ---- OpenAI API call ----
// OpenAI model selection. GPT-4o is the recommended default for tool-calling tasks;
// GPT-4o-mini is cheaper and fast for simpler edits. The reasoning models (o1/o3) are
// optional for the most ambiguous client feedback.
const CFA_MODELS = [
  { value: 'gpt-4o',      label: 'GPT-4o (recommended)' },
  { value: 'gpt-4o-mini', label: 'GPT-4o-mini (fastest / cheapest)' },
  { value: 'gpt-4-turbo', label: 'GPT-4 Turbo (legacy)' },
  { value: 'o3-mini',     label: 'o3-mini (reasoning)' }
];

// OpenAI function-tool schema. Note the wrapper differs from Anthropic:
//   { type: 'function', function: { name, description, parameters: <JSON Schema> } }
const OPS_TOOL = {
  type: 'function',
  function: {
    name: 'propose_ops',
    description: 'Propose a structured list of edits to the conjoint study\'s attributes and levels, based on the client feedback.',
    parameters: {
      type: 'object',
      properties: {
        ops: {
          type: 'array',
          description: 'Ordered list of proposed operations. Each is a discrete edit.',
          items: {
            type: 'object',
            properties: {
              op: { type: 'string', enum: [
                'add_attribute','remove_attribute','rename_attribute','reorder_attributes','change_attribute_type',
                'add_level','remove_level','rename_level','reorder_levels'
              ]},
              params: { type: 'object' },
              rationale: { type: 'string', description: 'Brief quote or paraphrase from the feedback that supports this change.' },
              confidence: { type: 'string', enum: ['high','medium','low'] }
            },
            required: ['op','params','rationale','confidence']
          }
        },
        notes: { type: 'string', description: 'Anything ambiguous or intentionally NOT proposed, with a short reason.' }
      },
      required: ['ops']
    }
  }
};

function buildFeedbackPrompt(attrs, feedbackText) {
  const studyStateObj = {
    attributes: attrs.map(a => ({
      name: a.name,
      type: a.type,
      is_price: !!a.isPrice,
      levels: a.levels.map(l => l.name)
    }))
  };
  return [
    `You are editing a choice-based conjoint (CBC) study. Your job is to translate client feedback into a PRECISE list of attribute/level edits.`,
    `You must ONLY edit attributes and levels via the provided \`propose_ops\` tool. Do not change prohibited pairs, choice configuration, or anything else.`,
    ``,
    `CURRENT STUDY STATE (attributes and levels only):`,
    '```json',
    JSON.stringify(studyStateObj, null, 2),
    '```',
    ``,
    `CLIENT FEEDBACK:`,
    '```',
    feedbackText,
    '```',
    ``,
    `INSTRUCTIONS:`,
    `- Propose an ordered list of operations to implement the feedback. Order matters when one op depends on another.`,
    `- Reference attributes and levels by their EXACT current names so the tool can match them.`,
    `- When the feedback is ambiguous, prefer the narrower, lower-confidence interpretation and explain in the rationale.`,
    `- Never invent attributes or levels the feedback doesn't clearly request.`,
    `- For each op, include a "rationale" that quotes or paraphrases the relevant feedback, and a "confidence" of high/medium/low.`,
    `- If the feedback contains items you cannot safely action (because they touch things outside attributes/levels, or are too vague), put them in "notes" instead of "ops".`,
    `- Valid op types:`,
    `  - add_attribute { name, type: "categorical"|"continuous", levels: [string,...], is_price?, position? }`,
    `  - remove_attribute { name }`,
    `  - rename_attribute { old_name, new_name }`,
    `  - reorder_attributes { order: [name,...] (must include every current attribute) }`,
    `  - change_attribute_type { name, new_type: "categorical"|"continuous" }`,
    `  - add_level { attribute, level_name, position? }`,
    `  - remove_level { attribute, level_name }`,
    `  - rename_level { attribute, old_level_name, new_level_name }`,
    `  - reorder_levels { attribute, order: [level_name,...] }`,
    ``,
    `Call \`propose_ops\` exactly once with your proposal.`
  ].join('\n');
}

async function callOpenAIForOps({ apiKey, model, attrs, feedbackText }) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model,
      messages: [{ role: 'user', content: buildFeedbackPrompt(attrs, feedbackText) }],
      tools: [OPS_TOOL],
      tool_choice: { type: 'function', function: { name: 'propose_ops' } },
      temperature: 0.2  // low temperature for deterministic structured editing
    })
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`OpenAI API ${res.status}: ${text.slice(0, 400)}`);
  }
  const data = await res.json();
  // Extract tool call from OpenAI's response shape
  const toolCall = data.choices?.[0]?.message?.tool_calls?.[0];
  if (!toolCall || toolCall.function?.name !== 'propose_ops') {
    throw new Error('Model did not return a structured proposal.');
  }
  let parsed;
  try { parsed = JSON.parse(toolCall.function.arguments); }
  catch (e) { throw new Error('Model returned malformed JSON arguments: ' + e.message); }
  const ops = Array.isArray(parsed.ops) ? parsed.ops : [];
  const notes = parsed.notes || '';
  return { ops, notes, raw: data };
}

function ClientFeedbackAgent({ open, onClose }) {
  const { study, setAttributes } = useContext(StudyContext);
  const attrs = study.attributes || [];
  const [text, setText] = useState('');
  // Migrate any legacy Anthropic key the user already had stored into the new OpenAI slot
  // on first run so they don't have to re-enter it (it'll still get overwritten when they
  // type the OpenAI key, but this prevents the field from looking empty if they had one).
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('cbc_openai_key') || '');
  const [model, setModel] = useState('gpt-4o');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [proposal, setProposal] = useState(null); // { ops, notes }
  const [checked, setChecked] = useState({}); // idx -> bool
  const [applyResults, setApplyResults] = useState(null);

  useEffect(() => {
    if (open) { setError(null); setApplyResults(null); }
  }, [open]);

  if (!open) return null;

  const onFile = async (ev) => {
    const file = ev.target.files?.[0];
    if (!file) return;
    try {
      const t = await parseFeedbackFile(file);
      setText(prev => (prev ? prev + '\n\n' : '') + t);
    } catch (e) {
      setError(e.message || String(e));
    }
    ev.target.value = '';
  };

  const analyze = async () => {
    setError(null); setProposal(null); setApplyResults(null);
    if (!apiKey) { setError('Enter your OpenAI API key.'); return; }
    if (!text.trim()) { setError('Paste or upload feedback content first.'); return; }
    localStorage.setItem('cbc_openai_key', apiKey);
    setLoading(true);
    try {
      const { ops, notes } = await callOpenAIForOps({ apiKey, model, attrs, feedbackText: text });
      setProposal({ ops, notes });
      const initChecked = {};
      ops.forEach((o, i) => { initChecked[i] = o.confidence !== 'low'; });
      setChecked(initChecked);
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setLoading(false);
    }
  };

  const applySelected = () => {
    if (!proposal) return;
    const selected = proposal.ops.filter((_, i) => checked[i]);
    const { newAttrs, results } = applyOps(attrs, selected);
    setApplyResults(results);
    const anyOk = results.some(r => r.ok);
    if (anyOk) setAttributes(newAttrs);
  };

  const confColor = c => ({ high: 'bg-emerald-100 text-emerald-700', medium: 'bg-amber-100 text-amber-800', low: 'bg-red-100 text-red-700' }[c] || 'bg-slate-100 text-slate-700');

  return (
    <div className="fixed inset-0 z-50 bg-slate-900/50 flex items-center justify-center p-6" onClick={onClose}>
      <div className="bg-white rounded-xl max-w-4xl w-full max-h-[90vh] flex flex-col shadow-xl" onClick={e => e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-slate-200 flex items-center justify-between">

            <h3 className="font-semibold text-slate-900">Update from client feedback</h3>
            <div className="text-xs text-slate-500">Paste an email or drop a .docx / .pptx / .txt / .md file. The agent proposes attribute and level edits; you review each change before it applies.</div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-lg">✕</button>
        </div>

        <div className="p-5 overflow-y-auto flex-1 scroll-thin">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <TextInput label="OpenAI API key" type="password" placeholder="sk-…" value={apiKey} onChange={e => setApiKey(e.target.value)} help="Stored only in this browser's localStorage. Reused across all AI features in this tool." className="md:col-span-2" />
            <Select label="Model" value={model} onChange={setModel} options={CFA_MODELS} />
          </div>

          <div className="flex items-center gap-3 mb-2">
            <div className="text-xs font-medium text-slate-700">Feedback content</div>
            <label className="text-xs text-blue-600 hover:text-blue-700 cursor-pointer">
              <input type="file" accept=".docx,.pptx,.txt,.md,.csv" className="hidden" onChange={onFile} />
              + Upload file (.docx / .pptx / .txt / .md)
            </label>
          </div>
          <textarea rows={8} className="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400 font-mono"
            placeholder="Paste the email, transcript, or comments here. Or upload a file above."
            value={text} onChange={e => setText(e.target.value)} />

          <div className="mt-4 flex items-center gap-3">
            <Button onClick={analyze} disabled={loading}>{loading ? <><Spinner /> Analyzing…</> : 'Analyze feedback'}</Button>
            {proposal && <span className="text-xs text-slate-500">Proposed {proposal.ops.length} change{proposal.ops.length !== 1 ? 's' : ''}</span>}
          </div>
          {error && <Advisory level="danger" className="mt-3">{error}</Advisory>}

          {proposal && (
            <div className="mt-5 space-y-2">
              {proposal.ops.length === 0 && <div className="text-sm text-slate-500 italic">No edits proposed.</div>}
              {proposal.ops.map((op, i) => (
                <div key={i} className={`border rounded-lg p-3 ${checked[i] ? 'border-blue-300 bg-blue-50/30' : 'border-slate-200 bg-slate-50'}`}>
                  <div className="flex items-start gap-3">
                    <input type="checkbox" className="mt-1" checked={!!checked[i]} onChange={e => setChecked({ ...checked, [i]: e.target.checked })} />
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-[10px] font-mono uppercase tracking-wide px-1.5 py-0.5 bg-slate-200 text-slate-700 rounded">{op.op}</span>
                        <span className={`text-[10px] px-1.5 py-0.5 rounded uppercase tracking-wide ${confColor(op.confidence)}`}>{op.confidence}</span>
                      </div>
                      <div className="text-sm text-slate-800 mt-1">{describeOp(op, attrs)}</div>

                    </div>

                </div>
              ))}
              {proposal.notes && (
                <Advisory level="info">

              )}
            </div>
          )}

          {applyResults && (
            <div className="mt-5 space-y-2">
              <div className="text-sm font-medium text-slate-800">Apply results</div>

                <div key={i} className={`text-xs p-2 rounded border ${r.ok ? 'bg-emerald-50 border-emerald-200 text-emerald-900' : 'bg-red-50 border-red-200 text-red-900'}`}>

        </div>

    </div>
  );
